    document.getElementById('tip-elem').textContent = a.element + (a.label && a.element === 'R' ? ' ('+a.label+')' : '') + (a.implicitH ? ` (+${a.implicitH}H)` : '');
    const chargeInfo = [];
    if (a.charge !== 0) chargeInfo.push('Formal: ' + (a.charge > 0 ? '+' : '') + a.charge);
    if (a.chargePartial !== 0) chargeInfo.push('Partial: δ' + (a.chargePartial > 0 ? '+' : '−'));
    document.getElementById('tip-charge').textContent = chargeInfo.length > 0 ? chargeInfo.join(' | ') : 'Neutral';
    document.getElementById('tip-bond').textContent = 'Bonds: ' + a.bondCount + ' | Valence: ' + a.totalValence;
    document.getElementById('tip-lp').textContent = 'Lone pairs: ' + a.lonePairs + (a.radical ? ' | Radical •' : '');
  }

  _updateStateIndicator(text) {
    const el = document.getElementById('state-indicator');
    el.textContent = text || '';
  }

  _updateGuidance() {
    if (this.appMode === 'create') return; // creator editor owns the panel
    const info = this.player.getStepInfo();
    this.guidanceInner.innerHTML = '';

    const curDiv = document.createElement('div');
    curDiv.className = 'guidance-step current';

    let descHtml = '';
    if (!this.player.loaded || window.indicationsUnlocked) {
      descHtml = `<div class="step-desc">${info.desc}</div>`;
    } else {
      descHtml = `<div class="step-desc" style="margin-top:8px;"><button id="btn-unlock-desc" style="padding:6px 14px;border-radius:var(--radius-sm);border:1px solid var(--border-subtle);background:var(--bg-surface);color:var(--text-accent);cursor:pointer;font-size:12px;">🔒 Display Indications</button></div>`;
    }

    curDiv.innerHTML = `
      <div class="step-num">${this.player.loaded ? info.num + ' / ' + info.total : '—'}</div>
      <div class="step-title">${info.name}</div>
      ${descHtml}
    `;
    this.guidanceInner.appendChild(curDiv);

    if (this.player.loaded && !window.indicationsUnlocked) {
      const btnUnlock = document.getElementById('btn-unlock-desc');
      if (btnUnlock) {
        btnUnlock.addEventListener('click', () => {
          document.getElementById('password-modal').style.display = 'flex';
          document.getElementById('pwd-input').focus();
        });
      }
    }

    const fill = document.getElementById('progress-fill');
    fill.style.width = (info.progress * 100) + '%';

    if (!this.player.loaded) {
      this._updateStateIndicator('📂 Import a reaction folder to begin');
    } else if (info.num === 0) {
      this._updateStateIndicator('⏳ Ready — drag reactants together to begin');
    } else if (info.num >= info.total) {
      this._updateStateIndicator('✅ Reaction Complete — stable product formed');
    } else {
      this._updateStateIndicator('⚗️ Reaction in progress — Step ' + info.num + '/' + info.total);
    }
  }

  // ---- ENERGY GRAPH ----

  _drawEnergyGraph() {
    const panel = document.getElementById('energy-panel');
    const eCanvas = document.getElementById('energyCanvas');
    if (!panel || !eCanvas || panel.style.display === 'none') return;
    const w = eCanvas.parentElement.clientWidth;
    const h = eCanvas.parentElement.clientHeight;
    eCanvas.width = w;
    eCanvas.height = h;
    const ctx = eCanvas.getContext('2d');
    ctx.clearRect(0, 0, w, h);

    if (this.energyPoints.length < 2) return;

    const padX = 40, padY = 30;
    const plotW = w - padX * 2;
    const plotH = h - padY * 2;
    const energies = this.energyPoints.map(p => p.energy);
    const minE = Math.min(...energies) - 10;
    const maxE = Math.max(...energies) + 10;
    const rangeE = maxE - minE || 1;

    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 0.8;
    for (let i = 0; i <= 3; i++) {
      const y = padY + (plotH / 3) * i;
      ctx.beginPath();
      ctx.moveTo(padX, y);
      ctx.lineTo(w - padX, y);
      ctx.stroke();
    }

    ctx.strokeStyle = 'rgba(100,180,255,0.75)';
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.shadowColor = 'rgba(100,180,255,0.35)';
    ctx.shadowBlur = 8;
    ctx.beginPath();

    const currentStep = (this.appMode === 'create' && window.Creator) ? Creator.creatorPos : this.player.currentStep;
    this.energyPoints.forEach((pt, i) => {
      const x = padX + (i / (this.energyPoints.length - 1)) * plotW;
      const y = padY + plotH - ((pt.energy - minE) / rangeE) * plotH;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();
    ctx.shadowBlur = 0;

    ctx.fillStyle = 'rgba(100,180,255,0.06)';
    ctx.beginPath();
    this.energyPoints.forEach((pt, i) => {
      const x = padX + (i / (this.energyPoints.length - 1)) * plotW;
      const y = padY + plotH - ((pt.energy - minE) / rangeE) * plotH;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    const baseY = padY + plotH - ((0 - minE) / rangeE) * plotH;
    ctx.lineTo(padX + plotW, baseY);
    ctx.lineTo(padX, baseY);
    ctx.closePath();
    ctx.fill();

    this.energyPoints.forEach((pt, i) => {
      const x = padX + (i / (this.energyPoints.length - 1)) * plotW;
      const y = padY + plotH - ((pt.energy - minE) / rangeE) * plotH;
      const isCurrent = i === currentStep;
      ctx.fillStyle = isCurrent ? '#fff' : 'rgba(100,180,255,0.6)';
      ctx.beginPath();
      ctx.arc(x, y, isCurrent ? 5.5 : 3.5, 0, PI2);
      ctx.fill();
      if (isCurrent) {
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2.2;
        ctx.beginPath();
        ctx.arc(x, y, 9, 0, PI2);
        ctx.stroke();
      }
      if (i % 2 === 0 || i === this.energyPoints.length - 1) {
        ctx.fillStyle = 'rgba(210,220,230,0.8)';
        ctx.font = '12px Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(pt.label, x, y + 30);
      }
    });

    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 5]);
    ctx.beginPath();
    ctx.moveTo(padX, baseY);
    ctx.lineTo(w - padX, baseY);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '12px Arial, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText('ΔG=0', w - padX + 4, baseY - 5);
  }

  // ---- MAIN RENDER ----

  render() {
    const ctx = this.ctx;
    const W = this.canvas.width;
    const H = this.canvas.height;

    ctx.clearRect(0, 0, W, H);

    const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.7);
    grad.addColorStop(0, '#151520');
    grad.addColorStop(1, '#0a0a0f');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    ctx.strokeStyle = 'rgba(255,255,255,0.025)';
    ctx.lineWidth = 0.5;
    const gridSize = 50;
    for (let x = gridSize; x < W; x += gridSize) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = gridSize; y < H; y += gridSize) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    for (const bond of this.bonds) {
      if (bond.broken || !bond.visible) continue;
      this._drawBond(ctx, bond);
    }

    this._drawReactiveIndicator(ctx);
    this._drawElectronParticles(ctx);

    for (const atom of this.atoms) {
      if (!atom.visible) continue;
      this._drawAtom(ctx, atom);
    }

    // Fragment labels
    for (const frag of this.fragments) {
      if (frag.atoms.length === 0 || !frag.name) continue;
      const b = frag.bounds;
      ctx.fillStyle = 'rgba(200,210,220,0.5)';
      ctx.font = '11px ' + getComputedStyle(document.body).fontFamily;
      ctx.textAlign = 'center';
      ctx.fillText(frag.name, b.cx, b.y - 20);
    }

    // Creator marquee rectangle
    if (this.appMode === 'create' && Creator.marquee.active) {
      const mq = Creator.marquee;
      const x = Math.min(mq.x0, mq.x1), y = Math.min(mq.y0, mq.y1);
      const w = Math.abs(mq.x1 - mq.x0), h = Math.abs(mq.y1 - mq.y0);
      ctx.strokeStyle = 'rgba(120,190,255,0.85)';
      ctx.lineWidth = 1.4;
      ctx.setLineDash([6, 4]);
      ctx.strokeRect(x, y, w, h);
      ctx.fillStyle = 'rgba(120,190,255,0.08)';
      ctx.fillRect(x, y, w, h);
      ctx.setLineDash([]);
    }

    this._drawEnergyGraph();
    this._drawFireworks(ctx, W, H);

    if (this.appMode === 'create') Creator.syncOverlays();
  }

  _drawBond(ctx, bond) {
    const a1 = bond.a1, a2 = bond.a2;
    const dir = bond.direction;
    const perp = bond.perp;
    const offset = bond._perpOffset;

    ctx.strokeStyle = 'rgba(180,195,210,0.7)';
    ctx.lineWidth = 2.2;
    ctx.lineCap = 'round';
    ctx.shadowColor = 'rgba(180,200,220,0.15)';
    ctx.shadowBlur = 4;

    if (bond.style === 'single' || bond.order === 1) {
      ctx.beginPath();
      ctx.moveTo(a1.x, a1.y);
      ctx.lineTo(a2.x, a2.y);
      ctx.stroke();
    } else if (bond.style === 'double' || bond.order === 2) {
      const ox = perp.x * offset, oy = perp.y * offset;
      ctx.beginPath();
      ctx.moveTo(a1.x + ox, a1.y + oy);
      ctx.lineTo(a2.x + ox, a2.y + oy);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(a1.x - ox, a1.y - oy);
      ctx.lineTo(a2.x - ox, a2.y - oy);
      ctx.stroke();
    } else if (bond.style === 'triple' || bond.order === 3) {
      const ox = perp.x * offset, oy = perp.y * offset;
      ctx.beginPath();
      ctx.moveTo(a1.x, a1.y);
      ctx.lineTo(a2.x, a2.y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(a1.x + ox * 1.5, a1.y + oy * 1.5);
      ctx.lineTo(a2.x + ox * 1.5, a2.y + oy * 1.5);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(a1.x - ox * 1.5, a1.y - oy * 1.5);
      ctx.lineTo(a2.x - ox * 1.5, a2.y - oy * 1.5);
      ctx.stroke();
    } else if (bond.style === 'dashed') {
      ctx.setLineDash([5, 4]);
      ctx.beginPath();
      ctx.moveTo(a1.x, a1.y);
      ctx.lineTo(a2.x, a2.y);
      ctx.stroke();
      ctx.setLineDash([]);
    } else if (bond.style === 'wedge') {
      const wx = dir.x * 6, wy = dir.y * 6;
      const px = perp.x * 4, py = perp.y * 4;
      ctx.fillStyle = 'rgba(180,195,210,0.5)';
      ctx.beginPath();
      ctx.moveTo(a1.x, a1.y);
      ctx.lineTo(a2.x - wx + px, a2.y - wy + py);
      ctx.lineTo(a2.x - wx - px, a2.y - wy - py);
      ctx.closePath();
      ctx.fill();
    } else if (bond.style === 'wavy') {
      ctx.setLineDash([3, 3]);
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(a1.x, a1.y);
      ctx.lineTo(a2.x, a2.y);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.lineWidth = 2.2;
    }

    ctx.shadowBlur = 0;
  }

  _drawAtom(ctx, atom) {
    const { x, y, radius, element, color, shape, chargePartial, isDragging } = atom;
    const r = radius;
    const charge = atom.charge;

    ctx.save();
    ctx.globalAlpha = atom.opacity;

    // Product glow when reaction complete
    let isProductGlow = false;
    if (this.appMode === 'play' && this.player.loaded && this.player.complete) {
       const mol = atom._molecule;
       if (mol && mol.atoms.length >= 8) isProductGlow = true;
    }

    const isSelected = this.appMode === 'create' &&
      (Creator.selectedAtoms.has(atom) || Creator.pendingAtoms.includes(atom));

    if (isDragging || (this.hoveredAtom === atom)) {
      ctx.shadowColor = 'rgba(255,255,255,0.5)';
      ctx.shadowBlur = 16;
    } else if (isSelected) {
      ctx.shadowColor = 'rgba(110,210,255,0.85)';
      ctx.shadowBlur = 20;
    } else if (isProductGlow) {
      ctx.shadowColor = 'rgba(80, 220, 120, 0.6)';
      ctx.shadowBlur = 18;
    } else if (atom._highlightTimer > 0) {
      ctx.shadowColor = 'rgba(100,220,150,0.6)';
      ctx.shadowBlur = 12;
    }

    ctx.strokeStyle = isSelected ? '#9be7ff' : '#333333';
    ctx.lineWidth = isSelected ? 2.4 : 1.8;
    ctx.fillStyle = this._hexToRgba(color, 1.0);

    this._drawShape(ctx, shape, x, y, r);
    ctx.fill();
    ctx.stroke();

    ctx.shadowBlur = 0;

    // Lone pairs (ellipse + two dots), placed in angular gaps between bonds
    if (window.showLonePairs !== false && elemData(element).v != null && atom.lonePairs > 0) {
      this._drawLonePairs(ctx, atom);
    }

    // Element symbol (+ folded hydrogens, e.g. CH₃). Dark fills use light text (e.g. Pd/Fe/Zn/Cr).
    ctx.fillStyle = elemData(element).text || '#000000';
    const dispText = (element === 'R' && atom.label) ? atom.label
      : element + (atom.implicitH > 0 ? 'H' + (atom.implicitH > 1 ? subNum(atom.implicitH) : '') : '');
    // triangles have little usable area: scaled font, text at the centroid (y), not toward the base
    const fSize = (element === 'H') ? 14
      : (shape === 'triangle') ? (dispText.length > 2 ? 12 : 16)
      : (dispText.length > 2 ? 13 : 20);
    ctx.font = `bold ${fSize}px Arial, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // an upward triangle's centroid is at y; nudge only slightly so text sits centered, away from edges
    ctx.fillText(dispText, x, y + (shape === 'triangle' ? r * 0.06 : 1));

    // Charge display: full formal charge takes precedence over δ
    if (charge !== 0 || chargePartial !== 0) {
      const chX = x + r + 6;
      const chY = y - r - 4;
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1;
      const shown = charge !== 0 ? charge : chargePartial;
      ctx.fillStyle = shown > 0 ? '#e57373' : '#81c784';
      ctx.beginPath();
      ctx.arc(chX, chY, 10, 0, PI2);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.font = '9px Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      let sym;
      if (charge !== 0) {
        sym = (Math.abs(charge) > 1 ? Math.abs(charge) : '') + (charge > 0 ? '+' : '−');
      } else {
        sym = 'δ' + (chargePartial > 0 ? '+' : '−');
      }
      ctx.fillText(sym, chX, chY + 0.5);
    }

    // Radical dot
    if (atom.radical) {
      ctx.fillStyle = '#fff';
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.arc(x + r + 3, y + r + 3, 3, 0, PI2);
      ctx.fill();
      ctx.stroke();
    }

    ctx.restore();
  }

  /** White flat ellipses with two dots, placed in the largest angular gaps between bonds */
  _drawLonePairs(ctx, atom) {
    const n = atom.lonePairs;
    const intact = atom.bonds.filter(b => !b.broken);
    const bondAngles = intact.map(b => {
      const o = b.a1 === atom ? b.a2 : b.a1;
      return Math.atan2(o.y - atom.y, o.x - atom.x);
    }).sort((a, b) => a - b);

    const angles = [];
    if (bondAngles.length === 0) {
      for (let i = 0; i < n; i++) angles.push(-Math.PI / 2 + (i * PI2) / Math.max(n, 1));
    } else {
      // gaps between consecutive bond angles (wrapping)
      const gaps = [];
      for (let i = 0; i < bondAngles.length; i++) {
        const a1 = bondAngles[i];
        const a2 = (i === bondAngles.length - 1) ? bondAngles[0] + PI2 : bondAngles[i + 1];
        gaps.push({ start: a1, size: a2 - a1 });
      }
      gaps.sort((g1, g2) => g2.size - g1.size);
      // distribute lone pairs into gaps, widest first; stack extras inside a gap
      const perGap = new Map();
      for (let i = 0; i < n; i++) {
        const g = gaps[i % gaps.length];
        const k = (perGap.get(g) || 0) + 1;
        perGap.set(g, k);
      }
      let placed = 0;
      for (const [g, count] of perGap.entries()) {
        for (let j = 0; j < count && placed < n; j++, placed++) {
          angles.push(g.start + g.size * ((j + 1) / (count + 1)));
        }
      }
    }

    const dist = atom.radius + 12;
    for (const ang of angles) {
      const px = atom.x + Math.cos(ang) * dist;
      const py = atom.y + Math.sin(ang) * dist;
      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(ang + Math.PI / 2); // long axis tangential
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      ctx.strokeStyle = 'rgba(40,40,55,0.9)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.ellipse(0, 0, 7.5, 4.2, 0, 0, PI2);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(-2.8, 0, 1.5, 0, PI2); ctx.fill();
      ctx.beginPath(); ctx.arc(2.8, 0, 1.5, 0, PI2); ctx.fill();
      ctx.restore();
    }
  }

  _drawShape(ctx, shape, x, y, r) {
    ctx.beginPath();
    switch (shape) {
      case 'circle':
        ctx.arc(x, y, r, 0, PI2);
        break;
      case 'square':
        ctx.rect(x - r, y - r, r * 2, r * 2);
        break;
      case 'triangle': {
        const tr = r * 1.18; // triangles get a size boost — usable inner area is small
        ctx.moveTo(x, y - tr);
        ctx.lineTo(x + tr * 0.866, y + tr * 0.5);
        ctx.lineTo(x - tr * 0.866, y + tr * 0.5);
        ctx.closePath();
        break;
      }
      case 'pentagon':
        for (let i = 0; i < 5; i++) {
          const angle = (PI2 / 5) * i - Math.PI / 2;
          const hx = x + Math.cos(angle) * r;
          const hy = y + Math.sin(angle) * r;
          if (i === 0) ctx.moveTo(hx, hy);
          else ctx.lineTo(hx, hy);
        }
        ctx.closePath();
        break;
      case 'hexagon':
        for (let i = 0; i < 6; i++) {
          const angle = (PI2 / 6) * i - Math.PI/6;
          const hx = x + Math.cos(angle) * r;
          const hy = y + Math.sin(angle) * r;
          if (i === 0) ctx.moveTo(hx, hy);
          else ctx.lineTo(hx, hy);
        }
        ctx.closePath();
        break;
      case 'roundrect': {
        const rr = r * 0.4;
        ctx.moveTo(x - r + rr, y - r);
        ctx.lineTo(x + r - rr, y - r);
        ctx.arcTo(x + r, y - r, x + r, y - r + rr, rr);
        ctx.lineTo(x + r, y + r - rr);
        ctx.arcTo(x + r, y + r, x + r - rr, y + r, rr);
        ctx.lineTo(x - r + rr, y + r);
        ctx.arcTo(x - r, y + r, x - r, y + r - rr, rr);
        ctx.lineTo(x - r, y - r + rr);
        ctx.arcTo(x - r, y - r, x - r + rr, y - r, rr);
        ctx.closePath();
        break;
      }
      default:
        ctx.arc(x, y, r, 0, PI2);
    }
  }

  _drawElectronParticles(ctx) {
    this.electronParticles = this.electronParticles.filter(ep => ep.life > 0);
    for (const ep of this.electronParticles) {
      ep.progress += ep.speed;
      ep.life -= ep.decay;
      if (ep.life <= 0) continue;
      const px = ep.x + (ep.tx - ep.x) * ep.progress;
      const py = ep.y + (ep.ty - ep.y) * ep.progress;
      ctx.fillStyle = `rgba(100,200,255,${ep.life})`;
      ctx.shadowColor = `rgba(100,200,255,${ep.life*0.6})`;
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.arc(px, py, 2.5, 0, PI2);
      ctx.fill();
      if (ep.progress > 0.02) {
        const prevPx = ep.x + (ep.tx - ep.x) * (ep.progress - ep.speed);
        const prevPy = ep.y + (ep.ty - ep.y) * (ep.progress - ep.speed);
        ctx.strokeStyle = `rgba(100,200,255,${ep.life*0.4})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(prevPx, prevPy);
        ctx.lineTo(px, py);
        ctx.stroke();
        ctx.lineWidth = 2.2;
      }
      ctx.shadowBlur = 0;
    }
  }

  _drawFireworks(ctx, W, H) {
    if (this.showCongrats && this.fireworkParticles.length < 20) {
      this._spawnFireworkBurst();
    }
    this.fireworkParticles = this.fireworkParticles.filter(p => p.life > 0);
    if (this.fireworkParticles.length > 0) {
      for (const p of this.fireworkParticles) {
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.05;
        p.life -= p.decay;
        if (p.life > 0) {
          ctx.fillStyle = p.color;
          ctx.globalAlpha = p.life;
          ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, PI2); ctx.fill();
        }
      }
      ctx.globalAlpha = 1.0;
    }

    if (this.showCongrats) {
      ctx.save();
      ctx.translate(W/2, H/2 - 60);
      this._congratsAngle += 0.015;
      ctx.scale(Math.cos(this._congratsAngle), 1);
      ctx.font = 'bold 42px "Arial Black", sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(100, 200, 255, 0.8)'; ctx.shadowBlur = 25;
      ctx.fillStyle = '#fff';
      ctx.fillText('Congratulations! 🎉', 0, 0);
      ctx.restore();
    }
  }

  // ---- UTILITY ----

  _hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  // ---- MAIN LOOP ----

  start() {
    if (this.rafId) cancelAnimationFrame(this.rafId);
    const loop = (ts) => {
      this._frameCount++;
      if (ts - this._lastFpsTime >= 1000) {
        this._fps = Math.round(this._frameCount / ((ts - this._lastFpsTime) / 1000));
        this._frameCount = 0;
        this._lastFpsTime = ts;
        const fpsEl = document.getElementById('fpsDisplay');
        if (fpsEl) fpsEl.textContent = this._fps + ' FPS';
      }

      this.physics.tick();
      this.electronParticles = this.electronParticles.filter(ep => ep.life > 0);
      this.render();

      this.rafId = requestAnimationFrame(loop);
    };
    this.rafId = requestAnimationFrame(loop);
  }

  stop() {
    if (this.rafId) cancelAnimationFrame(this.rafId);
  }
}

// ============================================================
// MODULE 11: CREATOR MODE
// ============================================================
let ui = null, player = null, physics = null;

const ICON_PAPER = '<svg id="ct-step-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><path d="M14 3v6h6"/></svg>';
const ICON_PAPER_PENCIL = '<svg id="ct-step-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><path d="M14 3v6h6"/><path d="M16.2 12.3l2.5 2.5L12 21.5l-3 .5.5-3z" fill="currentColor" stroke-width="1"/></svg>';

const Creator = {
  active: false,
  tool: 'select',
  selectedAtoms: new Set(),
  pendingAtoms: [],
  bondCandidate: null,     // { a, b }
  breakCandidate: null,    // { bond }
  piSource: null,          // a multiple bond armed as a π-nucleophile (attacks a target atom)
  marquee: { active: false, x0: 0, y0: 0, x1: 0, y1: 0 },
  recording: false,
  baselineSnap: null,
  recordSnaps: null,    // [snapshot] captured after each sub-action while recording (#3)
  editingIndex: null,   // when re-recording an existing step in place (#5): its index, else null
  workingDoc: null,
  initialCaptured: false,
  dirty: false,
  creatorPos: 0,        // step-review pointer (0..stepCount)
  _undoStack: [],
  _clipboard: null,
  _idCounter: 0,
  dismissed: new Set(),
  bubbles: new Map(),      // key → { div, anchor }
  breakRecord: null,
  _chipTimer: null,
  orderChipBond: null,
  _mouseDownAtom: null,
  _downWasDrag: false,
  _gateResolve: null,
  _gateCands: null,

  get stepCount() { return this.workingDoc ? this.workingDoc.steps.length : 0; },

  // ---- lifecycle ----

  enter() {
    this.active = true;
    ui.appMode = 'create';
    player.stopAutoPlay();
    document.getElementById('btnAutoPlay').textContent = '⏯';

    if (player.loaded) {
      // Adopt the loaded reaction for appending steps: rewind (clears alias) then fast-forward
      player.reset();
      while (player.advanceStep()) { /* fast-forward to final state */ }
      ui.showCongrats = false;
      ui.fireworkParticles = [];
      this.workingDoc = (typeof structuredClone === 'function') ? structuredClone(player.doc) : JSON.parse(JSON.stringify(player.doc));
      this._ingestEnergyProfile(player.doc);
      this.initialCaptured = true;
    } else {
      this.workingDoc = {
        format: CME_FORMAT, name: 'Untitled Reaction', description: '',
        canvas: null,
        ready: { title: 'Step 0: Ready State', indication: '' },
        initial: null, steps: [],
      };
      this.initialCaptured = false;
    }
    this.recording = false;
    this.baselineSnap = null;
    this.dirty = false;
    this.creatorPos = this.stepCount;
    this._undoStack = [];
    this.setTool('select');

    document.getElementById('creator-toolbar').classList.remove('hidden');
    document.getElementById('guidance-inner').style.display = 'none';
    document.getElementById('guidance-editor').classList.remove('hidden');
    document.getElementById('btnCreateReaction').classList.add('active');
    document.getElementById('btnCreateReaction').textContent = '✅ Exit Creator';
    this._setStepIcon(false);
    this.updateEditor();
    if (window.refreshTopButtons) window.refreshTopButtons();
    this.refreshErrors();
    this.refreshEnergyPanel();
    ui._updateStateIndicator(this.initialCaptured
      ? '🛠️ 创作模式 — 已载入当前反应，可继续追加步骤'
      : '🛠️ 创作模式 — 用「导入」按钮粘贴 SMILES 添加分子，再录制步骤');
  },

  exit() {
    this.active = false;
    ui.appMode = 'play';
    this.recording = false;
    this.baselineSnap = null;
    this.pendingAtoms = [];
    this.bondCandidate = null;
    this.breakCandidate = null;
    this.selectedAtoms.clear();
    this.marquee.active = false;
    this.piSource = null;
    this._closePiMenu();
    this.hideFlipChip();
    this.hideOrderChip();
    this._clearBubbles();

    document.getElementById('creator-toolbar').classList.add('hidden');
    document.getElementById('smiles-window').classList.add('hidden');
    document.getElementById('guidance-inner').style.display = '';
    document.getElementById('guidance-editor').classList.add('hidden');
    document.getElementById('btnCreateReaction').classList.remove('active');
    document.getElementById('btnCreateReaction').textContent = '🛠️ Create Reaction';
    document.getElementById('canvas-wrap').classList.remove('tool-marquee', 'tool-erase');

    // Live-test: hand the freshly created reaction straight to the player
    if (this.workingDoc && this.initialCaptured && this.workingDoc.steps.length > 0) {
      const json = this.buildDocJson();
      const v = validateDoc(json);
      if (v.ok) {
        player.loadDoc(json);
        ui._updateStateIndicator('▶ 已加载你创作的反应（未保存的内容记得另存为）');
      } else {
        console.warn('creator doc invalid', v.errors);
        if (player.doc) player.reset(); else player.unload();
      }
    } else if (player.doc) {
      player.reset();
    } else {
      player.unload();
    }
    if (window.refreshTopButtons) window.refreshTopButtons();
    ui._updateGuidance();
  },

  newId() {
    let id;
    do { id = 'u' + (++this._idCounter); } while (ui.atoms.some(a => a.id === id));
    return id;
  },

  _ensureIds() {
    ui.atoms.forEach(a => { if (!a.id) a.id = this.newId(); });
  },

  // ---- tools ----

  setTool(t) {
    this.tool = t;
    this.pendingAtoms = [];
    this.bondCandidate = null;
    this.breakCandidate = null;
    this.piSource = null;
    this._closePiMenu();
    this.hideOrderChip();
    ['ct-marquee', 'ct-select', 'ct-erase'].forEach(id => document.getElementById(id).classList.remove('active'));
    const btn = { marquee: 'ct-marquee', select: 'ct-select', erase: 'ct-erase' }[t];
    if (btn) document.getElementById(btn).classList.add('active');
    const wrap = document.getElementById('canvas-wrap');
    wrap.classList.toggle('tool-marquee', t === 'marquee');
    wrap.classList.toggle('tool-erase', t === 'erase');
  },

  onMouseDown(pos) {
    this._downWasDrag = false;
    if (this.tool === 'marquee') {
      this.marquee = { active: true, x0: pos.x, y0: pos.y, x1: pos.x, y1: pos.y };
      return;
    }
    if (this.tool === 'erase') {
      if (this.selectedAtoms.size > 0) {
        const hit = ui._hitAtom(pos);
        if (hit && this.selectedAtoms.has(hit)) { this.eraseSelection(); return; }
        for (const f of ui.fragments) {
          if (!f.atoms.some(a => this.selectedAtoms.has(a))) continue;
          const b = f.bounds;
          if (pos.x >= b.x - 12 && pos.x <= b.x + b.w + 12 && pos.y >= b.y - 12 && pos.y <= b.y + b.h + 12) {
            this.eraseSelection();
            return;
          }
        }
      }
      const atom = ui._hitAtom(pos);
      if (atom) this.eraseAtom(atom);
      return;
    }

    // ---- select tool ----
    // (π-0) if a π bond is armed, a click on a different atom is the attack target
    if (this.piSource) {
      if (this.piSource.broken) { this.piSource = null; }
      else {
        const tatom = ui._hitAtom(pos);
        if (tatom && tatom !== this.piSource.a1 && tatom !== this.piSource.a2) {
          this._openPiMenu(this.piSource, tatom);
          return;
        }
        if (!tatom && !this._hitBond(pos)) { this.piSource = null; this._closePiMenu(); } // empty click cancels
      }
    }
    // 1) candidate midpoints take priority
    if (this.bondCandidate) {
      const { a, b } = this.bondCandidate;
      const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
      if (Math.hypot(pos.x - mx, pos.y - my) < 26) {
        this.formBond(a, b);
        this.pendingAtoms = [];
        this.bondCandidate = null;
        return;
      }
    }
    if (this.breakCandidate && !this.breakCandidate.bond.broken) {
      const mid = this.breakCandidate.bond.midpoint;
      if (Math.hypot(pos.x - mid.x, pos.y - mid.y) < 26) {
        this.breakBondOneOrder(this.breakCandidate.bond);
        this.pendingAtoms = [];
        this.breakCandidate = null;
        this.hideOrderChip();
        return;
      }
    }
    // 2) atom: drag now, click decided on mouseup
    const atom = ui._hitAtom(pos);
    if (!atom) {
      // clicked the LINE of a multiple bond (not an atom) → arm it as a π-nucleophile
      const pb = this._hitBond(pos);
      if (pb) {
        this.piSource = pb;
        this.pendingAtoms = [];
        this.bondCandidate = null; this.breakCandidate = null; this.hideOrderChip();
        ui._updateStateIndicator('⚛ 已选中 π 键 — 点击要进攻的目标原子，再选择进攻方式（成环 / 加成）');
        return;
      }
    }
    this._mouseDownAtom = atom;
    if (atom) ui._beginDrag(atom, pos);
  },

  onMouseMove(pos) {
    if (this.marquee.active) {
      this.marquee.x1 = pos.x;
      this.marquee.y1 = pos.y;
      return;
    }
    if (ui.isDragging && ui.dragTarget) {
      ui._dragMove(pos);
      if (ui._dragMoved > 6) this._downWasDrag = true;
      return;
    }
    ui.hoveredAtom = ui._hitAtom(pos);
    ui._updateTooltip();
  },

  onMouseUp(pos) {
    if (this.marquee.active) {
      this.marquee.active = false;
      const x = Math.min(this.marquee.x0, this.marquee.x1);
      const y = Math.min(this.marquee.y0, this.marquee.y1);
      const w = Math.abs(this.marquee.x1 - this.marquee.x0);
      const h = Math.abs(this.marquee.y1 - this.marquee.y0);
      if (w < 6 && h < 6) {
        this.selectedAtoms.clear();
      } else {
        // any atom inside → whole fragment selected
        for (const f of ui.fragments) {
          const inside = f.atoms.some(a => a.x >= x && a.x <= x + w && a.y >= y && a.y <= y + h);
          if (inside) f.atoms.forEach(a => this.selectedAtoms.add(a));
        }
      }
      return;
    }

    const wasDrag = this._downWasDrag;
    ui._endDrag();
    if (this.tool !== 'select') return;
    if (wasDrag) { this._mouseDownAtom = null; return; }

    const atom = this._mouseDownAtom;
    this._mouseDownAtom = null;
    if (!atom) {
      this.pendingAtoms = [];
      this.bondCandidate = null;
      this.breakCandidate = null;
      this.selectedAtoms.clear();
      this.hideOrderChip();
      return;
    }
    // toggle pending selection
    const idx = this.pendingAtoms.indexOf(atom);
    if (idx >= 0) this.pendingAtoms.splice(idx, 1);
    else {
      this.pendingAtoms.push(atom);
      if (this.pendingAtoms.length > 2) this.pendingAtoms = [atom];
    }
    this.bondCandidate = null;
    this.breakCandidate = null;
    this.hideOrderChip();
    if (this.pendingAtoms.length === 2) {
      const [a, b] = this.pendingAtoms;
      const bond = ui.bonds.find(bd => !bd.broken && bd.connects(a, b));
      if (bond) {
        this.breakCandidate = { bond };
        if (bond.order < 3) this.showOrderChip(bond);
      } else {
        this.bondCandidate = { a, b };
      }
    }
  },

  /** Pointer left the canvas (e.g. hovering a chip overlay) — end drag only, keep selections/chips */
  onMouseLeave() {
    this.marquee.active = false;
    ui._endDrag();
    this._mouseDownAtom = null;
    this._downWasDrag = false;
  },

  // ---- review-mode guard ----

  _atEnd() { return this.creatorPos === this.stepCount; },

  /**
   * Called before any structural edit. If reviewing an earlier step (◀), begin
   * re-recording THAT step in place (#5); later steps are kept and replay-validated
   * on save — only steps that genuinely conflict get truncated.
   */
  _guardEditable() {
    if (this.recording) return true;
    if (this._atEnd()) return true;
    const idx = this.creatorPos;   // 0-based index of the step to re-record (steps[idx])
    const stepName = (this.workingDoc.steps[idx] && this.workingDoc.steps[idx].title) || ('Step ' + (idx + 1));
    const ok = confirm(
      `要重新编辑「${stepName}」吗？\n\n` +
      `确定：以当前画面为基线重录这一步。保存时会自动校验后续步骤——仍能正常进行的步骤原样保留，只有真正冲突的步骤才会提示删除。\n` +
      `取消：保持回看，可用 ▶ 回到最新一步。`);
    if (!ok) { ui._updateStateIndicator('⏪ 已取消编辑 — 用 ▶ 可回到最新一步'); return false; }
    // begin an in-place re-record session for steps[idx]
    this._ensureIds();
    this.editingIndex = idx;
    this.baselineSnap = this.snapshot();
    this.recordSnaps = [this.baselineSnap];
    this.recording = true;
    this._setStepIcon(true);
    const old = this.workingDoc.steps[idx] || {};
    document.getElementById('ge-title').value = old.title || `Step ${idx + 1}: `;
    document.getElementById('ge-indication').value = old.indication || '';
    this.updateEditor();
    ui._updateStateIndicator(`⏺ 正在重录 Step ${idx + 1} — 完成修改并填写提示词后，点击保存步骤`);
    return true;
  },

  // ---- undo (creator structural undo, Ctrl+Z) ----

  _serializeStructure() {
    return {
      atoms: ui.atoms.map(a => ({
        id: a.id, el: a.element, x: a.x, y: a.y,
        electrons: a.electrons, implicitH: a.implicitH,
        label: a.label, visible: a.visible,
      })),
      bonds: ui.bonds.filter(b => !b.broken).map(b => ({
        a: b.a1.id, b: b.a2.id, order: b.order, breakable: b.breakable,
      })),
    };
  },

  pushUndo() {
    this._undoStack.push(this._serializeStructure());
    if (this._undoStack.length > 60) this._undoStack.shift();
  },

  undo() {
    // Block undo only when reviewing history AND not actively (re-)recording a step.
    if (!this._atEnd() && !this.recording) {
      ui._updateStateIndicator('⏪ 回看状态下不能撤销 — 直接编辑可从当前步重录，或用 ▶ 回到最新步');
      SoundFX.play('warn');
      return;
    }
    if (this._undoStack.length === 0) {
      ui._updateStateIndicator('↩ 没有可撤销的操作');
      SoundFX.play('warn');
      return;
    }
    const snap = this._undoStack.pop();
    if (!snap) { ui._updateStateIndicator('↩ 没有可撤销的操作'); SoundFX.play('warn'); return; }
    // If recording, also drop the matching action snapshot so it's not baked into the step.
    if (this.recording && Array.isArray(this.recordSnaps) && this.recordSnaps.length > 1) {
      this.recordSnaps.pop();
    }
    const byId = {};
    const atoms = snap.atoms.map(d => {
      const a = new Atom(d.el, d.x, d.y, {
        id: d.id, electrons: d.electrons, implicitH: d.implicitH, label: d.label,
      });
      a.visible = d.visible;
      byId[d.id] = a;
      return a;
    });
    const bonds = snap.bonds.map(b =>
      new Bond(byId[b.a], byId[b.b], b.order, bondStyleForOrder(b.order), { breakable: b.breakable }));
    ui.atoms = atoms;
    ui.bonds = bonds;
    this.selectedAtoms.clear();
    this.pendingAtoms = [];
    this.bondCandidate = null;
    this.breakCandidate = null;
    this.hideFlipChip();
    this.hideOrderChip();
    ui.afterStructureChange();
    ui._updateStateIndicator('↩ 已撤销上一步操作');
    SoundFX.play('back');
  },

  // ---- clipboard (Ctrl+C / Ctrl+V) ----

  copySelection() {
    const targets = this.selectedAtoms.size ? [...this.selectedAtoms] : [...this.pendingAtoms];
    if (targets.length === 0) {
      ui._updateStateIndicator('⚠️ 没有选中内容可复制（先框选或点选原子）');
      return;
    }
    const cx = targets.reduce((s, a) => s + a.x, 0) / targets.length;
    const cy = targets.reduce((s, a) => s + a.y, 0) / targets.length;
    const index = new Map(targets.map((a, i) => [a, i]));
    this._clipboard = {
      atoms: targets.map(a => ({
        el: a.element, dx: a.x - cx, dy: a.y - cy,
        electrons: a.electrons, implicitH: a.implicitH, label: a.label,
      })),
      bonds: ui.bonds.filter(b => !b.broken && index.has(b.a1) && index.has(b.a2))
        .map(b => ({ i: index.get(b.a1), j: index.get(b.a2), order: b.order, breakable: b.breakable })),
    };
    ui._updateStateIndicator(`📋 已复制 ${targets.length} 个原子（Ctrl+V 粘贴）`);
  },

  paste() {
    if (!this._guardEditable()) return;
    if (!this._clipboard) { ui._updateStateIndicator('⚠️ 剪贴板为空'); SoundFX.play('warn'); return; }
    this.pushUndo();
    const px = (ui.mouseX > 0 && ui.mouseX < ui.canvas.width) ? ui.mouseX : ui.canvas.width / 2;
    const py = (ui.mouseY > 0 && ui.mouseY < ui.canvas.height) ? ui.mouseY : ui.canvas.height / 2;
    const newAtoms = this._clipboard.atoms.map(d => {
      const a = new Atom(d.el, px + d.dx + 24, py + d.dy + 24, {
        id: this.newId(), electrons: d.electrons, implicitH: d.implicitH, label: d.label,
      });
      return a;
    });
    ui.atoms.push(...newAtoms);
    this._clipboard.bonds.forEach(b => {
      ui.bonds.push(new Bond(newAtoms[b.i], newAtoms[b.j], b.order, bondStyleForOrder(b.order), { breakable: b.breakable }));
    });
    this.selectedAtoms.clear();
    newAtoms.forEach(a => this.selectedAtoms.add(a));
    this.pendingAtoms = [];
    ui.afterStructureChange();
    this._recordSnap();
    ui._updateStateIndicator(`📋 已粘贴 ${newAtoms.length} 个原子`);
    SoundFX.play('connect');
  },

  /** Delete / Backspace hotkey — same as eraser on current selection */
  deleteHotkey() {
    const targets = this.selectedAtoms.size ? [...this.selectedAtoms] : [...this.pendingAtoms];
    if (targets.length === 0) {
      ui._updateStateIndicator('⚠️ 没有选中的原子 — 先框选或点选再按 Delete');
      SoundFX.play('warn');
      return;
    }
    if (!this._guardEditable()) return;
    this.pushUndo();
    this._removeAtoms(targets);
    ui._updateStateIndicator('🧹 已删除选中内容');
  },

  _removeAtoms(list) {
    for (const atom of list) {
      atom.bonds.slice().forEach(b => b.dissolve());
    }
    const gone = new Set(list);
    ui.atoms = ui.atoms.filter(a => !gone.has(a));
    list.forEach(a => this.selectedAtoms.delete(a));
    this.pendingAtoms = this.pendingAtoms.filter(a => !gone.has(a));
    this.bondCandidate = null;
    this.breakCandidate = null;
    this.hideOrderChip();
    ui.afterStructureChange();
    this._recordSnap();
    SoundFX.play('disconnect');
  },

  // ---- structural ops (with electron bookkeeping) ----

  formBond(a, b) {
    if (!this._guardEditable()) return;
    this.pushUndo();
    const bk = ChemRules.bookkeepForm(a, b);
    ui.bonds.push(new Bond(a, b, 1, 'single', { restLength: 60 }));
    if (bk.donor) ui._spawnElectronFlow(bk.donor, bk.donor === a ? b : a, 6);
    ui.afterStructureChange();
    this._recordSnap();
    ui._updateStateIndicator('🔗 已成键' + (bk.mode === 'none' ? '（⚠ 双方都没有可用电子）' : ''));
    SoundFX.play('connect');
  },

  breakBondOneOrder(bond) {
    if (!this._guardEditable()) return;
    if (!bond.breakable) {
      this.showTransientBubble(bond.a1, '⛔ 这是不可断开的锚定键（R 基连接处）', 'error');
      SoundFX.play('error');
      return;
    }
    this.pushUndo();
    const rec = ChemRules.bookkeepBreak(bond.a1, bond.a2);
    if (bond.order > 1) bond.setOrder(bond.order - 1);
    else bond.dissolve();
    ui.afterStructureChange();
    this._recordSnap();   // snapshot the break BEFORE flip-chip; flip-chip will update this same snapshot
    this.showFlipChip(rec);
    ui._updateStateIndicator('✂️ 已断键 — 默认异裂，电子对给电负性大的一方（小标签可改，Enter 确认）');
    SoundFX.play('disconnect');
  },

  raiseOrder(bond) {
    if (!this._guardEditable()) return;
    if (!bond || bond.broken || bond.order >= 3) return;
    this.pushUndo();
    const bk = ChemRules.bookkeepRaiseOrder(bond.a1, bond.a2);
    bond.setOrder(bond.order + 1);
    if (bk.donor) ui._spawnElectronFlow(bk.donor, bk.donor === bond.a1 ? bond.a2 : bond.a1, 6);
    this.hideOrderChip();
    this.pendingAtoms = [];
    this.breakCandidate = null;
    ui.afterStructureChange();
    this._recordSnap();
    ui._updateStateIndicator('⇧ 键级已提升' + (bk.mode === 'none' ? '（⚠ 没有可用孤对电子）' : ''));
    SoundFX.play('connect');
  },

  // ---- π-bond as nucleophile (a double/triple bond's electron pair attacks an atom) ----

  /** Nearest non-broken multiple bond whose line is under `pos` (away from the endpoints). */
  _hitBond(pos) {
    let best = null, bestD = 13;
    for (const b of ui.bonds) {
      if (b.broken || b.order < 2) continue;
      const x1 = b.a1.x, y1 = b.a1.y, x2 = b.a2.x, y2 = b.a2.y;
      const dx = x2 - x1, dy = y2 - y1, len2 = dx * dx + dy * dy || 1;
      let t = ((pos.x - x1) * dx + (pos.y - y1) * dy) / len2;
      t = Math.max(0, Math.min(1, t));
      const cx = x1 + t * dx, cy = y1 + t * dy;
      const d = Math.hypot(pos.x - cx, pos.y - cy);
      if (d < bestD && t > 0.22 && t < 0.78) { bestD = d; best = b; }
    }
    return best;
  },

  _closePiMenu() { const m = document.getElementById('pi-menu'); if (m) m.remove(); },

  _openPiMenu(bond, target) {
    this._closePiMenu();
    const el = a => a.element + (a.label ? `(${a.label})` : '');
    const menu = document.createElement('div');
    menu.id = 'pi-menu';
    menu.style.cssText = 'position:absolute;z-index:28;display:flex;flex-direction:column;gap:4px;padding:7px;background:rgba(22,22,34,0.97);border:1px solid var(--border-active);border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,0.5);font-size:12px;';
    const mk = (txt, fn) => {
      const b = document.createElement('button');
      b.textContent = txt;
      b.style.cssText = 'border:1px solid var(--border-subtle);background:var(--bg-surface);color:var(--text-primary);border-radius:8px;padding:5px 11px;cursor:pointer;white-space:nowrap;text-align:left;';
      b.addEventListener('mouseenter', () => { b.style.borderColor = 'var(--border-active)'; });
      b.addEventListener('mouseleave', () => { b.style.borderColor = 'var(--border-subtle)'; });
      b.addEventListener('click', (e) => { e.stopPropagation(); fn(); this._closePiMenu(); });
      menu.appendChild(b);
    };
    mk('⬡ 对称进攻 → 三元环', () => this.piAttack(bond, target, 'ring'));
    mk(`→ 加成到 ${el(bond.a1)}`, () => this.piAttack(bond, target, 'a1'));
    mk(`→ 加成到 ${el(bond.a2)}`, () => this.piAttack(bond, target, 'a2'));
    mk('✕ 取消', () => { this.piSource = null; });
    document.getElementById('canvas-wrap').appendChild(menu);
    menu.style.left = (target.x + 16) + 'px';
    menu.style.top = (target.y - 10) + 'px';
  },

  /**
   * A π pair attacks `target`. mode:
   *   'ring' — symmetric: both bonded atoms bond to target → 3-membered ring; target donates a pair (→ +1, bromonium-like).
   *   'a1'/'a2' — biased: only that carbon bonds to target; the other becomes a carbocation (auto via formal charge).
   */
  piAttack(bond, target, mode) {
    if (!this._guardEditable()) { this.piSource = null; return; }
    if (!bond || bond.broken || bond.order < 2) { this.piSource = null; return; }
    if (target === bond.a1 || target === bond.a2) { this.piSource = null; return; }
    this.pushUndo();
    const a1 = bond.a1, a2 = bond.a2;
    bond.setOrder(bond.order - 1);
    if (mode === 'ring') {
      ui.bonds.push(new Bond(a1, target, 1, 'single', { restLength: 60 }));
      ui.bonds.push(new Bond(a2, target, 1, 'single', { restLength: 60 }));
      if (elemData(target.element).v != null && target.electrons >= 2) target.electrons -= 2; // donate a pair → +1
      ui._spawnElectronFlow(a1, target, 5); ui._spawnElectronFlow(a2, target, 5);
    } else {
      const c = (mode === 'a2') ? a2 : a1;
      ui.bonds.push(new Bond(c, target, 1, 'single', { restLength: 60 }));
      ui._spawnElectronFlow(c, target, 6);
    }
    this.piSource = null;
    ui.afterStructureChange();
    this._recordSnap();
    ui._updateStateIndicator(mode === 'ring'
      ? '⬡ π 键对称进攻 → 三元环（目标原子带正电）'
      : '→ π 键偏向进攻，另一端成碳正离子');
    SoundFX.play('connect');
  },

  eraseAtom(atom) {
    if (!this._guardEditable()) return;
    this.pushUndo();
    this._removeAtoms([atom]);
  },

  eraseSelection() {
    if (!this._guardEditable()) return;
    if (this.selectedAtoms.size === 0) return;
    this.pushUndo();
    this._removeAtoms([...this.selectedAtoms]);
    ui._updateStateIndicator('🧹 已删除选中内容');
  },

  // ---- step navigation (review recorded steps inside creator) ----

  _atomByIdLocal(id) { return ui.atoms.find(a => a.id === id) || null; },
  _bondByIdsLocal(idA, idB) {
    const a = this._atomByIdLocal(idA), b = this._atomByIdLocal(idB);
    if (!a || !b) return null;
    return ui.bonds.find(bd => !bd.broken && bd.connects(a, b)) || null;
  },

  _applyDeltaLocal(delta, forward) {
    if (forward) {
      (delta.bondsBroken || []).forEach(bb => { const bd = this._bondByIdsLocal(bb.a, bb.b); if (bd) bd.dissolve(); });
      (delta.orderChanges || []).forEach(oc => { const bd = this._bondByIdsLocal(oc.a, oc.b); if (bd) bd.setOrder(oc.to); });
      (delta.bondsFormed || []).forEach(bf => {
        const a = this._atomByIdLocal(bf.a), b = this._atomByIdLocal(bf.b);
        if (a && b) ui.bonds.push(new Bond(a, b, bf.order || 1, bondStyleForOrder(bf.order || 1), { restLength: 60, breakable: bf.breakable !== false }));
      });
      (delta.lonePairChanges || []).forEach(lp => { const a = this._atomByIdLocal(lp.atom); if (a) a.electrons = lp.to * 2 + (a.electrons % 2); });
      (delta.radicalChanges || []).forEach(rc => { const a = this._atomByIdLocal(rc.atom); if (a) a.electrons = Math.floor(a.electrons / 2) * 2 + (rc.to ? 1 : 0); });
      (delta.hide || []).forEach(id => { const a = this._atomByIdLocal(id); if (a) { a.visible = false; a.vx = 0; a.vy = 0; } });
      (delta.show || []).forEach(id => { const a = this._atomByIdLocal(id); if (a) a.visible = true; });
    } else {
      (delta.show || []).forEach(id => { const a = this._atomByIdLocal(id); if (a) a.visible = false; });
      (delta.hide || []).forEach(id => { const a = this._atomByIdLocal(id); if (a) { a.visible = true; a.vx = 0; a.vy = 0; } });
      (delta.radicalChanges || []).forEach(rc => { const a = this._atomByIdLocal(rc.atom); if (a) a.electrons = Math.floor(a.electrons / 2) * 2 + (rc.from ? 1 : 0); });
      (delta.lonePairChanges || []).forEach(lp => { const a = this._atomByIdLocal(lp.atom); if (a) a.electrons = lp.from * 2 + (a.electrons % 2); });
      (delta.bondsFormed || []).forEach(bf => { const bd = this._bondByIdsLocal(bf.a, bf.b); if (bd) bd.dissolve(); });
      (delta.orderChanges || []).forEach(oc => { const bd = this._bondByIdsLocal(oc.a, oc.b); if (bd) bd.setOrder(oc.from); });
      (delta.bondsBroken || []).forEach(bb => {
        const a = this._atomByIdLocal(bb.a), b = this._atomByIdLocal(bb.b);
        if (a && b) ui.bonds.push(new Bond(a, b, bb.order || 1, bondStyleForOrder(bb.order || 1), { restLength: 60 }));
      });
    }
    ui.afterStructureChange();
  },

  _stepMicrosLocal(step) {
    if (Array.isArray(step.micro)) return step.micro;
    return [{ delta: step.delta || {}, gated: true, trigger: step.trigger }];
  },
  _applyStepLocal(step, forward) {
    const micros = this._stepMicrosLocal(step);
    if (forward) for (const m of micros) this._applyDeltaLocal(m.delta || {}, true);
    else for (let i = micros.length - 1; i >= 0; i--) this._applyDeltaLocal(micros[i].delta || {}, false);
  },

  stepBack() {
    if (this.recording) { ui._updateStateIndicator('⚠️ 录制中无法回看 — 先保存或取消当前步骤'); return; }
    if (!this.workingDoc || this.creatorPos <= 0) { ui._updateStateIndicator('⏮ 已经在 Step 0（初始状态）'); return; }
    this._undoStack = []; // undo snapshots belong to a different timeline position
    this.creatorPos--;
    this._applyStepLocal(this.workingDoc.steps[this.creatorPos], false);
    this.hideFlipChip();
    this.hideOrderChip();
    this.updateEditor();
    ui._updateStateIndicator(`⏪ 回看：Step ${this.creatorPos}/${this.stepCount}（此处编辑可就地重录这一步，后续步骤会自动校验保留）`);
  },

  stepFwd() {
    if (this.recording) return;
    if (!this.workingDoc || this.creatorPos >= this.stepCount) { ui._updateStateIndicator('⏭ 已经在最新一步'); return; }
    this._undoStack = [];
    this._applyStepLocal(this.workingDoc.steps[this.creatorPos], true);
    this.creatorPos++;
    this.updateEditor();
    ui._updateStateIndicator(this._atEnd()
      ? `▶ 已回到最新步 Step ${this.creatorPos}/${this.stepCount}，可以继续编辑`
      : `⏩ 回看：Step ${this.creatorPos}/${this.stepCount}`);
  },

  // ---- open existing reaction file for continued editing ----

  async openFile() {
    if (this.recording) { ui._updateStateIndicator('⚠️ 请先保存当前正在录制的步骤'); return; }
    let doc = null, handle = null;
    try {
      if (window.showOpenFilePicker) {
        try {
          [handle] = await window.showOpenFilePicker({
            types: [{ description: 'CME Reaction', accept: { 'application/json': ['.json'] } }],
          });
        } catch (e) { if (e && e.name === 'AbortError') return; throw e; }
        const f = await handle.getFile();
        doc = JSON.parse(await f.text());
      } else {
        doc = await new Promise((resolve, reject) => {
          const input = document.getElementById('file-open-fallback');
          const onChange = async () => {
            input.removeEventListener('change', onChange);
            if (!input.files.length) { resolve(null); return; }
            try { resolve(JSON.parse(await input.files[0].text())); }
            catch (e) { reject(e); }
            input.value = '';
          };
          input.addEventListener('change', onChange);
          input.click();
        });
        if (!doc) return;
      }
    } catch (e) {
      alert('打开文件失败：' + (e.message || e));
      return;
    }
    const v = validateDoc(doc);
    if (!v.ok) { alert('不是有效的反应文件：\n' + v.errors.join('\n')); return; }
    // rebuild canvas to the file's FINAL state so new steps can be appended
    player.loadDoc(doc);
    while (player.advanceStep()) { /* fast-forward */ }
    ui.showCongrats = false;
    ui.fireworkParticles = [];
    this.workingDoc = (typeof structuredClone === 'function') ? structuredClone(doc) : JSON.parse(JSON.stringify(doc));
    this._ingestEnergyProfile(doc);
    this.initialCaptured = true;
    this.creatorPos = this.stepCount;
    this._undoStack = [];
    this.dirty = false;
    this.recording = false;
    this.baselineSnap = null;
    if (handle) FileIO.currentHandle = handle;
    this.dismissed.clear();
    this._setStepIcon(false);
    this.updateEditor();
    this.refreshErrors();
    ui._updateStateIndicator(`📂 已打开「${doc.name}」（${doc.steps.length} 步）— 画布处于最终状态，可继续追加步骤`);
  },

  clearCanvas() {
    if (!confirm('确认清空画布？这将丢弃当前未保存的创作内容（已保存的文件不受影响）。')) return;
    ui.setStructure([], [], []);
    this.workingDoc = {
      format: CME_FORMAT, name: 'Untitled Reaction', description: '',
      canvas: null,
      ready: { title: 'Step 0: Ready State', indication: '' },
      initial: null, steps: [],
    };
    this.initialCaptured = false;
    this.recording = false;
    this.baselineSnap = null;
    this.dirty = false;
    this.creatorPos = 0;
    this._undoStack = [];
    FileIO.currentHandle = null;
    this.pendingAtoms = [];
    this.selectedAtoms.clear();
    this.bondCandidate = null;
    this.breakCandidate = null;
    this.dismissed.clear();
    this._clearBubbles();
    this.hideFlipChip();
    this.hideOrderChip();
    this._setStepIcon(false);
    this.updateEditor();
    ui._updateStateIndicator('🗑️ 画布已清空');
  },

  // ---- SMILES import ----

  importSmilesFromWindow() {
    const input = document.getElementById('sw-input');
    const allH = document.getElementById('sw-allh').checked;
    const msg = document.getElementById('sw-msg');
    if (!this._guardEditable()) {
      msg.className = 'err';
      msg.textContent = '正在回看历史步骤，回到最新步后才能导入';
      return;
    }
    const lines = input.value.split(/\r?\n/).map(s => s.trim()).filter(s => s.length > 0);
    if (lines.length === 0) {
      msg.className = 'err';
      msg.textContent = '请先粘贴 SMILES';
      return;
    }
    // stage everything first — only mutate the canvas when ALL lines parse
    const staged = [];
    try {
      for (const smi of lines) {
        staged.push(importSmiles(smi, allH, () => this.newId()));
      }
    } catch (e) {
      msg.className = 'err';
      msg.textContent = e.message || String(e);
      return;
    }
    this.pushUndo();
    const formulas = [];
    staged.forEach(({ atoms, bonds }, offsetIdx) => {
      const cx = ui.canvas.width / 2 + ((offsetIdx % 3) - 1) * 180 + (Math.random() - 0.5) * 60;
      const cy = ui.canvas.height / 2 + (Math.floor(offsetIdx / 3) % 3 - 1) * 140 + (Math.random() - 0.5) * 40;
      atoms.forEach(a => { a.x += cx; a.y += cy; a.ox = a.x; a.oy = a.y; });
      ui.atoms.push(...atoms);
      ui.bonds.push(...bonds);
      formulas.push(autoFormula(atoms));
    });
    ui.afterStructureChange();
    this._recordSnap();
    msg.className = 'ok';
    msg.textContent = '✔ 已导入 ' + formulas.join('、');
    input.value = '';
  },

  // ---- step recording ----

  _setStepIcon(recording) {
    const btn = document.getElementById('ct-step');
    btn.innerHTML = recording ? ICON_PAPER_PENCIL : ICON_PAPER;
    btn.classList.toggle('active', recording);
    btn.title = recording ? '保存步骤 / Save step' : '创建步骤 / Create step';
  },

  /** Capture a snapshot for the in-progress step (one per discrete gateable action). */
  _recordSnap() {
    if (this.recording && Array.isArray(this.recordSnaps)) this.recordSnaps.push(this.snapshot());
  },
  /** Update the most recent action snapshot in place (used by flip-chip electron tweaks). */
  _recordSnapReplace() {
    if (this.recording && Array.isArray(this.recordSnaps) && this.recordSnaps.length > 1) {
      this.recordSnaps[this.recordSnaps.length - 1] = this.snapshot();
    }
  },

  snapshot() {
    const bondKey = b => (b.a1.id < b.a2.id) ? b.a1.id + '|' + b.a2.id : b.a2.id + '|' + b.a1.id;
    const bonds = new Map();
    ui.bonds.forEach(b => { if (!b.broken) bonds.set(bondKey(b), b.order); });
    const electrons = new Map();
    const visible = new Map();
    const atomIds = new Set();
    let totalCharge = 0;
    ui.atoms.forEach(a => {
      electrons.set(a.id, a.electrons);
      visible.set(a.id, a.visible);
      atomIds.add(a.id);
      totalCharge += a.charge;
    });
    return { bonds, electrons, visible, atomIds, totalCharge };
  },

  captureInitial() {
    this._ensureIds();
    this.workingDoc.canvas = { w: ui.canvas.width, h: ui.canvas.height };
    this.workingDoc.initial = {
      atoms: ui.atoms.map(a => ({
        id: a.id, el: a.element,
        x: Math.round(a.x), y: Math.round(a.y),
        lonePairs: a.lonePairs,
        radical: a.radical || undefined,
        implicitH: a.implicitH || undefined,
        label: a.label || undefined,
        hidden: a.visible ? undefined : true,
      })),
      bonds: ui.bonds.filter(b => !b.broken).map(b => ({
        a: b.a1.id, b: b.a2.id, order: b.order,
        breakable: b.breakable ? undefined : false,
      })),
    };
  },

  _serializeAtomById(id) {
    const a = ui.atoms.find(x => x.id === id);
    if (!a) return null;
    return {
      id: a.id, el: a.element,
      x: Math.round(a.x), y: Math.round(a.y),
      lonePairs: a.lonePairs,
      radical: a.radical || undefined,
      implicitH: a.implicitH || undefined,
      label: a.label || undefined,
    };
  },

  diffSnaps(base, cur) {
    const delta = { bondsFormed: [], bondsBroken: [], orderChanges: [], lonePairChanges: [], radicalChanges: [], hide: [], show: [] };
    for (const [key, order] of cur.bonds) {
      const [a, b] = key.split('|');
      if (!base.bonds.has(key)) delta.bondsFormed.push({ a, b, order });
      else if (base.bonds.get(key) !== order) delta.orderChanges.push({ a, b, from: base.bonds.get(key), to: order });
    }
    for (const [key, order] of base.bonds) {
      if (!cur.bonds.has(key)) {
        const [a, b] = key.split('|');
        delta.bondsBroken.push({ a, b, order });
      }
    }
    for (const [id, e] of cur.electrons) {
      if (!base.electrons.has(id)) continue; // new atom — merged into initial separately
      const e0 = base.electrons.get(id);
      if (e0 === e) continue;
      const lp0 = Math.floor(e0 / 2), lp1 = Math.floor(e / 2);
      if (lp0 !== lp1) delta.lonePairChanges.push({ atom: id, from: lp0, to: lp1 });
      if ((e0 % 2) !== (e % 2)) delta.radicalChanges.push({ atom: id, from: e0 % 2 === 1, to: e % 2 === 1 });
    }
    for (const [id, vis] of cur.visible) {
      if (!base.visible.has(id)) continue;
      const v0 = base.visible.get(id);
      if (v0 === vis) continue;
      if (vis) delta.show.push(id); else delta.hide.push(id);
    }
    // erased atoms → hide (they remain in the file's initial state)
    for (const id of base.atomIds) {
      if (!cur.atomIds.has(id)) delta.hide.push(id);
    }
    return delta;
  },

  _mergeAddedIntoInitial(addedIds, delta) {
    const addedSet = new Set(addedIds);
    for (const id of addedIds) {
      const ser = this._serializeAtomById(id);
      if (ser) this.workingDoc.initial.atoms.push(ser);
    }
    delta.bondsFormed = delta.bondsFormed.filter(bf => {
      if (addedSet.has(bf.a) && addedSet.has(bf.b)) {
        this.workingDoc.initial.bonds.push({ a: bf.a, b: bf.b, order: bf.order });
        return false;
      }
      return true;
    });
    delta.lonePairChanges = delta.lonePairChanges.filter(c => !addedSet.has(c.atom));
    delta.radicalChanges = delta.radicalChanges.filter(c => !addedSet.has(c.atom));
  },

  // ---- micro / gate helpers (#3) ----

  _deltaEmpty(d) {
    return !['bondsFormed','bondsBroken','orderChanges','lonePairChanges','radicalChanges','hide','show']
      .some(k => (d[k] || []).length);
  },
  _tidyDelta(d) {
    const o = {};
    Object.keys(d).forEach(k => { if (d[k] && d[k].length) o[k] = d[k]; });
    return o;
  },
  _inferMicroTrigger(d) {
    if ((d.bondsFormed || []).length) { const x = d.bondsFormed[0]; return { type: 'approach', pair: [x.a, x.b] }; }
    if ((d.bondsBroken || []).length) { const x = d.bondsBroken[0]; return { type: 'clickBond', bond: [x.a, x.b] }; }
    const dec = (d.orderChanges || []).find(o => o.to < o.from);
    if (dec) return { type: 'clickBond', bond: [dec.a, dec.b] };
    return null;
  },
  _microLabel(d) {
    const al = id => { const a = ui.atoms.find(x => x.id === id); return a ? `${a.element}${a.label ? '(' + a.label + ')' : ''}` : id; };
    if ((d.bondsFormed || []).length) { const x = d.bondsFormed[0]; return `🧲 拖近成键：${al(x.a)} — ${al(x.b)}`; }
    if ((d.bondsBroken || []).length) { const x = d.bondsBroken[0]; return `✂️ 点击断键：${al(x.a)} — ${al(x.b)}`; }
    const dec = (d.orderChanges || []).find(o => o.to < o.from);
    if (dec) return `✂️ 点击降键级：${al(dec.a)} — ${al(dec.b)}`;
    return '（自动应用，无需玩家操作）';
  },

  /** Build the micro list for the step being saved. Returns array, or null if cancelled. */
  async _buildMicros(snaps, baseline, final, added) {
    const whole = this.diffSnaps(baseline, final);
    if (added.length) this._mergeAddedIntoInitial(added, whole);

    // candidate sub-actions from consecutive snapshots (skip when atoms were imported mid-step)
    let candMicros = [];
    if (!added.length) {
      for (let i = 1; i < snaps.length; i++) {
        const d = this.diffSnaps(snaps[i - 1], snaps[i]);
        if (!this._deltaEmpty(d)) candMicros.push(d);
      }
    }
    // ▶ Strip TRANSIENT bond toggles: a bond identical in baseline & final that was
    //   broken/reformed (or order-toggled) mid-step is an accidental round-trip — drop
    //   those micros entirely so they don't auto-play (fixes the "OH auto-detaches" bug).
    const bkey = (a, b) => a < b ? a + '|' + b : b + '|' + a;
    const stable = key => (baseline.bonds.has(key) === final.bonds.has(key)) && (baseline.bonds.get(key) === final.bonds.get(key));
    candMicros = candMicros.filter(d => {
      const bondEntries = [...(d.bondsFormed || []), ...(d.bondsBroken || []), ...(d.orderChanges || [])];
      if (bondEntries.length === 0) return true;                    // electron-only micro → keep
      const allStable = bondEntries.every(x => stable(bkey(x.a, x.b)));
      return !allStable;                                            // drop micros that only touch net-unchanged bonds
    });
    const gateableCount = candMicros.filter(d => this._inferMicroTrigger(d)).length;

    if (added.length || candMicros.length <= 1 || gateableCount <= 1) {
      // single-gate step — coalesce everything into one micro
      const trig = this._inferMicroTrigger(whole);
      return [{ delta: this._tidyDelta(whole), gated: true, trigger: trig || { type: 'none' } }];
    }

    // multiple gateable sub-actions → checkbox modal (sequential gates)
    const checked = await this._askGates(candMicros);
    if (checked === null) return null;
    const micro = candMicros.map(d => {
      const trig = this._inferMicroTrigger(d);
      const isGate = !!(trig && checked.has(d));
      return { delta: this._tidyDelta(d), gated: isGate, trigger: isGate ? trig : undefined };
    });
    if (!micro.some(m => m.gated)) {                  // force ≥1 gate
      const k = candMicros.findIndex(d => this._inferMicroTrigger(d));
      if (k >= 0) { micro[k].gated = true; micro[k].trigger = this._inferMicroTrigger(candMicros[k]); }
    }
    return micro;
  },

  /** Checkbox modal: which sub-actions are player gates. Resolves to a Set of micro-delta objects, or null. */
  _askGates(candMicros) {
    return new Promise(resolve => {
      this._gateResolve = resolve;
      this._gateCands = candMicros;
      const box = document.getElementById('trigger-options');
      box.innerHTML = '';
      const intro = document.getElementById('trigger-intro');
      if (intro) intro.textContent = '本步包含多个动作。勾选哪些需要玩家亲手完成（按顺序）；未勾选的会在玩家完成勾选动作时自动发生。';
      candMicros.forEach((d, i) => {
        if (!this._inferMicroTrigger(d)) return;       // electron-only shuffles aren't gateable
        const lbl = document.createElement('label');
        lbl.className = 'trig-option';
        lbl.innerHTML = `<input type="checkbox" data-idx="${i}" checked> <span>${this._microLabel(d)}</span>`;
        box.appendChild(lbl);
      });
      document.getElementById('trigger-modal').style.display = 'flex';
    });
  },

  /** Simulate applying a tail step's delta on a lightweight state; false if a ref is missing (#5). */
  _simApplyDelta(d, st) {
    const key = (a, b) => a < b ? a + '|' + b : b + '|' + a;
    for (const x of (d.bondsBroken || [])) if (!st.bonds.has(key(x.a, x.b))) return false;
    for (const x of (d.orderChanges || [])) { const k = key(x.a, x.b); if (!st.bonds.has(k) || st.bonds.get(k) !== x.from) return false; }
    for (const x of (d.bondsFormed || [])) { if (!st.atomIds.has(x.a) || !st.atomIds.has(x.b)) return false; if (st.bonds.has(key(x.a, x.b))) return false; }
    for (const x of (d.lonePairChanges || [])) if (!st.atomIds.has(x.atom)) return false;
    for (const id of (d.hide || [])) if (!st.atomIds.has(id)) return false;
    for (const id of (d.show || [])) if (!st.atomIds.has(id)) return false;
    (d.bondsBroken || []).forEach(x => st.bonds.delete(key(x.a, x.b)));
    (d.orderChanges || []).forEach(x => st.bonds.set(key(x.a, x.b), x.to));
    (d.bondsFormed || []).forEach(x => st.bonds.set(key(x.a, x.b), x.order || 1));
    (d.hide || []).forEach(id => st.visible.set(id, false));
    (d.show || []).forEach(id => st.visible.set(id, true));
    return true;
  },

  /** Replay tail steps on the CURRENT canvas state; return how many apply cleanly before a conflict. */
  _validateTailFromCurrent(tail) {
    const cur = this.snapshot();
    const st = { bonds: new Map(cur.bonds), electrons: new Map(cur.electrons), visible: new Map(cur.visible), atomIds: new Set(cur.atomIds) };
    let okCount = 0;
    for (let i = 0; i < tail.length; i++) {
      const micros = this._stepMicrosLocal(tail[i]);
      let ok = true;
      for (const m of micros) { if (!this._simApplyDelta(m.delta || {}, st)) { ok = false; break; } }
      if (!ok) return { okCount, conflictIdx: i };
      okCount++;
    }
    return { okCount, conflictIdx: -1 };
  },

  _finishRecording() {
    this.recording = false;
    this.baselineSnap = null;
    this.recordSnaps = null;
    this.editingIndex = null;
    this._setStepIcon(false);
  },

  async startOrSaveStep() {
    if (!this.recording) {
      if (!this._guardEditable()) return;
      if (this.recording) return;     // _guardEditable started an in-place re-record session
      if (ui.atoms.length === 0) {
        ui._updateStateIndicator('⚠️ 画布为空 — 先用「导入」按钮添加分子');
        return;
      }
      this._ensureIds();
      if (!this.initialCaptured) {
        this.captureInitial();
        this.initialCaptured = true;
      }
      this.editingIndex = null;
      this.baselineSnap = this.snapshot();
      this.recordSnaps = [this.baselineSnap];
      this.recording = true;
      this._setStepIcon(true);
      document.getElementById('ge-title').value = `Step ${this.stepCount + 1}: `;
      document.getElementById('ge-indication').value = '';
      this.updateEditor();
      ui._updateStateIndicator(`⏺ 正在录制 Step ${this.stepCount + 1} — 完成成键/断键等操作并填写提示词后，再次点击保存（可先连一根键再断另一根键，保存时勾选哪些需玩家亲手做）`);
      return;
    }

    // ---- save step ----
    const editing = this.editingIndex != null;
    const baseline = (this.recordSnaps && this.recordSnaps[0]) || this.baselineSnap;
    const snaps = (this.recordSnaps && this.recordSnaps.length) ? this.recordSnaps : [baseline, this.snapshot()];
    const final = this.snapshot();
    const added = [...final.atomIds].filter(id => !baseline.atomIds.has(id));
    const consMsgs = ChemRules.conservationCheck(baseline, final);

    if (this._deltaEmpty(this.diffSnaps(baseline, final)) && !added.length) {
      this._finishRecording();
      this.updateEditor();
      ui._updateStateIndicator('⚠️ 本步未检测到任何结构变化，未保存');
      return;
    }

    const micro = await this._buildMicros(snaps, baseline, final, added);
    if (micro === null) { ui._updateStateIndicator('已取消保存（仍在录制中）'); return; }

    const stepNum1 = (editing ? this.editingIndex : this.stepCount) + 1;
    const title = document.getElementById('ge-title').value.trim() || `Step ${stepNum1}`;
    const indication = document.getElementById('ge-indication').value.trim();
    const newStep = { title, indication, micro };

    if (editing) {
      const idx = this.editingIndex;
      const oldStep = this.workingDoc.steps[idx];
      const tail = this.workingDoc.steps.slice(idx + 1);
      this.workingDoc.steps[idx] = newStep;
      // #5 replay-validate: keep tail steps that still apply; only truncate at the first real conflict
      const res = this._validateTailFromCurrent(tail);
      if (res.conflictIdx >= 0) {
        const conflictNum = idx + 1 + res.conflictIdx + 1;
        const dropCount = tail.length - res.conflictIdx;
        const proceed = confirm(
          `已重录 Step ${idx + 1}。\n` +
          (res.okCount > 0 ? `后续 Step ${idx + 2} ~ Step ${idx + 1 + res.okCount} 仍然适用，已自动保留。\n` : '') +
          `但 Step ${conflictNum} 起与新步骤冲突（引用了已不存在的键/原子，无法继续）。\n\n` +
          `确定：删除 Step ${conflictNum} 及其后共 ${dropCount} 个步骤。\n` +
          `取消：放弃本次重录，恢复原来的 Step ${idx + 1}。`);
        if (!proceed) {
          this.workingDoc.steps[idx] = oldStep;        // revert
          this._finishRecording();
          // restore canvas to post-old-step idx by rebuilding from initial up to idx+1
          this._rebuildCanvasTo(idx + 1);
          this.creatorPos = idx + 1;
          this.updateEditor();
          ui._updateStateIndicator('↩ 已取消重录，恢复原步骤');
          return;
        }
        this.workingDoc.steps.length = idx + 1 + res.okCount;
      }
      this.creatorPos = idx + 1;
      this._finishRecording();
      this.dirty = true;
      this.updateEditor();
      const kept = Math.min(res.okCount, tail.length);
      ui._updateStateIndicator(`✔ 已重录 Step ${idx + 1}` +
        (res.conflictIdx < 0 && tail.length ? `，后续 ${tail.length} 步全部保留` :
         res.okCount ? `，保留后续 ${kept} 步` : ''));
    } else {
      this.workingDoc.steps.push(newStep);
      this.creatorPos = this.stepCount;
      this._finishRecording();
      this.dirty = true;
      this.updateEditor();
      const warn = consMsgs.length ? ('　⚠ ' + consMsgs.join('；')) : '';
      document.getElementById('ge-status').textContent = `✔ Step ${this.stepCount} 已保存${warn}`;
      document.getElementById('ge-status').style.color = consMsgs.length ? '#ffd54f' : '';
      ui._updateStateIndicator(`✔ Step ${this.stepCount} 已保存${warn}`);
    }
  },

  /** Rebuild the canvas from initial and replay the first N steps (used to revert an aborted re-record). */
  _rebuildCanvasTo(n) {
    const json = this.buildDocJson();
    player.loadDoc(json);
    for (let i = 0; i < n; i++) player.advanceStep();
    ui.appMode = 'create';
    ui.showCongrats = false;
    ui.fireworkParticles = [];
  },

  // ---- save to file ----

  buildDocJson() {
    const steps = this.workingDoc.steps.map(s => {
      const out = { title: s.title, indication: s.indication };
      if (Array.isArray(s.micro) && s.micro.length > 1) {
        // multi-gate step → emit the micro array
        out.micro = s.micro.map(m => {
          const mm = { delta: this._tidyDelta(m.delta || {}) };
          if (m.gated !== false) { mm.gated = true; if (m.trigger) mm.trigger = m.trigger; }
          else mm.gated = false;
          return mm;
        });
      } else {
        // single-gate (or legacy) → compact { trigger, delta }
        const only = Array.isArray(s.micro) ? s.micro[0] : null;
        const delta = only ? this._tidyDelta(only.delta || {}) : this._tidyDelta(s.delta || {});
        const trigger = only ? (only.trigger || { type: 'none' }) : (s.trigger || { type: 'none' });
        out.trigger = trigger;
        out.delta = delta;
      }
      if (typeof s.energy === 'number') out.energy = s.energy;
      if (s.energyLabel) out.energyLabel = s.energyLabel;
      if (s.fireworks) out.fireworks = true;
      return out;
    });
    if (steps.length > 0) steps[steps.length - 1].fireworks = true; // celebrate the final step
    const json = {
      format: CME_FORMAT,
      name: this.workingDoc.name || 'Untitled Reaction',
      description: this.workingDoc.description || '',
      canvas: this.workingDoc.canvas || { w: ui.canvas.width, h: ui.canvas.height },
      ready: this.workingDoc.ready || { title: 'Step 0: Ready State', indication: '' },
      initial: this.workingDoc.initial,
      steps,
    };
    if (this.workingDoc.completeIndication) json.completeIndication = this.workingDoc.completeIndication;
    // Always emit a ΔG profile (heuristic where the creator didn't override) so players see a curve.
    if (steps.length > 0) json.energyProfile = buildEnergyProfile(this.workingDoc);
    return json;
  },

  async saveAs() {
    if (!this.initialCaptured) {
      ui._updateStateIndicator('⚠️ 还没有可保存的内容 — 先点击「创建步骤」记录初始状态并录制步骤');
      return;
    }
    if (this.recording) { ui._updateStateIndicator('⚠️ 请先保存当前正在录制的步骤'); return; }
    // NOTE: no prompt() here — a prompt consumes the user gesture and
    // showSaveFilePicker would then throw "Must be handling a user gesture".
    // The reaction name lives in the #ge-name field instead.
    const typedName = document.getElementById('ge-name').value.trim();
    this.workingDoc.name = typedName || this.workingDoc.name || 'My Reaction';
    let json = this.buildDocJson();
    const v = validateDoc(json);
    if (!v.ok) { alert('文件校验失败：\n' + v.errors.join('\n')); return; }
    const suggested = (this.workingDoc.name.replace(/[\\/:*?"<>|\s]+/g, '-') || 'reaction') + '.cme.json';
    try {
      const h = await FileIO.saveJsonAs(json, suggested);
      if (h === undefined) return; // cancelled
      const actualFile = (h && h.name) ? h.name : suggested;
      // If the user never set a name but typed a filename in the OS dialog,
      // adopt that filename as the reaction's internal name (and rewrite the file).
      const generic = !typedName && ['My Reaction', 'Untitled Reaction', ''].includes(this.workingDoc.name);
      if (generic) {
        const stem = actualFile.replace(/\.cme\.json$/i, '').replace(/\.json$/i, '');
        if (stem) {
          this.workingDoc.name = stem;
          document.getElementById('ge-name').value = stem;
          json = this.buildDocJson();
          if (h) await FileIO.saveToCurrentHandle(json);
        }
      }
      this.dirty = false;
      const label = displayLabel(json.name, actualFile);
      const entry = { label, doc: json, fileName: actualFile, handle: h || null };
      const i = FileIO.available.findIndex(x => x.fileName === actualFile);
      if (i >= 0) FileIO.available[i] = entry; else FileIO.available.push(entry);
      ui._updateStateIndicator(h ? `💾 已另存为 ${actualFile}` : `💾 已下载 ${actualFile}（浏览器不支持直接写入文件夹）`);
      document.getElementById('ge-status').textContent = '💾 已保存';
      document.getElementById('ge-status').style.color = '';
    } catch (e) {
      alert('保存失败：' + (e.message || e));
    }
  },

  async save() {
    if (!FileIO.currentHandle) {
      ui._updateStateIndicator('⚠️ 尚未创建文件 — 请先点击「另存为」选择保存位置');
      document.getElementById('ge-status').textContent = '⚠️ 请先「另存为」';
      document.getElementById('ge-status').style.color = '#ffd54f';
      return;
    }
    if (this.recording) { ui._updateStateIndicator('⚠️ 请先保存当前正在录制的步骤'); return; }
    const json = this.buildDocJson();
    const v = validateDoc(json);
    if (!v.ok) { alert('文件校验失败：\n' + v.errors.join('\n')); return; }
    try {
      await FileIO.saveToCurrentHandle(json);
      this.dirty = false;
      const fileName = FileIO.currentHandle.name;
      const label = displayLabel(json.name, fileName);
      const i = FileIO.available.findIndex(x => x.fileName === fileName);
      const entry = { label, doc: json, fileName, handle: FileIO.currentHandle };
      if (i >= 0) FileIO.available[i] = entry; else FileIO.available.push(entry);
      ui._updateStateIndicator('💾 已保存（覆盖原文件）');
      document.getElementById('ge-status').textContent = '💾 已保存';
      document.getElementById('ge-status').style.color = '';
    } catch (e) {
      alert('保存失败：' + (e.message || e));
    }
  },

  // ---- editor ----

  /** The step (or ready) object the editor currently edits — same target for title/indication/ΔG. */
  _editTargetStep() {
    if (!this.workingDoc) return null;
    if (!this._atEnd() && !this.recording) {
      return this.creatorPos > 0 ? this.workingDoc.steps[this.creatorPos - 1] : this.workingDoc.ready;
    }
    if (this.stepCount === 0) return this.workingDoc.ready;
    return this.workingDoc.steps[this.stepCount - 1];
  },

  bindEditor() {
    const name = document.getElementById('ge-name');
    const title = document.getElementById('ge-title');
    const ind = document.getElementById('ge-indication');
    const energy = document.getElementById('ge-energy');
    const elabel = document.getElementById('ge-elabel');
    name.addEventListener('input', () => {
      if (this.workingDoc) { this.workingDoc.name = name.value; this.dirty = true; }
    });
    const route = () => {
      if (!this.workingDoc || this.recording) return; // captured at save time
      const t = this._editTargetStep();
      if (!t) return;
      t.title = title.value;
      t.indication = ind.value;
      this.dirty = true;
    };
    title.addEventListener('input', route);
    ind.addEventListener('input', route);
    const routeEnergy = () => {
      if (!this.workingDoc || this.recording) return;
      const t = this._editTargetStep();
      if (!t) return;
      const v = energy.value.trim();
      if (v === '') delete t.energy; else t.energy = parseFloat(v);
      t.energyLabel = elabel.value.trim() || undefined;
      this.dirty = true;
      this.refreshEnergyPanel();
    };
    energy.addEventListener('input', routeEnergy);
    elabel.addEventListener('input', routeEnergy);
  },

  updateEditor() {
    const label = document.getElementById('ge-step-label');
    const status = document.getElementById('ge-status');
    const name = document.getElementById('ge-name');
    const title = document.getElementById('ge-title');
    const ind = document.getElementById('ge-indication');
    const energy = document.getElementById('ge-energy');
    const elabel = document.getElementById('ge-elabel');
    if (!this.workingDoc) return;
    if (document.activeElement !== name) name.value = this.workingDoc.name || '';
    const t = this._editTargetStep();
    if (t && document.activeElement !== energy) energy.value = (typeof t.energy === 'number') ? t.energy : '';
    if (t && document.activeElement !== elabel) elabel.value = t.energyLabel || '';
    if (this.recording) {
      label.textContent = `Step ${(this.editingIndex != null ? this.editingIndex : this.stepCount) + 1} ⏺`;
      status.textContent = '录制中…操作完成后点击工具栏保存';
      status.style.color = '#64b5f6';
    } else if (!this._atEnd()) {
      label.textContent = `Step ${this.creatorPos}/${this.stepCount} ⏪`;
      title.value = t ? (t.title || '') : '';
      ind.value = t ? (t.indication || '') : '';
      status.textContent = '回看模式 · 直接编辑＝就地重录此步（后续自动校验） · ▶ 回最新步';
      status.style.color = '#ffd54f';
    } else if (this.stepCount === 0) {
      label.textContent = 'Step 0 · Ready';
      title.value = this.workingDoc.ready.title || '';
      ind.value = this.workingDoc.ready.indication || '';
      status.textContent = '编辑初始状态文案 · 已录 0 步';
      status.style.color = '';
    } else {
      const last = this.workingDoc.steps[this.stepCount - 1];
      label.textContent = `Step ${this.stepCount} ✔`;
      title.value = last.title || '';
      ind.value = last.indication || '';
      status.textContent = `已录 ${this.stepCount} 步 · 可修改最后一步文案/ΔG`;
      status.style.color = '';
    }
    this.refreshEnergyPanel();
  },

  /** Live ΔG curve while creating. */
  refreshEnergyPanel() {
    if (!this.active || !this.workingDoc) return;
    ui.energyPoints = buildEnergyProfile(this.workingDoc);
    const show = ui.energyPoints.length > 1 && window.innerWidth > 1100;
    document.getElementById('energy-panel').style.display = show ? 'block' : 'none';
  },

  /** Pull a loaded doc's energyProfile back into per-step fields so the editor shows them. */
  _ingestEnergyProfile(doc) {
    if (!Array.isArray(doc.energyProfile)) return;
    const prof = doc.energyProfile;
    if (prof[0]) {
      this.workingDoc.ready = this.workingDoc.ready || { title: 'Step 0: Ready State', indication: '' };
      this.workingDoc.ready.energy = prof[0].energy;
      this.workingDoc.ready.energyLabel = prof[0].label;
    }
    this.workingDoc.steps.forEach((s, i) => {
      if (prof[i + 1]) { s.energy = prof[i + 1].energy; s.energyLabel = prof[i + 1].label; }
    });
  },

  /** Fill every step's energy/label from the heuristic so they become concrete & editable. */
  autoEnergy() {
    if (!this.workingDoc) return;
    const prof = buildEnergyProfile(this.workingDoc);
    this.workingDoc.ready = this.workingDoc.ready || { title: 'Step 0: Ready State', indication: '' };
    this.workingDoc.ready.energy = prof[0].energy;
    this.workingDoc.ready.energyLabel = this.workingDoc.ready.energyLabel || prof[0].label;
    this.workingDoc.steps.forEach((s, i) => {
      s.energy = prof[i + 1].energy;
      if (!s.energyLabel) s.energyLabel = prof[i + 1].label;
    });
    this.dirty = true;
    this.updateEditor();
    this.refreshEnergyPanel();
    ui._updateStateIndicator('⚡ 已按启发式生成 ΔG 曲线（示意值，可逐步微调）');
  },
