<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chem Mechanism Engine — Interactive Reaction Mechanism Simulator</title>
<style>
/* ============================================================
   GLOBAL RESET & DARK SCIENTIFIC THEME
   Apple + BioRender + Molecular Simulation Aesthetic
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep: #0a0a0f;
  --bg-panel: #12121a;
  --bg-surface: #1a1a26;
  --bg-elevated: #222233;
  --border-subtle: #2a2a3a;
  --border-active: #4a6fa5;
  --text-primary: #d8dce6;
  --text-secondary: #8899aa;
  --text-accent: #64b5f6;
  --glow-blue: rgba(100, 180, 255, 0.15);
  --glow-green: rgba(80, 220, 120, 0.12);
  --glow-red: rgba(255, 100, 100, 0.12);
  --oxygen: #e57373;
  --nitrogen: #ffd54f;
  --carbon: #b0bec5;
  --hydrogen: #81c784;
  --sulfur: #ff9800;
  --phosphorus: #2196f3;
  --font-mono: 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-smooth: 350ms cubic-bezier(0.4, 0, 0.2, 1);
}

body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--font-sans);
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  display: flex;
  flex-direction: column;
  user-select: none;
  -webkit-user-select: none;
}

/* ---- HEADER BAR ---- */
#app-header {
  height: 75px;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  z-index: 10;
  backdrop-filter: blur(12px);
}
#app-header .logo {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.3px;
  background: linear-gradient(135deg, #64b5f6, #81c784);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  white-space: nowrap;
}
#app-header .sep { width: 1px; height: 26px; background: var(--border-subtle); flex: none; }

/* ---- ROUNDED-RECT TEXT BUTTONS (all top-bar text buttons share this) ---- */
.mode-btn {
  padding: 8px 16px;
  font-size: 14px;
  font-weight: 500;
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  background: var(--bg-surface);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition-fast);
  font-family: var(--font-sans);
  white-space: nowrap;
}
.mode-btn:hover:not(:disabled) { color: var(--text-primary); background: var(--bg-elevated); border-color: var(--border-active); }
.mode-btn.active {
  background: var(--border-active);
  color: #fff;
  border-color: var(--border-active);
  box-shadow: 0 0 16px rgba(74,111,165,0.4);
}
.mode-btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* ---- REACTION DROPDOWN ---- */
#choose-wrap { position: relative; }
#reaction-dropdown {
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  min-width: 240px;
  max-height: 320px;
  overflow-y: auto;
  background: rgba(20,20,30,0.97);
  backdrop-filter: blur(16px);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  box-shadow: 0 8px 28px rgba(0,0,0,0.55);
  z-index: 50;
  padding: 6px;
}
#reaction-dropdown.hidden { display: none; }
.rd-item {
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: var(--text-primary);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
}
.rd-item:hover { background: var(--bg-elevated); color: var(--text-accent); }
.rd-item .rd-steps { margin-left: auto; font-size: 11px; color: var(--text-secondary); font-family: var(--font-mono); }
.rd-empty { padding: 10px 12px; font-size: 12px; color: var(--text-secondary); }

/* ---- CANVAS CONTAINER ---- */
#canvas-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  cursor: grab;
}
#canvas-wrap:active { cursor: grabbing; }
#canvas-wrap.grabbing { cursor: grabbing; }
#canvas-wrap.tool-marquee { cursor: crosshair; }
#canvas-wrap.tool-erase { cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><rect x="3" y="11" width="12" height="8" rx="2" transform="rotate(-35 9 15)" fill="%23e57373" stroke="white" stroke-width="1.5"/></svg>') 6 16, crosshair; }
#simCanvas {
  display: block;
  width: 100%;
  height: 100%;
}

/* ---- FLOATING PANELS ---- */
.floating-panel {
  position: absolute;
  background: rgba(18,18,26,0.92);
  backdrop-filter: blur(16px);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 14px 18px;
  font-size: 12px;
  color: var(--text-secondary);
  pointer-events: none;
  z-index: 5;
  transition: opacity var(--transition-smooth);
}
.floating-panel.visible { opacity: 1; }
.floating-panel.hidden { opacity: 0; }

/* Atom info tooltip */
#atom-tooltip {
  top: 16px; right: 16px;
  min-width: 160px;
  font-family: var(--font-mono);
  font-size: 11px;
  line-height: 1.6;
}
#atom-tooltip .elem { font-size: 20px; font-weight: 700; color: var(--text-primary); }

/* ---- BOTTOM GUIDANCE PANEL ---- */
#guidance-panel {
  height: 130px;
  background: var(--bg-panel);
  border-top: 1px solid var(--border-subtle);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}
#guidance-inner {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
  padding: 0 20px;
}
.guidance-step {
  position: absolute;
  left: 24px; right: 24px;
  transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.guidance-step.prev { opacity: 0; transform: translateY(-24px); }
.guidance-step.current { opacity: 1; transform: translateY(0); }
.guidance-step.next-hidden { opacity: 0; transform: translateY(28px); }
.guidance-step .step-num {
  font-size: 14px;
  font-weight: 600;
  color: var(--border-active);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 7px;
}
.guidance-step .step-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 4px;
}
.guidance-step .step-desc {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.5;
}

/* Creator-mode guidance editor */
#guidance-editor {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 10px 20px;
}
#guidance-editor.hidden { display: none; }
#guidance-editor .ge-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
#ge-step-label {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-accent);
  font-family: var(--font-mono);
  white-space: nowrap;
}
#ge-status { font-size: 11px; color: var(--text-secondary); white-space: nowrap; }
#ge-title, #ge-name {
  flex: 1;
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-subtle);
  background: var(--bg-deep);
  color: var(--text-primary);
  font-size: 13px;
  outline: none;
}
#ge-name { flex: 0 0 170px; color: var(--text-accent); }
#ge-name:focus { border-color: var(--border-active); }
#ge-energy, #ge-elabel {
  padding: 5px 9px; border-radius: var(--radius-sm);
  border: 1px solid var(--border-subtle); background: var(--bg-deep);
  color: var(--text-primary); font-size: 12px; outline: none;
}
#ge-energy { flex: 0 0 200px; }
#ge-elabel { flex: 0 0 200px; }
#ge-energy:focus, #ge-elabel:focus { border-color: var(--border-active); }
#ge-indication {
  flex: 1;
  resize: none;
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-subtle);
  background: var(--bg-deep);
  color: var(--text-secondary);
  font-size: 12px;
  font-family: var(--font-sans);
  outline: none;
}
#ge-title:focus, #ge-indication:focus { border-color: var(--border-active); }

/* Progress bar strip */
#progress-strip {
  height: 4px;
  background: var(--bg-surface);
  position: relative;
}
#progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #64b5f6, #81c784);
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 0 8px rgba(100,180,255,0.4);
}

/* ---- ENERGY MINI-GRAPH ---- */
#energy-panel {
  position: absolute;
  bottom: 100px;
  left: 16px;
  width: 400px;
  height: 200px;
  background: rgba(18,18,26,0.92);
  backdrop-filter: blur(14px);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  z-index: 5;
  pointer-events: auto;
  cursor: grab;
  box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  display: none;
}
#energy-panel canvas { width: 100%; height: 100%; }
#energy-panel .label {
  position: absolute;
  top: 8px; left: 12px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-accent);
  text-transform: uppercase;
  letter-spacing: 1.2px;
}

/* ---- REACTION STATE INDICATOR ---- */
#state-indicator {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 6px 16px;
  background: rgba(18,18,26,0.88);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border-subtle);
  border-radius: 20px;
  font-size: 14px;
  color: var(--text-accent);
  z-index: 5;
  pointer-events: none;
  transition: all var(--transition-smooth);
  max-width: 70%;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ---- ICON BUTTON ROW ---- */
#action-bar {
  display: flex;
  gap: 8px;
  align-items: center;
}
.icon-btn {
  width: 34px; height: 34px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-subtle);
  background: var(--bg-surface);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: all var(--transition-fast);
}
.icon-btn:hover:not(:disabled) { background: var(--bg-elevated); color: var(--text-primary); border-color: var(--border-active); }
.icon-btn.danger:hover:not(:disabled) { border-color: #e57373; color: #e57373; }
.icon-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.icon-btn.active { background: var(--border-active); color: #fff; border-color: var(--border-active); }

/* ---- LEGEND OVERLAY ---- */
#legend-overlay {
  position: absolute;
  bottom: 20px; right: 16px;
  background: rgba(18,18,26,0.88);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: 12px 16px;
  font-size: 13px;
  color: var(--text-secondary);
  z-index: 5;
  pointer-events: none;
  line-height: 1.8;
  max-height: 300px;
  overflow: hidden;
}
#legend-overlay .dot {
  display: inline-block;
  width: 10px; height: 10px;
  border-radius: 2px;
  margin-right: 6px;
  vertical-align: middle;
}

/* ---- CREATOR TOOLBAR ---- */
#creator-toolbar {
  position: absolute;
  top: 14px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
  padding: 7px 10px;
  background: rgba(20,20,32,0.94);
  backdrop-filter: blur(16px);
  border: 1px solid var(--border-subtle);
  border-radius: 14px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.5);
  z-index: 20;
}
#creator-toolbar.hidden { display: none; }
.ct-btn {
  width: 40px; height: 40px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-subtle);
  background: var(--bg-surface);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-fast);
  padding: 0;
}
.ct-btn svg { width: 22px; height: 22px; display: block; }
.ct-btn:hover { background: var(--bg-elevated); color: var(--text-primary); border-color: var(--border-active); }
.ct-btn.active { background: var(--border-active); color: #fff; border-color: var(--border-active); box-shadow: 0 0 12px rgba(74,111,165,0.45); }
.ct-btn.danger:hover { border-color: #e57373; color: #e57373; }
.ct-sep { width: 1px; align-self: stretch; background: var(--border-subtle); margin: 2px 3px; }

/* ---- SMILES IMPORT WINDOW ---- */
#smiles-window {
  position: absolute;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  width: 380px;
  background: rgba(22,22,34,0.97);
  backdrop-filter: blur(18px);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  box-shadow: 0 10px 36px rgba(0,0,0,0.6);
  z-index: 30;
  overflow: hidden;
}
#smiles-window.hidden { display: none; }
#smiles-window .sw-header {
  display: flex;
  align-items: center;
  padding: 10px 14px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border-subtle);
  cursor: grab;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
}
#smiles-window .sw-header:active { cursor: grabbing; }
#sw-close {
  margin-left: auto;
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 17px;
  cursor: pointer;
  line-height: 1;
  padding: 2px 4px;
}
#sw-close:hover { color: #e57373; }
#smiles-window .sw-body { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
#sw-input {
  width: 100%;
  min-height: 64px;
  resize: vertical;
  padding: 9px 12px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border-subtle);
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 13px;
  outline: none;
}
#sw-input:focus { border-color: var(--border-active); }
#smiles-window .sw-opts { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-secondary); }
#sw-msg { font-size: 12px; min-height: 16px; }
#sw-msg.err { color: #e57373; }
#sw-msg.ok { color: #81c784; }
#sw-confirm {
  width: 100%;
  padding: 9px;
  border-radius: var(--radius-md);
  border: none;
  background: var(--border-active);
  color: #fff;
  font-weight: 600;
  cursor: pointer;
  font-size: 14px;
}
#sw-confirm:hover { filter: brightness(1.15); }

/* ---- ERROR / WARNING BUBBLES ---- */
#bubble-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 24;
  overflow: hidden;
}
.err-bubble {
  position: absolute;
  width: 200px;
  background: rgba(40,16,18,0.96);
  border: 1px solid #e57373;
  border-radius: var(--radius-md);
  padding: 8px 26px 8px 10px;
  font-size: 12px;
  line-height: 1.45;
  color: #ffcdd2;
  pointer-events: auto;
  box-shadow: 0 4px 18px rgba(0,0,0,0.5);
}
.err-bubble::after {
  content: '';
  position: absolute;
  left: 50%;
  bottom: -8px;
  margin-left: -8px;
  border-left: 8px solid transparent;
  border-right: 8px solid transparent;
  border-top: 8px solid #e57373;
}
.err-bubble.warn {
  background: rgba(46,38,12,0.96);
  border-color: #ffd54f;
  color: #ffecb3;
}
.err-bubble.warn::after { border-top-color: #ffd54f; }
.eb-close {
  position: absolute;
  top: 3px; right: 7px;
  cursor: pointer;
  font-size: 14px;
  color: inherit;
  opacity: 0.7;
}
.eb-close:hover { opacity: 1; }

/* ---- ELECTRON-FLIP CHIP (heterolysis direction picker) ---- */
#flip-chip {
  position: absolute;
  z-index: 26;
  display: flex;
  gap: 4px;
  padding: 5px 7px;
  background: rgba(22,22,34,0.97);
  border: 1px solid var(--border-active);
  border-radius: 20px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  font-size: 11px;
}
#flip-chip.hidden { display: none; }
#flip-chip button {
  border: 1px solid var(--border-subtle);
  background: var(--bg-surface);
  color: var(--text-secondary);
  border-radius: 12px;
  padding: 3px 9px;
  font-size: 11px;
  cursor: pointer;
  white-space: nowrap;
}
#flip-chip button:hover { color: var(--text-primary); border-color: var(--border-active); }
#flip-chip button.sel { background: var(--border-active); color: #fff; }

/* ---- ORDER-RAISE CHIP ---- */
#order-chip {
  position: absolute;
  z-index: 26;
  padding: 4px 10px;
  background: rgba(22,34,24,0.97);
  border: 1px solid #81c784;
  border-radius: 14px;
  color: #c8e6c9;
  font-size: 11px;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(0,0,0,0.5);
  white-space: nowrap;
}
#order-chip.hidden { display: none; }
#order-chip:hover { background: rgba(40,60,44,0.97); }

/* ---- GENERIC MODAL (password / trigger picker / confirm) ---- */
.modal-mask {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  display: none;
  justify-content: center;
  align-items: center;
  backdrop-filter: blur(4px);
}
.modal-box {
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 26px;
  position: relative;
  width: 360px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
.modal-box .mb-title { font-weight: 600; margin-bottom: 14px; font-size: 16px; color: var(--text-primary); text-align: center; }
.modal-box .mb-close {
  position: absolute;
  top: 12px; right: 16px;
  background: none; border: none;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 18px;
}
.modal-box .mb-btn {
  width: 100%;
  padding: 10px;
  border-radius: var(--radius-md);
  border: none;
  background: var(--border-active);
  color: #fff;
  font-weight: 600;
  cursor: pointer;
  margin-top: 6px;
}
.trig-option {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  font-size: 13px;
  cursor: pointer;
  color: var(--text-primary);
}
.trig-option:hover { border-color: var(--border-active); background: var(--bg-surface); }
.trig-option input { accent-color: var(--border-active); }

/* ---- RESPONSIVE ---- */
@media (max-width: 1100px) {
  #app-header { padding: 0 10px; gap: 7px; }
  .mode-btn { padding: 6px 10px; font-size: 12px; }
  #app-header .logo { font-size: 18px; }
  #guidance-panel { height: 110px; }
  #energy-panel { display: none !important; }
  #legend-overlay { display: none; }
}
</style>
</head>
<body>

<!-- ======== HEADER ======== -->
<div id="app-header">
  <span class="logo">⚗️ Chem Mechanism Engine</span>
  <span class="sep"></span>
  <button class="mode-btn" id="btnImportFile">📁 Open Folder</button>
  <div id="choose-wrap">
    <button class="mode-btn" id="btnChooseReaction" disabled>🧪 Choose Reaction ▾</button>
    <div id="reaction-dropdown" class="hidden"></div>
  </div>
  <button class="mode-btn" id="btnCloseReaction" disabled>✖ Close Reaction</button>
  <span class="sep"></span>
  <div id="action-bar">
    <button class="icon-btn" id="btnStepFwd" title="Advance one step" disabled>▶</button>
    <button class="icon-btn" id="btnStepBack" title="Reverse one step" disabled>◀</button>
    <button class="icon-btn danger" id="btnReset" title="Reset simulation">↺</button>
    <button class="icon-btn" id="btnAutoPlay" title="Auto-play mechanism" disabled>⏯</button>
  </div>
  <span class="sep"></span>
  <button class="mode-btn" id="btnCreateReaction">🛠️ Create Reaction</button>
  <button class="icon-btn" id="btnLonePairs" title="Show/hide lone pairs">⠨</button>
  <button class="icon-btn active" id="btnSound" title="Sound effects: on">🔊</button>
  <span style="flex:1"></span>
  <span style="font-size:11px;color:var(--text-secondary);font-family:var(--font-mono);" id="fpsDisplay">60 FPS</span>
</div>

<!-- ======== CANVAS ======== -->
<div id="canvas-wrap">
  <canvas id="simCanvas"></canvas>

  <!-- Floating atom info tooltip -->
  <div class="floating-panel hidden" id="atom-tooltip">
    <div class="elem" id="tip-elem">C</div>
    <div id="tip-charge"></div>
    <div id="tip-bond"></div>
    <div id="tip-lp"></div>
  </div>

  <!-- Reaction state indicator -->
  <div id="state-indicator">📂 Import a reaction folder to begin</div>

  <!-- Legend overlay (dynamic) -->
  <div id="legend-overlay">

<script>
// ============================================================
// MODULE 0: ELEMENT KNOWLEDGE BASE & CONSTANTS
// ============================================================
const PI2 = Math.PI * 2;
const DEG = Math.PI / 180;

/**
 * ELEMENT_DATA — per-element chemistry knowledge base.
 *  v      : valence electron count (null = abstract, no electron bookkeeping; e.g. R groups)
 *  en     : Pauling electronegativity
 *  lp     : default lone pairs for a fresh neutral atom
 *  shape  : visual shape
 *  color  : visual color
 *  r      : visual radius (px) — ordered by covalent radius, compressed range
 *  maxB   : max total bond order for the NEUTRAL atom (octet bookkeeping)
 *  hyper  : absolute max total bond order (hypervalent allowance: S 6, P 5, I 3)
 *  mass   : atomic mass (physics)
 *  name   : display name for legend
 */
const ELEMENT_DATA = {
  H:  { v: 1, en: 2.20, lp: 0, shape: 'circle',   color: '#81c784', r: 12, maxB: 1, hyper: 1, mass: 1,    name: 'Hydrogen' },
  C:  { v: 4, en: 2.55, lp: 0, shape: 'square',   color: '#b0bec5', r: 18, maxB: 4, hyper: 4, mass: 12,   name: 'Carbon' },
  N:  { v: 5, en: 3.04, lp: 1, shape: 'triangle', color: '#ffd54f', r: 16, maxB: 3, hyper: 4, mass: 14,   name: 'Nitrogen' },
  O:  { v: 6, en: 3.44, lp: 2, shape: 'circle',   color: '#f72b2b', r: 15, maxB: 2, hyper: 3, mass: 16,   name: 'Oxygen' },
  S:  { v: 6, en: 2.58, lp: 2, shape: 'hexagon',  color: '#ff9800', r: 20, maxB: 2, hyper: 6, mass: 32,   name: 'Sulfur' },
  P:  { v: 5, en: 2.19, lp: 1, shape: 'pentagon', color: '#2196f3', r: 21, maxB: 3, hyper: 5, mass: 31,   name: 'Phosphorus' },
  F:  { v: 7, en: 3.98, lp: 3, shape: 'circle',   color: '#b3e5fc', r: 14, maxB: 1, hyper: 1, mass: 19,   name: 'Fluorine' },
  Cl: { v: 7, en: 3.16, lp: 3, shape: 'circle',   color: '#c6ff00', r: 19, maxB: 1, hyper: 1, mass: 35.5, name: 'Chlorine' },
  Br: { v: 7, en: 2.96, lp: 3, shape: 'circle',   color: '#8d6e63', r: 23, maxB: 1, hyper: 1, mass: 80,   name: 'Bromine' },
  I:  { v: 7, en: 2.66, lp: 3, shape: 'circle',   color: '#9c27b0', r: 26, maxB: 1, hyper: 3, mass: 127,  name: 'Iodine' },
  B:  { v: 3, en: 2.04, lp: 0, shape: 'square',   color: '#e040fb', r: 17, maxB: 3, hyper: 4, mass: 11,   name: 'Boron' },
  Li: { v: 1, en: 0.98, lp: 0, shape: 'circle',   color: '#f48fb1', r: 24, maxB: 1, hyper: 1, mass: 7,    name: 'Lithium' },
  Na: { v: 1, en: 0.93, lp: 0, shape: 'circle',   color: '#81d4fa', r: 28, maxB: 1, hyper: 1, mass: 23,   name: 'Sodium' },
  K:  { v: 1, en: 0.82, lp: 0, shape: 'circle',   color: '#b0a8c9', r: 32, maxB: 1, hyper: 1, mass: 39,   name: 'Potassium' },
  Mg: { v: 2, en: 1.31, lp: 0, shape: 'circle',   color: '#9575cd', r: 26, maxB: 2, hyper: 2, mass: 24,   name: 'Magnesium' },
  Ca: { v: 2, en: 1.00, lp: 0, shape: 'circle',   color: '#e6e4dc', r: 30, maxB: 2, hyper: 2, mass: 40,   name: 'Calcium' },
  Al: { v: 3, en: 1.61, lp: 0, shape: 'triangle', color: '#9eb09b', r: 23, maxB: 3, hyper: 4, mass: 27,   name: 'Aluminium' },
  Si: { v: 4, en: 1.90, lp: 0, shape: 'square',   color: '#707a82', r: 22, maxB: 4, hyper: 6, mass: 28,   name: 'Silicon' },
  Hg: { v: 2, en: 2.00, lp: 0, shape: 'circle',   color: '#cdd3d6', r: 26, maxB: 2, hyper: 2, mass: 200,  name: 'Mercury' },
  Cu: { v: 2, en: 1.90, lp: 0, shape: 'circle',   color: '#fde93a', r: 25, maxB: 2, hyper: 4, mass: 64,   name: 'Copper' },
  Zn: { v: 2, en: 1.65, lp: 0, shape: 'circle',   color: '#455a64', r: 25, maxB: 2, hyper: 2, mass: 65,   name: 'Zinc', text: '#fff' },
  Pt: { v: 2, en: 2.28, lp: 0, shape: 'circle',   color: '#ffffff', r: 27, maxB: 4, hyper: 6, mass: 195,  name: 'Platinum' },
  Pd: { v: 2, en: 2.20, lp: 0, shape: 'circle',   color: '#1a1a1a', r: 26, maxB: 4, hyper: 6, mass: 106,  name: 'Palladium', text: '#fff' },
  Cr: { v: 6, en: 1.66, lp: 0, shape: 'hexagon',  color: '#00a86b', r: 24, maxB: 6, hyper: 6, mass: 52,   name: 'Chromium', text: '#fff' },
  Fe: { v: 8, en: 1.83, lp: 0, shape: 'circle',   color: '#b7410e', r: 24, maxB: 6, hyper: 6, mass: 56,   name: 'Iron', text: '#fff' },
  R:  { v: null, en: 2.50, lp: 0, shape: 'roundrect', color: '#78909c', r: 18, maxB: null, hyper: null, mass: 30, name: 'R group' },
};
/** Fallback profile for exotic elements imported via SMILES (e.g., Fe) — render-only, no bookkeeping */
const GENERIC_ELEMENT = { v: null, en: 2.0, lp: 0, shape: 'circle', color: '#90a4ae', r: 22, maxB: null, hyper: null, mass: 50, name: 'Element' };
function elemData(el) { return ELEMENT_DATA[el] || GENERIC_ELEMENT; }

// Atomic number → symbol (for SMILES import range we care about)
const ATOMIC_SYMBOLS = { 1:'H', 3:'Li', 5:'B', 6:'C', 7:'N', 8:'O', 9:'F', 11:'Na', 12:'Mg', 13:'Al', 14:'Si', 15:'P', 16:'S', 17:'Cl', 19:'K', 20:'Ca', 24:'Cr', 26:'Fe', 29:'Cu', 30:'Zn', 35:'Br', 46:'Pd', 53:'I', 78:'Pt', 80:'Hg' };

// Bond strain threshold (effectively disabled — bonds never auto-break)
const BOND_BREAK_STRAIN = 5000;
// ↓↓ 绿色虚线的触发距离（单位：像素）。两个目标原子距离小于该值时显示绿色虚线提示。
//    嫌触发太远就调小它；调得太小则需要拖得非常近才会出现提示。
const REACTION_DETECT_RADIUS = 80;
// ↓↓ 成键判定距离（像素）：拖近到小于该值时产生磁吸，松开鼠标即成键（仅"远距起始"原子对）。
const REACTION_BOND_RADIUS = 80;
// ↓↓ "近距起始"判定（像素）：进入新步骤瞬间若两目标原子已小于该距离，则禁用"拖近自动成键"，
//    只能用"依次点选两个原子 → 点击绿线"成键，避免一进新步骤绿线就自动形成。
const CLOSE_START_DIST = 200;
// Brownian drift magnitude (disabled)
const BROWNIAN_FORCE = 0;
// File format magic
const CME_FORMAT = 'cme-reaction/v1';

// ============================================================
// MODULE 0.5: SOUND EFFECTS — soft click / bubble / jelly palette
// ============================================================
const SoundFX = (() => {
  const AudioCtor = window.AudioContext || window.webkitAudioContext;
  const STORAGE_KEY = 'cme.sound.enabled';
  let ctx = null;
  let master = null;
  const lastPlayed = new Map();

  const getStored = () => {
    try { return localStorage.getItem(STORAGE_KEY); }
    catch (e) { return null; }
  };
  const setStored = value => {
    try { localStorage.setItem(STORAGE_KEY, value); }
    catch (e) { /* storage may be unavailable in strict privacy contexts */ }
  };

  const api = {
    enabled: getStored() !== '0',
    volume: 6.50,

    ensure() {
      if (!AudioCtor) return null;
      if (!ctx) {
        ctx = new AudioCtor();
        master = ctx.createGain();
        master.gain.value = api.volume;
        master.connect(ctx.destination);
      }
      if (master) master.gain.value = api.volume;
      if (ctx.state === 'suspended') ctx.resume().catch(() => {});
      return ctx;
    },

    setEnabled(on) {
      api.enabled = !!on;
      setStored(api.enabled ? '1' : '0');
    },

    toggle() {
      if (api.enabled) {
        api.play('toggleOff', { force: true, cooldown: 0 });
        api.setEnabled(false);
        return false;
      }
      api.setEnabled(true);
      api.play('toggleOn', { force: true, cooldown: 0 });
      return true;
    },

    play(name = 'click', opts = {}) {
      try {
        if (!api.enabled && !opts.force) return;
        const c = api.ensure();
        if (!c || !master) return;
        const now = performance.now();
        const cooldown = opts.cooldown ?? 45;
        if (!opts.force && now - (lastPlayed.get(name) || 0) < cooldown) return;
        lastPlayed.set(name, now);
        const fn = presets[name] || presets.click;
        fn(c, c.currentTime + 0.002, opts);
      } catch (e) {
        // Audio should never block the chemistry simulator.
      }
    },
  };

  function shapedGain(c, t, dur, gain, attack = 0.006, release = 0.055) {
    const g = c.createGain();
    const peak = Math.max(0.0001, gain);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(peak, t + Math.max(0.002, attack));
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur + Math.max(0.015, release));
    return g;
  }

  function tone(c, t, opts = {}) {
    const {
      freq = 440, endFreq = freq, dur = 0.08, gain = 0.05,
      type = 'sine', attack = 0.006, release = 0.055,
    } = opts;
    const osc = c.createOscillator();
    const g = shapedGain(c, t, dur, gain, attack, release);
    osc.type = type;
    osc.frequency.setValueAtTime(Math.max(1, freq), t);
    if (endFreq !== freq) osc.frequency.exponentialRampToValueAtTime(Math.max(1, endFreq), t + dur);
    osc.connect(g);
    g.connect(master);
    osc.start(t);
    osc.stop(t + dur + release + 0.04);
  }

  function noise(c, t, opts = {}) {
    const {
      dur = 0.05, gain = 0.025, filter = 'bandpass', freq = 900,
      q = 3, attack = 0.003, release = 0.045,
    } = opts;
    const frames = Math.max(1, Math.floor(c.sampleRate * dur));
    const buffer = c.createBuffer(1, frames, c.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < frames; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / frames);
    const src = c.createBufferSource();
    const f = c.createBiquadFilter();
    const g = shapedGain(c, t, dur, gain, attack, release);
    f.type = filter;
    f.frequency.setValueAtTime(freq, t);
    f.Q.setValueAtTime(q, t);
    src.buffer = buffer;
    src.connect(f);
    f.connect(g);
    g.connect(master);
    src.start(t);
    src.stop(t + dur + release + 0.04);
  }

  const presets = {
    click(c, t) {
      tone(c, t, { freq: 680, endFreq: 980, dur: 0.045, gain: 0.085, type: 'sine', release: 0.035 });
      tone(c, t + 0.012, { freq: 360, endFreq: 520, dur: 0.055, gain: 0.020, type: 'triangle', release: 0.030 });
    },
    toggleOn(c, t) {
      tone(c, t, { freq: 520, endFreq: 720, dur: 0.055, gain: 0.045, type: 'sine' });
      tone(c, t + 0.060, { freq: 780, endFreq: 1040, dur: 0.070, gain: 0.040, type: 'sine' });
    },
    toggleOff(c, t) {
      tone(c, t, { freq: 620, endFreq: 310, dur: 0.090, gain: 0.040, type: 'triangle' });
    },
    arm(c, t) {
      tone(c, t, { freq: 540, endFreq: 680, dur: 0.060, gain: 0.040, type: 'sine' });
      tone(c, t + 0.045, { freq: 330, endFreq: 330, dur: 0.050, gain: 0.020, type: 'triangle' });
    },
    connect(c, t) {
      tone(c, t, { freq: 280, endFreq: 620, dur: 0.160, gain: 0.100, type: 'sine', attack: 0.010, release: 0.085 });
      tone(c, t + 0.045, { freq: 760, endFreq: 1180, dur: 0.020, gain: 0.040, type: 'triangle', release: 0.070 });
      noise(c, t + 0.025, { dur: 0.070, gain: 0.048, filter: 'bandpass', freq: 1100, q: 4 });
    },
    disconnect(c, t) {
      tone(c, t, { freq: 520, endFreq: 170, dur: 0.120, gain: 0.100, type: 'triangle', attack: 0.004, release: 0.080 });
      noise(c, t, { dur: 0.050, gain: 0.030, filter: 'highpass', freq: 1500, q: 0.8, release: 0.040 });
    },
    dragStart(c, t) {
      tone(c, t, { freq: 190, endFreq: 310, dur: 0.100, gain: 0.280, type: 'sine', attack: 0.012, release: 0.070 });
      tone(c, t + 0.020, { freq: 410, endFreq: 500, dur: 0.190, gain: 0.250, type: 'triangle', release: 0.060 });
    },
    dragRelease(c, t) {
      tone(c, t, { freq: 300, endFreq: 190, dur: 0.085, gain: 0.295, type: 'sine', release: 0.060 });
      noise(c, t + 0.006, { dur: 0.040, gain: 0.254, filter: 'lowpass', freq: 950, q: 0.6 });
    },
    step(c, t) {
      tone(c, t, { freq: 440, endFreq: 560, dur: 0.070, gain: 0.060, type: 'sine' });
      tone(c, t + 0.060, { freq: 660, endFreq: 780, dur: 0.080, gain: 0.032, type: 'sine' });
    },
    back(c, t) {
      tone(c, t, { freq: 700, endFreq: 500, dur: 0.060, gain: 0.065, type: 'triangle' });
      tone(c, t + 0.052, { freq: 430, endFreq: 280, dur: 0.075, gain: 0.030, type: 'triangle' });
    },
    reset(c, t) {
      tone(c, t, { freq: 360, endFreq: 160, dur: 0.180, gain: 0.065, type: 'sine', attack: 0.010, release: 0.090 });
      noise(c, t + 0.030, { dur: 0.080, gain: 0.012, filter: 'lowpass', freq: 600, q: 0.7 });
    },
    warn(c, t) {

    },
    error(c, t) {
      tone(c, t, { freq: 140, endFreq: 85, dur: 0.150, gain: 0.050, type: 'triangle', attack: 0.006, release: 0.100 });
      noise(c, t, { dur: 0.070, gain: 0.018, filter: 'lowpass', freq: 420, q: 0.8 });
    },
    success(c, t) {

      tone(c, t + 0.070, { freq: 660, endFreq: 820, dur: 0.100, gain: 0.040, type: 'sine' });
      tone(c, t + 0.145, { freq: 880, endFreq: 1180, dur: 0.130, gain: 0.036, type: 'triangle', release: 0.120 });
