  // ---- error bubbles / chips ----

  refreshErrors() {
    if (!this.active) { this._clearBubbles(); return; }
    const layer = document.getElementById('bubble-layer');
    const errs = ChemRules.checkErrors(ui.atoms, ui.bonds, ui.fragments);
    const liveKeys = new Set();
    for (const err of errs) {
      liveKeys.add(err.key);
      if (this.dismissed.has(err.key)) continue;
      if (this.bubbles.has(err.key)) continue;
      this._createBubble(err.key, err.anchor, err.msg, err.level, layer);
    }
    for (const [key, b] of [...this.bubbles.entries()]) {
      if (key.startsWith('transient')) continue;
      if (!liveKeys.has(key)) { b.div.remove(); this.bubbles.delete(key); }
    }
    for (const key of [...this.dismissed]) {
      if (!liveKeys.has(key)) this.dismissed.delete(key);
    }
  },

  _createBubble(key, anchor, msg, level, layer) {
    const div = document.createElement('div');
    div.className = 'err-bubble' + (level === 'warn' ? ' warn' : '');
    div.innerHTML = `<span class="eb-close">×</span><div class="eb-msg">${msg}</div>`;
    div.querySelector('.eb-close').addEventListener('click', () => {
      this.dismissed.add(key);
      div.remove();
      this.bubbles.delete(key);
    });
    (layer || document.getElementById('bubble-layer')).appendChild(div);
    this.bubbles.set(key, { div, anchor });
  },

  showTransientBubble(anchor, msg, level) {
    const key = 'transient' + Date.now() + Math.random();
    this._createBubble(key, anchor, msg, level);
    SoundFX.play(level === 'warn' ? 'warn' : 'error', { cooldown: 250 });
    setTimeout(() => {
      const b = this.bubbles.get(key);
      if (b) { b.div.remove(); this.bubbles.delete(key); }
    }, 4000);
  },

  _clearBubbles() {
    for (const [, b] of this.bubbles) b.div.remove();
    this.bubbles.clear();
  },

  showFlipChip(rec) {
    this.breakRecord = rec;
    const chip = document.getElementById('flip-chip');
    const el = a => a.element + (a.label ? `(${a.label})` : '');
    chip.innerHTML = '';
    const mk = (text, sel, fn) => {
      const b = document.createElement('button');
      b.textContent = text;
      if (sel) b.classList.add('sel');
      b.addEventListener('click', (e) => { e.stopPropagation(); fn(); this.showFlipChip(this.breakRecord); ui.afterStructureChange(); this._recordSnapReplace(); SoundFX.play('click'); });
      chip.appendChild(b);
      return b;
    };
    mk(`电子对→${el(rec.a1)}`, rec.mode === 'hetero' && rec.recipient === rec.a1,
       () => ChemRules.reassignBreak(rec, 'hetero', rec.a1));
    mk(`电子对→${el(rec.a2)}`, rec.mode === 'hetero' && rec.recipient === rec.a2,
       () => ChemRules.reassignBreak(rec, 'hetero', rec.a2));
    mk('均裂', rec.mode === 'homo',
       () => ChemRules.reassignBreak(rec, 'homo'));
    // confirm/close button (Enter key does the same)
    const closeBtn = document.createElement('button');
    closeBtn.textContent = '✓';
    closeBtn.title = '确认并关闭 (Enter)';
    closeBtn.style.borderColor = '#81c784';
    closeBtn.style.color = '#81c784';
    closeBtn.addEventListener('click', (e) => { e.stopPropagation(); this.hideFlipChip(); SoundFX.play('click'); });
    chip.appendChild(closeBtn);
    chip.classList.remove('hidden');
    if (this._chipTimer) clearTimeout(this._chipTimer);
    this._chipTimer = setTimeout(() => this.hideFlipChip(), 12000);
  },

  hideFlipChip() {
    document.getElementById('flip-chip').classList.add('hidden');
    this.breakRecord = null;
    if (this._chipTimer) { clearTimeout(this._chipTimer); this._chipTimer = null; }
  },

  showOrderChip(bond) {
    this.orderChipBond = bond;
    const chip = document.getElementById('order-chip');
    chip.textContent = bond.order === 1 ? '⇧ 升为双键' : '⇧ 升为三键';
    chip.classList.remove('hidden');
  },

  hideOrderChip() {
    document.getElementById('order-chip').classList.add('hidden');
    this.orderChipBond = null;
  },

  /** Per-frame: pin DOM overlays to canvas-space anchors */
  syncOverlays() {
    for (const [, b] of this.bubbles) {
      const a = b.anchor;
      if (!a || (a.visible === false)) { b.div.style.display = 'none'; continue; }
      b.div.style.display = '';
      const h = b.div.offsetHeight || 56;
      b.div.style.left = (a.x - 100) + 'px';
      b.div.style.top = (a.y - (a.radius || 16) - h - 16) + 'px';
    }
    const chip = document.getElementById('flip-chip');
    if (this.breakRecord && !chip.classList.contains('hidden')) {
      const r = this.breakRecord;
      const mx = (r.a1.x + r.a2.x) / 2, my = (r.a1.y + r.a2.y) / 2;
      chip.style.left = (mx - chip.offsetWidth / 2) + 'px';
      chip.style.top = (my + 16) + 'px';
    }
    const ochip = document.getElementById('order-chip');
    if (this.orderChipBond && !ochip.classList.contains('hidden')) {
      if (this.orderChipBond.broken) { this.hideOrderChip(); }
      else {
        const mid = this.orderChipBond.midpoint;
        ochip.style.left = (mid.x - ochip.offsetWidth / 2) + 'px';
        ochip.style.top = (mid.y + 18) + 'px';
      }
    }
  },
};
window.Creator = Creator;

// ============================================================
// MODULE 12: APPLICATION BOOTSTRAP
// ============================================================
(function initApp() {
  const canvas = document.getElementById('simCanvas');
  const canvasWrap = document.getElementById('canvas-wrap');
  const guidanceInner = document.getElementById('guidance-inner');

  physics = new PhysicsEngine();
  player = new ReactionPlayer();
  ui = new UIController(canvas, guidanceInner, player, physics);
  player.ui = ui;
  window.indicationsUnlocked = false;
  window.showLonePairs = true;

  function resizeCanvas() {
    const rect = canvasWrap.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    physics.setBounds(canvas.width, canvas.height);
  }
  window.addEventListener('resize', resizeCanvas);

  // ---- top-bar button states ----
  function refreshTopButtons() {
    const inCreate = Creator.active;
    document.getElementById('btnImportFile').disabled = inCreate;
    document.getElementById('btnChooseReaction').disabled = inCreate || FileIO.available.length === 0;
    document.getElementById('btnCloseReaction').disabled = inCreate || !player.loaded;
    document.getElementById('btnReset').disabled = inCreate || !player.loaded;
    const playLocked = !window.indicationsUnlocked;
    ['btnStepFwd', 'btnStepBack', 'btnAutoPlay'].forEach(id => {
      document.getElementById(id).disabled = playLocked || inCreate || !player.loaded;
    });
  }
  window.refreshTopButtons = refreshTopButtons;
  player.onStepChange = () => ui._onStepChanged();

  function refreshSoundButton() {
    const btn = document.getElementById('btnSound');
    btn.classList.toggle('active', SoundFX.enabled);
    btn.textContent = SoundFX.enabled ? '🔊' : '🔇';
    btn.title = SoundFX.enabled ? 'Sound effects: on' : 'Sound effects: muted';
  }
  refreshSoundButton();

  document.addEventListener('pointerdown', () => SoundFX.ensure(), { once: true, passive: true });
  document.getElementById('btnSound').addEventListener('click', (e) => {
    e.stopPropagation();
    SoundFX.toggle();
    refreshSoundButton();
  });

  document.addEventListener('click', (e) => {
    const target = e.target.closest('button, .rd-item, .trig-option');
    if (!target) return;
    if (target.disabled || target.getAttribute('aria-disabled') === 'true') return;
    if (target.id === 'btnSound') return;
    SoundFX.play('click', { cooldown: 28 });
  }, true);

  // ---- energy panel dragging ----
  const ep = document.getElementById('energy-panel');
  let epDragging = false, epOffsetX = 0, epOffsetY = 0;
  ep.addEventListener('mousedown', (e) => {
    epDragging = true;
    ep.style.cursor = 'grabbing';
    epOffsetX = e.clientX - ep.getBoundingClientRect().left;
    epOffsetY = e.clientY - ep.getBoundingClientRect().top;
    e.stopPropagation();
  });
  window.addEventListener('mousemove', (e) => {
    if (epDragging) {
      ep.style.left = (e.clientX - epOffsetX) + 'px';
      ep.style.top = (e.clientY - epOffsetY) + 'px';
      ep.style.bottom = 'auto';
    }
  });
  window.addEventListener('mouseup', () => {
    epDragging = false;
    ep.style.cursor = 'grab';
  });

  // ---- SMILES window dragging ----
  const sw = document.getElementById('smiles-window');
  const swHeader = document.getElementById('sw-header');
  let swDragging = false, swOffX = 0, swOffY = 0;
  swHeader.addEventListener('mousedown', (e) => {
    if (e.target.id === 'sw-close') return;
    swDragging = true;
    const rect = sw.getBoundingClientRect();
    const wrapRect = canvasWrap.getBoundingClientRect();
    swOffX = e.clientX - rect.left;
    swOffY = e.clientY - rect.top;
    sw.style.transform = 'none';
    sw.style.left = (rect.left - wrapRect.left) + 'px';
    sw.style.top = (rect.top - wrapRect.top) + 'px';
    e.preventDefault();
  });
  window.addEventListener('mousemove', (e) => {
    if (!swDragging) return;
    const wrapRect = canvasWrap.getBoundingClientRect();
    sw.style.left = (e.clientX - wrapRect.left - swOffX) + 'px';
    sw.style.top = (e.clientY - wrapRect.top - swOffY) + 'px';
  });
  window.addEventListener('mouseup', () => { swDragging = false; });

  // ---- Import / Choose / Close ----
  const dropdown = document.getElementById('reaction-dropdown');

  function rebuildDropdown() {
    dropdown.innerHTML = '';
    if (FileIO.available.length === 0) {
      dropdown.innerHTML = '<div class="rd-empty">没有可用反应 — 先点击 Open Folder</div>';
      return;
    }
    FileIO.available.forEach(item => {
      const div = document.createElement('div');
      div.className = 'rd-item';
      const fnameNote = (item.fileName && item.fileName.replace(/\.cme\.json$/i, '') !== item.label)
        ? `<span style="opacity:.5;font-size:11px;margin-left:4px;">${item.fileName}</span>` : '';
      div.innerHTML = `<span>🧪</span><span>${item.label}</span>${fnameNote}<span class="rd-steps">${(item.doc.steps || []).length} steps</span>`;
      div.addEventListener('click', () => {
        dropdown.classList.add('hidden');
        player.loadDoc(item.doc);
        refreshTopButtons();
        ui._updateStateIndicator(`⚗️ 已加载 ${item.label} — 按提示拖动分子开始`);
      });
      dropdown.appendChild(div);
    });
  }
  window.rebuildDropdown = rebuildDropdown;

  document.getElementById('btnImportFile').addEventListener('click', async () => {
    try {
      const count = await FileIO.pickFolder();
      if (count === null) return; // cancelled
      rebuildDropdown();
      refreshTopButtons();
      ui._updateStateIndicator(count > 0
        ? `📁 已找到 ${count} 个反应文件 — 点击 Choose Reaction 选择`
        : '📁 该文件夹中没有有效的 .cme.json 反应文件');
    } catch (e) {
      console.error(e);
      ui._updateStateIndicator('❌ 文件夹读取失败：' + (e.message || e));
    }
  });

  document.getElementById('btnChooseReaction').addEventListener('click', (e) => {
    e.stopPropagation();
    rebuildDropdown();
    dropdown.classList.toggle('hidden');
  });
  document.addEventListener('click', (e) => {
    if (!document.getElementById('choose-wrap').contains(e.target)) dropdown.classList.add('hidden');
  });

  document.getElementById('btnCloseReaction').addEventListener('click', () => {
    player.unload();
    refreshTopButtons();
    ui._updateStateIndicator('📂 Import a reaction folder to begin');
  });

  // ---- playback ----
  document.getElementById('btnStepFwd').addEventListener('click', () => {
    if (!player.loaded) return;
    player.stopAutoPlay();
    document.getElementById('btnAutoPlay').textContent = '⏯';
    player.advanceStep();
  });
  document.getElementById('btnStepBack').addEventListener('click', () => {
    if (!player.loaded) return;
    player.stopAutoPlay();
    document.getElementById('btnAutoPlay').textContent = '⏯';
    player.reverseStep();
  });
  document.getElementById('btnReset').addEventListener('click', () => {
    if (!player.loaded) return;
    player.stopAutoPlay();
    document.getElementById('btnAutoPlay').textContent = '⏯';
    resizeCanvas();
    player.reset();
  });
  document.getElementById('btnAutoPlay').addEventListener('click', function() {
    if (!player.loaded) return;
    if (player.autoPlay) {
      player.stopAutoPlay();
      this.textContent = '⏯';
    } else {
      if (player.currentStep >= player.totalSteps) player.reset();
      player.startAutoPlay();
      this.textContent = '⏸';
    }
  });

  // ---- creator entry ----
  document.getElementById('btnCreateReaction').addEventListener('click', () => {
    if (Creator.active) Creator.exit();
    else Creator.enter();
  });

  // ---- lone pair toggle ----
  const lpBtn = document.getElementById('btnLonePairs');
  lpBtn.classList.add('active');
  lpBtn.addEventListener('click', () => {
    window.showLonePairs = !window.showLonePairs;
    lpBtn.classList.toggle('active', window.showLonePairs);
  });

  // ---- creator toolbar ----
  document.getElementById('ct-import').addEventListener('click', () => {
    const w = document.getElementById('smiles-window');
    w.classList.toggle('hidden');
    if (!w.classList.contains('hidden')) {
      if (window.__OCL_LOAD_ERROR || !window.OCL) {
        const msg = document.getElementById('sw-msg');
        msg.className = 'err';
        msg.textContent = '⚠ openchemlib 库未加载（lib/openchemlib-full.js 缺失），SMILES 解析不可用';
      }
      document.getElementById('sw-input').focus();
    }
  });
  document.getElementById('sw-close').addEventListener('click', () => {
    document.getElementById('smiles-window').classList.add('hidden');
  });
  document.getElementById('sw-confirm').addEventListener('click', () => Creator.importSmilesFromWindow());
  document.getElementById('ct-open').addEventListener('click', () => Creator.openFile());
  document.getElementById('ct-marquee').addEventListener('click', () => Creator.setTool('marquee'));
  document.getElementById('ct-select').addEventListener('click', () => Creator.setTool('select'));
  document.getElementById('ct-undo').addEventListener('click', () => Creator.undo());
  document.getElementById('ct-erase').addEventListener('click', () => Creator.setTool('erase'));
  document.getElementById('ct-step').addEventListener('click', () => Creator.startOrSaveStep());
  document.getElementById('ct-back').addEventListener('click', () => Creator.stepBack());
  document.getElementById('ct-fwd').addEventListener('click', () => Creator.stepFwd());
  document.getElementById('ct-saveas').addEventListener('click', () => Creator.saveAs());
  document.getElementById('ct-save').addEventListener('click', () => Creator.save());
  document.getElementById('ct-clear').addEventListener('click', () => Creator.clearCanvas());
  document.getElementById('ge-autoenergy').addEventListener('click', () => Creator.autoEnergy());
  document.getElementById('order-chip').addEventListener('click', () => Creator.raiseOrder(Creator.orderChipBond));
  Creator.bindEditor();

  // SMILES textarea: Enter = confirm, Shift+Enter = newline (multi-molecule import)
  document.getElementById('sw-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      Creator.importSmilesFromWindow();
    }
  });

  // Creator toolbar dragging (grab anywhere that's not a button)
  const ctBar = document.getElementById('creator-toolbar');
  let ctDragging = false, ctOffX = 0, ctOffY = 0;
  ctBar.addEventListener('mousedown', (e) => {
    if (e.target.closest('.ct-btn')) return;
    ctDragging = true;
    const rect = ctBar.getBoundingClientRect();
    const wrapRect = canvasWrap.getBoundingClientRect();
    ctOffX = e.clientX - rect.left;
    ctOffY = e.clientY - rect.top;
    ctBar.style.transform = 'none';
    ctBar.style.left = (rect.left - wrapRect.left) + 'px';
    ctBar.style.top = (rect.top - wrapRect.top) + 'px';
    e.preventDefault();
  });
  window.addEventListener('mousemove', (e) => {
    if (!ctDragging) return;
    const wrapRect = canvasWrap.getBoundingClientRect();
    ctBar.style.left = (e.clientX - wrapRect.left - ctOffX) + 'px';
    ctBar.style.top = (e.clientY - wrapRect.top - ctOffY) + 'px';
  });
  window.addEventListener('mouseup', () => { ctDragging = false; });

  // Creator keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (!Creator.active) return;
    const tag = (e.target.tagName || '').toLowerCase();
    if (tag === 'input' || tag === 'textarea') return;
    if (e.key === 'Delete' || e.key === 'Backspace') {
      e.preventDefault();
      Creator.deleteHotkey();
    } else if ((e.ctrlKey || e.metaKey) && (e.key === 'z' || e.key === 'Z')) {
      e.preventDefault();
      Creator.undo();
    } else if ((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'C')) {
      Creator.copySelection();
    } else if ((e.ctrlKey || e.metaKey) && (e.key === 'v' || e.key === 'V')) {
      Creator.paste();
    } else if (e.key === 'Enter') {
      if (Creator.breakRecord) Creator.hideFlipChip(); // confirm electron assignment
    }
  });

  // ---- trigger modal ----
  document.getElementById('trigger-confirm').addEventListener('click', () => {
    const boxes = [...document.querySelectorAll('#trigger-options input[type="checkbox"]')];
    const checkedSet = new Set();
    boxes.forEach(b => { if (b.checked) checkedSet.add(Creator._gateCands[parseInt(b.dataset.idx, 10)]); });
    if (checkedSet.size === 0) {
      alert('请至少勾选一个需要玩家亲手完成的动作。');
      return;
    }
    document.getElementById('trigger-modal').style.display = 'none';
    const resolve = Creator._gateResolve;
    Creator._gateResolve = null; Creator._gateCands = null;
    if (resolve) resolve(checkedSet);
  });

  // ---- password modal (indication unlock) ----
  const pwdModal = document.getElementById('password-modal');
  const pwdClose = document.getElementById('pwd-close');
  const pwdInput = document.getElementById('pwd-input');
  const pwdConfirm = document.getElementById('pwd-confirm');
  const pwdError = document.getElementById('pwd-error');

  const checkPassword = () => {
    if (pwdInput.value === 'awdrgyjil') {
      window.indicationsUnlocked = true;
      pwdModal.style.display = 'none';
      pwdInput.value = '';
      pwdError.style.display = 'none';
      refreshTopButtons();
      ui._updateGuidance();
    } else {
      pwdError.style.display = 'block';
    }
  };
  pwdConfirm.addEventListener('click', checkPassword);
  pwdInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') checkPassword();
  });
  pwdClose.addEventListener('click', () => {
    pwdModal.style.display = 'none';
    pwdInput.value = '';
    pwdError.style.display = 'none';
  });

  // ---- initial state ----
  resizeCanvas();
  ui._updateGuidance();
  refreshTopButtons();
  ui.updateLegend();
  ui.start();

  // Auto-restore the last reactions folder (only succeeds if permission persisted).
  FileIO.tryRestore().then(count => {
    if (count == null) return;
    rebuildDropdown();
    refreshTopButtons();
    if (count > 0) ui._updateStateIndicator(`📁 已自动加载上次的反应文件夹（${count} 个反应）— 点击 Choose Reaction 选择`);
  }).catch(() => {});
})();
</script>
</body>
</html>
