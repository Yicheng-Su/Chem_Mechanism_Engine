// Unicode sub/superscript helpers for formula labels
const SUB_DIGITS = '₀₁₂₃₄₅₆₇₈₉';
const SUP_DIGITS = '⁰¹²³⁴⁵⁶⁷⁸⁹';
function subNum(n) { return String(n).split('').map(d => SUB_DIGITS[+d] || d).join(''); }
function supNum(n) { return String(n).split('').map(d => SUP_DIGITS[+d] || d).join(''); }

function bondStyleForOrder(order) {
  return order === 3 ? 'triple' : order === 2 ? 'double' : 'single';
}

// ============================================================
// MODULE 1: ATOM CLASS (electron-bookkeeping core)
// ============================================================
class Atom {
  /**
   * @param {string} element - Element symbol (H, C, N, O, ... R)
   * @param {number} x
   * @param {number} y
   * @param {object} opts - { id, label, electrons, lonePairs, radical, implicitH, shape, color, radius }
   */
  constructor(element, x, y, opts = {}) {
    const ed = elemData(element);
    this.id = opts.id || null;          // stable id (from reaction file or creator counter)
    this.element = element;
    this.x = x;          this.ox = x;
    this.y = y;          this.oy = y;
    this.vx = 0;         this.vy = 0;
    this._prevX = x;     this._prevY = y;
    this.mass = (opts.mass || ed.mass) * 0.08; // scaled for simulation
    this._isHeavy = (element !== 'H');
    // —— electron bookkeeping ——
    // electrons = non-bonding electrons. lonePairs/radical/charge all derive from it.
    if (typeof opts.electrons === 'number') this.electrons = opts.electrons;
    else if (typeof opts.lonePairs === 'number') this.electrons = opts.lonePairs * 2 + (opts.radical ? 1 : 0);
    else this.electrons = ed.lp * 2;
    this.implicitH = opts.implicitH || 0;   // chemically-present but not-rendered hydrogens (skeletal import)
    this.chargePartial = 0;                  // δ+/δ- display, recomputed by ChemRules
    this.label = opts.label || '';
    this.shape = opts.shape || ed.shape;
    this.color = opts.color || ed.color;
    this.radius = opts.radius || ed.r;
    this.bonds = [];       // references to Bond objects
    this.isDragging = false;
    this.isHovered = false;
    this.visible = true;
    this.opacity = 1;
    this.wobblePhase = Math.random() * PI2;
    this.wobbleAmp = 0;
    this._highlightTimer = 0;
  }

  /** Lone pairs derived from non-bonding electrons */
  get lonePairs() { return Math.floor(this.electrons / 2); }
  /** Radical = odd non-bonding electron */
  get radical() { return this.electrons % 2 === 1; }

  /** Total bonds (counting each bond object once) */
  get bondCount() { return this.bonds.length; }

  /** Sum of bond orders across all bonds + implicit hydrogens */
  get totalValence() {
    return this.bonds.reduce((sum, b) => sum + (b.order || 1), 0) + this.implicitH;
  }

  /** Formal charge = valence electrons − non-bonding electrons − Σ(bond orders). Auto, always consistent. */
  get charge() {
    const v = elemData(this.element).v;
    if (v == null) return 0; // abstract atoms (R, exotic) carry no computed charge
    return v - this.electrons - this.totalValence;
  }

  /** Apply a force vector */
  applyForce(fx, fy) {
    if (!Number.isFinite(fx) || !Number.isFinite(fy)) return;
    this.vx += fx / this.mass;
    this.vy += fy / this.mass;
  }

  /** Physics update step */
  update(dt = 1) {
    if (this.isDragging) {
       this.vx = 0; this.vy = 0;
       return; // position controlled by mouse
    }
    this._prevX = this.x;
    this._prevY = this.y;

    if (!Number.isFinite(this.vx)) this.vx = 0;
    if (!Number.isFinite(this.vy)) this.vy = 0;

    this.x += this.vx * dt;
    this.y += this.vy * dt;
    let speed = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
    if (speed > 30) {
       this.vx = (this.vx / speed) * 30;
       this.vy = (this.vy / speed) * 30;
       speed = 30;
    }
    const dampFactor = speed > 5 ? 0.90 : (speed > 2 ? 0.92 : 0.95);
    this.vx *= dampFactor;
    this.vy *= dampFactor;
    this.wobbleAmp = 0;
    this.wobblePhase = 0;
    if (this._highlightTimer > 0) this._highlightTimer -= dt;
  }

  distTo(other) {
    const dx = this.x - other.x;
    const dy = this.y - other.y;
    return Math.sqrt(dx * dx + dy * dy);
  }

  clamp(bounds) {
    this.x = Math.max(this.radius, Math.min(bounds.w - this.radius, this.x));
    this.y = Math.max(this.radius, Math.min(bounds.h - this.radius, this.y));
  }
}

// ============================================================
// MODULE 2: BOND CLASS
// ============================================================
class Bond {
  /**
   * @param {Atom} a1
   * @param {Atom} a2
   * @param {number} order - 1 | 2 | 3
   * @param {string} style - 'single'|'double'|'triple'|'wedge'|'dashed'|'wavy'
   * @param {object} opts - { restLength, stiffness, breakable }
   */
  constructor(a1, a2, order = 1, style = 'single', opts = {}) {
    this.a1 = a1;
    this.a2 = a2;
    this.order = order;
    this.style = style;
    this.restLength = opts.restLength || this._defaultRestLength();
    this.stiffness = opts.stiffness || 0.015;
    this.breakable = opts.breakable !== false;
    this.broken = false;
    this.visible = true;
    this.opacity = 1;
    this._perpOffset = 4;
    if (!a1.bonds.includes(this)) a1.bonds.push(this);
    if (!a2.bonds.includes(this)) a2.bonds.push(this);
  }

  _defaultRestLength() {
    const r1 = this.a1.radius;
    const r2 = this.a2.radius;
    return (r1 + r2) * 0.8 + 35;
  }

  /** Does this bond connect the given pair (in either direction)? */
  connects(x, y) {
    return (this.a1 === x && this.a2 === y) || (this.a1 === y && this.a2 === x);
  }

  /** Set order and matching visual style */
  setOrder(order) {
    this.order = order;
    this.style = bondStyleForOrder(order);
  }

  get currentLength() { return this.a1.distTo(this.a2); }
  get strain() { return (this.currentLength - this.restLength) / this.restLength; }
  get midpoint() { return { x: (this.a1.x + this.a2.x) / 2, y: (this.a1.y + this.a2.y) / 2 }; }

  get direction() {
    const dx = this.a2.x - this.a1.x;
    const dy = this.a2.y - this.a1.y;
    const len = Math.sqrt(dx * dx + dy * dy) || 1;
    return { x: dx / len, y: dy / len };
  }

  get perp() {
    const d = this.direction;
    return { x: -d.y, y: d.x };
  }

  applySpring() {
    if (this.broken) return;
    const dx = this.a2.x - this.a1.x;
    const dy = this.a2.y - this.a1.y;
    const dist = Math.sqrt(dx * dx + dy * dy) || 0.001;
    const strain = dist - this.restLength;
    let forceMag = strain * this.stiffness;
    if (forceMag > 10.0) forceMag = 10.0;
    if (forceMag < -10.0) forceMag = -10.0;
    const fx = (dx / dist) * forceMag;
    const fy = (dy / dist) * forceMag;
    this.a1.applyForce(fx, fy);
    this.a2.applyForce(-fx, -fy);

    if (this.breakable && Math.abs(strain) > BOND_BREAK_STRAIN) {
      this.broken = true;
      this._onBreak();
    }
  }

  _onBreak() {
    const i1 = this.a1.bonds.indexOf(this);
    const i2 = this.a2.bonds.indexOf(this);
    if (i1 >= 0) this.a1.bonds.splice(i1, 1);
    if (i2 >= 0) this.a2.bonds.splice(i2, 1);
  }

  dissolve() {
    this.broken = true;
    this._onBreak();
  }
}

// ============================================================
// MODULE 3: FRAGMENTS (derived molecules — connected components)
// "Molecule" is no longer a persistent object. Atoms + bonds are the
// single source of truth; fragments are recomputed after EVERY structural
// mutation, so splitting / merging is always physically real.
// ============================================================
class Fragment {
  constructor(atoms, name = '') {
    this.atoms = atoms;
    this.name = name;
    this.color = '#8899aa';
    this.atoms.forEach(a => { a._molecule = this; });
  }

  get centerX() {
    if (this.atoms.length === 0) return 0;
    return this.atoms.reduce((s, a) => s + a.x, 0) / this.atoms.length;
  }
  get centerY() {
    if (this.atoms.length === 0) return 0;
    return this.atoms.reduce((s, a) => s + a.y, 0) / this.atoms.length;
  }
  get bounds() {
    if (this.atoms.length === 0) return { x: 0, y: 0, w: 0, h: 0, cx: 0, cy: 0 };
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    this.atoms.forEach(a => {
      if (a.x < minX) minX = a.x;
      if (a.y < minY) minY = a.y;
      if (a.x > maxX) maxX = a.x;
      if (a.y > maxY) maxY = a.y;
    });
    return { x: minX, y: minY, w: maxX - minX, h: maxY - minY, cx: (minX+maxX)/2, cy: (minY+maxY)/2 };
  }
  translate(dx, dy) {
    this.atoms.forEach(a => { a.x += dx; a.y += dy; });
  }
  hitTest(px, py) {
    return this.atoms.some(a => {
      const d = Math.sqrt((a.x - px) ** 2 + (a.y - py) ** 2);
      return d < a.radius + 4;
    });
  }
}

/** Generate a molecular-formula display label, e.g. H₂O / C₂H₅O⁻ */
function autoFormula(atoms) {
  const counts = {};
  let charge = 0;
  atoms.forEach(a => {
    counts[a.element] = (counts[a.element] || 0) + 1;
    if (a.implicitH) counts.H = (counts.H || 0) + a.implicitH;
    charge += a.charge;
  });
  const keys = Object.keys(counts).sort((x, y) => {
    const pri = k => k === 'C' ? 0 : k === 'H' ? 1 : 2;
    if (pri(x) !== pri(y)) return pri(x) - pri(y);
    return x < y ? -1 : 1;
  });
  let s = keys.map(k => k + (counts[k] > 1 ? subNum(counts[k]) : '')).join('');
  if (charge > 0) s += (charge > 1 ? supNum(charge) : '') + '⁺';
  else if (charge < 0) s += (-charge > 1 ? supNum(-charge) : '') + '⁻';
  return s;
}

/**
 * Rebuild fragments from connectivity (BFS over intact bonds, visible atoms only).
 * namedSets: [{ ids:Set<string>, name }] — fragment whose atom-id set exactly
 * matches a named set keeps its curated name; everything else gets a formula.
 */
function rebuildFragments(atoms, namedSets = []) {
  const visible = atoms.filter(a => a.visible);
  const unvisited = new Set(visible);
  const fragments = [];
  while (unvisited.size > 0) {
    const startAtom = unvisited.values().next().value;
    const comp = [];
    const queue = [startAtom];
    unvisited.delete(startAtom);
    while (queue.length > 0) {
      const a = queue.shift();
      comp.push(a);
      a.bonds.forEach(b => {
        if (b.broken) return;
        const neighbor = b.a1 === a ? b.a2 : b.a1;
        if (unvisited.has(neighbor)) { unvisited.delete(neighbor); queue.push(neighbor); }
      });
    }
    // Name: exact id-set match against a named set, else auto formula
    let name = '';
    const idSet = new Set(comp.map(a => a.id));
    for (const ns of namedSets) {
      if (ns.ids.size === idSet.size && [...idSet].every(id => ns.ids.has(id))) {
        name = ns.name;
        break;
      }
    }
    if (!name) name = autoFormula(comp);
    fragments.push(new Fragment(comp, name));
  }
  // detach hidden atoms from any stale fragment ref
  atoms.forEach(a => { if (!a.visible) a._molecule = null; });
  return fragments;
}

// ============================================================
// MODULE 4: PHYSICS ENGINE
// ============================================================
class PhysicsEngine {
  constructor() {
    this.atoms = [];
    this.bonds = [];
    this.repulsionStrength = 400;
    this.repulsionThreshold = 50;
    this.damping = 0.85;
    this.gravity = 0;
    this.springIterations = 6;
    this.timeStep = 1;
    this._bounds = { w: 1200, h: 700 };
  }

  registerAll(atoms, bonds) {
    this.atoms = atoms;
    this.bonds = bonds;
  }

  setBounds(w, h) {
    this._bounds.w = w;
    this._bounds.h = h;
  }

  /** One physics tick */
  tick() {
    const dt = this.timeStep;
    const liveAtoms = this.atoms.filter(a => a.visible);

    // 1. Spring forces (multiple iterations for stability)
    for (let iter = 0; iter < this.springIterations; iter++) {
      for (const bond of this.bonds) {
        if (!bond.broken && bond.visible) bond.applySpring();
      }
    }

    // 2. Inter-atomic repulsion (soft core); skip atoms ≤2 bonds apart
    for (let i = 0; i < liveAtoms.length; i++) {
      for (let j = i + 1; j < liveAtoms.length; j++) {
        const a = liveAtoms[i], b = liveAtoms[j];

        let areCloseInGraph = false;
        for (let k = 0; k < a.bonds.length; k++) {
          const bd1 = a.bonds[k];
          if (bd1.broken) continue;
          if (bd1.a1 === b || bd1.a2 === b) {
            areCloseInGraph = true;
            break;
          }
          const midAtom = bd1.a1 === a ? bd1.a2 : bd1.a1;
          for (let m = 0; m < midAtom.bonds.length; m++) {
             const bd2 = midAtom.bonds[m];
             if (bd2.broken) continue;
             if (bd2.a1 === b || bd2.a2 === b) {
               areCloseInGraph = true;
               break;
             }
          }
          if (areCloseInGraph) break;
        }

        if (areCloseInGraph) continue;

        const dx = a.x - b.x;
        const dy = a.y - b.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const threshold = this.repulsionThreshold;
        if (dist < threshold && dist > 0.01) {
          const forceMag = Math.min(this.repulsionStrength / (dist * dist), 3.0);
          const fx = (dx / dist) * forceMag;
          const fy = (dy / dist) * forceMag;
          a.applyForce(fx, fy);
          b.applyForce(-fx, -fy);
        }
      }
    }

    // 2.5 Angular springs (VSEPR approximation, ±40° wobble allowance)
    for (const b of liveAtoms) {
      const intactBonds = b.bonds.filter(bd => !bd.broken);
      const N = intactBonds.length;
      if (N < 2) continue;

      let targetAngle = (Math.PI * 2) / N;
      if (N === 2 && b.element === 'O') targetAngle = 104 * Math.PI / 180;
      else if (N === 2) targetAngle = Math.PI;

      let minAngle = targetAngle - (40 * Math.PI / 180);
      if (minAngle < 0.2) minAngle = 0.2;

      for (let i = 0; i < N; i++) {
        for (let j = i + 1; j < N; j++) {
          const a = intactBonds[i].a1 === b ? intactBonds[i].a2 : intactBonds[i].a1;
          const c = intactBonds[j].a1 === b ? intactBonds[j].a2 : intactBonds[j].a1;

          const v1x = a.x - b.x, v1y = a.y - b.y;
          const v2x = c.x - b.x, v2y = c.y - b.y;

          if ((v1x === 0 && v1y === 0) || (v2x === 0 && v2y === 0)) continue;

          const d1 = Math.sqrt(v1x*v1x + v1y*v1y) || 1;
          const d2 = Math.sqrt(v2x*v2x + v2y*v2y) || 1;
          const dot = (v1x*v2x + v1y*v2y) / (d1 * d2);
          const angle = Math.acos(Math.max(-1, Math.min(1, dot)));

          const currentDist = Math.sqrt((a.x - c.x)**2 + (a.y - c.y)**2) || 1;

          if (angle < minAngle) {
            const targetDist = Math.sqrt(Math.max(0, d1*d1 + d2*d2 - 2*d1*d2*Math.cos(minAngle)));
            const pushForce = (targetDist - currentDist) * 0.04;
            const dx = (a.x - c.x) / currentDist;
            const dy = (a.y - c.y) / currentDist;
            a.applyForce(dx * pushForce, dy * pushForce);
            c.applyForce(-dx * pushForce, -dy * pushForce);
          }
        }
      }
    }

    // 3. Brownian drift for free fragments (disabled: BROWNIAN_FORCE = 0)
    if (BROWNIAN_FORCE > 0) {
      const visitedMols = new Set();
      for (const atom of liveAtoms) {
        if (atom.isDragging) continue;
        const mol = atom._molecule;
        if (mol) {
          if (!visitedMols.has(mol)) {
            visitedMols.add(mol);
            if (Math.random() < 0.002 || mol._driftFx === undefined) {
              mol._driftFx = (Math.random() - 0.5) * BROWNIAN_FORCE * 4;
              mol._driftFy = (Math.random() - 0.5) * BROWNIAN_FORCE * 4;
            }
          }
          atom.vx += mol._driftFx;
          atom.vy += mol._driftFy;
        }
      }
    }

    // 4. Update positions with soft boundary bounce
    for (const atom of liveAtoms) {
      atom.update(dt);
      const margin = atom.radius + 5;
      if (atom.x < margin) { atom.x = margin; atom.vx *= -0.8; atom.vx += Math.sign(atom.vx)*0.5; }
      if (atom.y < margin) { atom.y = margin; atom.vy *= -0.8; atom.vy += Math.sign(atom.vy)*0.5; }
      if (atom.x > this._bounds.w - margin) { atom.x = this._bounds.w - margin; atom.vx *= -0.8; atom.vx += Math.sign(atom.vx)*0.5; }
      if (atom.y > this._bounds.h - margin) { atom.y = this._bounds.h - margin; atom.vy *= -0.8; atom.vy += Math.sign(atom.vy)*0.5; }
    }

    // 5. Clean up broken bonds
    this.bonds = this.bonds.filter(b => !b.broken);
  }
}

// ============================================================
// MODULE 5: CHEM RULES — δ display, electron bookkeeping ops,
//           error detection, conservation checks
// ============================================================
const HALOGENS = new Set(['F', 'Cl', 'Br', 'I']);

const ChemRules = {
  /** Recompute δ+/δ− partial-charge display flags across the whole structure */
  updatePartialCharges(atoms, bonds) {
    atoms.forEach(a => { a.chargePartial = 0; });
    for (const b of bonds) {
      if (b.broken) continue;
      const a1 = b.a1, a2 = b.a2;
      const d1 = elemData(a1.element), d2 = elemData(a2.element);
      if (d1.v == null || d2.v == null) continue;       // abstract atoms: no δ
      if (a1.charge !== 0 || a2.charge !== 0) continue; // full charge supersedes δ
      const diff = d1.en - d2.en;
      const isPolarPi = b.order >= 2 && Math.abs(diff) >= 0.4;
      const isCHalogen = b.order === 1 &&
        ((a1.element === 'C' && HALOGENS.has(a2.element)) ||
         (a2.element === 'C' && HALOGENS.has(a1.element)));
      if (isPolarPi || isCHalogen) {
        if (diff > 0) { a1.chargePartial = -0.5; a2.chargePartial = 0.5; }
        else          { a1.chargePartial = 0.5;  a2.chargePartial = -0.5; }
      }
    }
  },

  /** —— Creator-mode electron bookkeeping ——
   * Form a bond: nucleophilic (dative) by default — the donor gives a lone pair.
   * Donor preference: more negative charge → more lone electrons → lower EN.
   */
  bookkeepForm(a, b) {
    const can = x => elemData(x.element).v != null && x.electrons >= 2;
    let donor = null;
    if (can(a) && can(b)) {
      if (a.charge !== b.charge) donor = a.charge < b.charge ? a : b;
      else if (a.electrons !== b.electrons) donor = a.electrons > b.electrons ? a : b;
      else donor = elemData(a.element).en <= elemData(b.element).en ? a : b;
    } else if (can(a)) donor = a;
    else if (can(b)) donor = b;

    if (donor) { donor.electrons -= 2; return { mode: 'dative', donor }; }
    if (a.electrons >= 1 && b.electrons >= 1) {
      a.electrons -= 1; b.electrons -= 1;
      return { mode: 'covalent', donor: null };
    }
    return { mode: 'none', donor: null }; // no electrons available — error rules will flag it
  },

  /**
   * Break one bond order (or a whole single bond).
   * Heterolytic by default: the pair goes to the more electronegative atom.
   * Returns an assignment record the flip-chip can mutate.
   */
  bookkeepBreak(a1, a2) {
    const d1 = elemData(a1.element), d2 = elemData(a2.element);
    let recipient = null;
    if (d1.v != null || d2.v != null) {
      if (d1.v == null) recipient = a2;
      else if (d2.v == null) recipient = a1;
      else recipient = d2.en >= d1.en ? a2 : a1;
    }
    if (recipient) recipient.electrons += 2;
    return { a1, a2, recipient, mode: 'hetero' };
  },

  /** Undo whatever electron assignment a break-record currently holds */
  _undoBreakAssign(rec) {
    if (rec.mode === 'hetero' && rec.recipient) rec.recipient.electrons -= 2;
    else if (rec.mode === 'homo') { rec.a1.electrons -= 1; rec.a2.electrons -= 1; }
  },

  /** Re-assign a break-record: mode 'hetero' (with recipient) or 'homo' */
  reassignBreak(rec, mode, recipient = null) {
    this._undoBreakAssign(rec);
    rec.mode = mode;
    rec.recipient = recipient;
    if (mode === 'hetero' && recipient) recipient.electrons += 2;
    else if (mode === 'homo') { rec.a1.electrons += 1; rec.a2.electrons += 1; }
  },

  /** Raise bond order using a lone pair (alkoxide collapse etc.) */
  bookkeepRaiseOrder(a1, a2) {
    const can = x => elemData(x.element).v != null && x.electrons >= 2;
    let donor = null;
    if (can(a1) && can(a2)) donor = a1.charge < a2.charge ? a1 : a2.charge < a1.charge ? a2 : (a1.electrons >= a2.electrons ? a1 : a2);
    else if (can(a1)) donor = a1;
    else if (can(a2)) donor = a2;
    if (donor) { donor.electrons -= 2; return { mode: 'dative', donor }; }
    return { mode: 'none', donor: null };
  },

  /** Max total bond order before "hypervalent" red error */
  maxBondsFor(atom) {
    const ed = elemData(atom.element);
    return ed.hyper; // S 6 / P 5 / I 3 exemptions encoded in the table
  },

  /**
   * Scan the whole structure for chemistry problems.
   * Returns [{ key, level:'error'|'warn', msg, anchor:Atom }]
   * Used in creator mode (play mode is script-driven and assumed correct).
   */
  checkErrors(atoms, bonds, fragments) {
    const out = [];
    const sig = a => 'v' + a.totalValence + 'e' + a.electrons;
    const push = (rule, level, msg, anchor) =>
      out.push({ key: rule + ':' + (anchor.id || anchor.element) + ':' + sig(anchor), level, msg, anchor });

    for (const a of atoms) {
      if (!a.visible) continue;
      const ed = elemData(a.element);
      if (ed.v == null) continue;
      const tv = a.totalValence;
      const ch = a.charge;

      // 1. Hypervalence
      if (ed.hyper != null && tv > ed.hyper) {
        push('hyper', 'error', `⛔ 超价：${a.element} 的成键总数 (${tv}) 超过上限 (${ed.hyper})`, a);
      }
      // 2. H in a multiple bond
      if (a.element === 'H' && a.bonds.some(b => !b.broken && b.order > 1)) {
        push('hMulti', 'error', '⛔ 氢不能参与双键/三键', a);
      }
      // 3. Charge out of range on 2nd-period atoms
      if (['C', 'N', 'O', 'F', 'B'].includes(a.element) && Math.abs(ch) >= 2) {
        push('chargeRange', 'error', `⛔ 电荷越界：${a.element} 形式电荷为 ${ch > 0 ? '+' + ch : ch}`, a);
      }
      // 5. Geminal polyol: sp3-ish C with ≥2 single-bonded O–H groups
      if (a.element === 'C') {
        let ohCount = 0;
        for (const b of a.bonds) {
          if (b.broken || b.order !== 1) continue;
          const o = b.a1 === a ? b.a2 : b.a1;
          if (o.element !== 'O') continue;
          const oHasH = o.implicitH > 0 || o.bonds.some(bb => !bb.broken && ((bb.a1 === o ? bb.a2 : bb.a1).element === 'H'));
          if (oHasH) ohCount++;
        }
        if (ohCount >= 2) push('gemDiol', 'warn', '⚠️ 不稳定结构：同一碳上挂有两个以上羟基（偕二醇），倾向脱水', a);
        // 6. ≥3 heteroatom substituents on one carbon
        let hetero = 0;
        for (const b of a.bonds) {
          if (b.broken) continue;
          const n = b.a1 === a ? b.a2 : b.a1;
          if (n.element === 'N' || n.element === 'O' || n.element === 'S' || HALOGENS.has(n.element)) hetero++;
        }
        if (hetero >= 3) push('polyHetero', 'warn', '⚠️ 同一碳上连有 3 个及以上杂原子，结构通常不稳定', a);
      }
      // 9. Radical
      if (a.radical && a.element !== 'H') {
        push('radical', 'warn', `⚠️ ${a.element} 上有未成对电子（自由基）`, a);
      }
    }

    // 7. Adjacent like charges
    for (const b of bonds) {
      if (b.broken) continue;
      const c1 = b.a1.charge, c2 = b.a2.charge;
      if (c1 !== 0 && c2 !== 0 && Math.sign(c1) === Math.sign(c2)) {
        push('likeCharges', 'warn', `⚠️ 相邻原子带同号电荷（${c1 > 0 ? '+/+' : '−/−'}），静电排斥强`, b.a1);
      }
    }

    // 8. Isolated single C / N atoms (carbene / nitrene suspicion)
    for (const f of (fragments || [])) {
      if (f.atoms.length === 1) {
        const a = f.atoms[0];
        if ((a.element === 'C' || a.element === 'N') && a.implicitH === 0) {
          push('isolated', 'warn', `⚠️ 孤立的 ${a.element} 原子（卡宾/氮宾？）通常极不稳定`, a);
        }
      }
    }
    return out;
  },

  /** Creator save-step conservation check */
  conservationCheck(baseSnap, curSnap) {
    const msgs = [];
    if (baseSnap.totalCharge !== curSnap.totalCharge) {
      msgs.push(`总电荷不守恒：${baseSnap.totalCharge >= 0 ? '+' + baseSnap.totalCharge : baseSnap.totalCharge} → ${curSnap.totalCharge >= 0 ? '+' + curSnap.totalCharge : curSnap.totalCharge}`);
    }
    const added = [...curSnap.atomIds].filter(id => !baseSnap.atomIds.has(id));
    const removed = [...baseSnap.atomIds].filter(id => !curSnap.atomIds.has(id));
    if (added.length) msgs.push(`本步中新增了 ${added.length} 个原子（已自动并入初始状态，将从 Step 0 起出现在画布上）`);
    if (removed.length) msgs.push(`本步中删除了 ${removed.length} 个原子（将以"隐藏"方式记录在本步中）`);
    return msgs;
  },
};

// ============================================================
// MODULE 6: REACTION DOCUMENT — validation
// ============================================================
function validateDoc(j) {
  const errors = [];
  if (!j || typeof j !== 'object') { errors.push('不是有效的 JSON 对象'); return { ok: false, errors }; }
  if (j.format !== CME_FORMAT) { errors.push(`format 字段不是 "${CME_FORMAT}"`); return { ok: false, errors }; }
  if (!j.initial || !Array.isArray(j.initial.atoms) || j.initial.atoms.length === 0) {
    errors.push('initial.atoms 缺失或为空');
    return { ok: false, errors };
  }
  const ids = new Set();
  for (const a of j.initial.atoms) {
    if (!a.id) errors.push('存在缺少 id 的原子');
    else if (ids.has(a.id)) errors.push(`原子 id 重复: ${a.id}`);
    else ids.add(a.id);
    if (!a.el) errors.push(`原子 ${a.id} 缺少元素符号 el`);
    if (typeof a.x !== 'number' || typeof a.y !== 'number') errors.push(`原子 ${a.id} 坐标无效`);
  }
  const checkRef = (id, where) => { if (!ids.has(id)) errors.push(`${where} 引用了不存在的原子 ${id}`); };
  for (const b of (j.initial.bonds || [])) {
    checkRef(b.a, 'initial.bonds'); checkRef(b.b, 'initial.bonds');
  }
  const checkDelta = (d, w) => {
    (d.bondsFormed  || []).forEach(x => { checkRef(x.a, w); checkRef(x.b, w); });
    (d.bondsBroken  || []).forEach(x => { checkRef(x.a, w); checkRef(x.b, w); });
    (d.orderChanges || []).forEach(x => { checkRef(x.a, w); checkRef(x.b, w); });
    (d.lonePairChanges || []).forEach(x => checkRef(x.atom, w));
    (d.radicalChanges  || []).forEach(x => checkRef(x.atom, w));
    (d.hide || []).forEach(id => checkRef(id, w));
    (d.show || []).forEach(id => checkRef(id, w));
    (d.eject || []).forEach(e => (e.atoms || []).forEach(id => checkRef(id, w)));
  };
  const checkTrigger = (t, w) => {
    if (!t) return;
    if (!['approach', 'clickBond', 'none'].includes(t.type)) errors.push(`${w}.trigger.type 无效: ${t.type}`);
    if (t.type === 'approach') {
      if (!Array.isArray(t.pair) || t.pair.length !== 2) errors.push(`${w}.trigger.pair 应为两端点`);
      else t.pair.forEach(side => (Array.isArray(side) ? side : [side]).forEach(id => checkRef(id, w + '.trigger')));
    }
    if (t.type === 'clickBond') {
      if (!Array.isArray(t.bond) || t.bond.length !== 2) errors.push(`${w}.trigger.bond 应为两端点`);
      else t.bond.forEach(id => checkRef(id, w + '.trigger'));
    }
  };
  if (!Array.isArray(j.steps)) errors.push('steps 缺失（应为数组）');
  else {
    j.steps.forEach((s, i) => {
      const w = `steps[${i}]`;
      if (Array.isArray(s.micro)) {
        if (s.micro.length === 0) errors.push(`${w}.micro 为空`);
        if (!s.micro.some(m => m.gated !== false)) errors.push(`${w}.micro 至少需要一个门控动作（gated）`);
        s.micro.forEach((m, k) => { checkDelta(m.delta || {}, `${w}.micro[${k}]`); checkTrigger(m.trigger, `${w}.micro[${k}]`); });
      } else {
        checkDelta(s.delta || {}, w);
        checkTrigger(s.trigger, w);
      }
    });
  }
  return { ok: errors.length === 0, errors };
}

// ============================================================
// MODULE 6.5: HEURISTIC ΔG (#7)
// True thermodynamic ΔG needs quantum chemistry — impossible in-browser.
// This is an ILLUSTRATIVE pseudo-energy: bond formation downhill, bond breaking
// uphill, raising order downhill, charge separation uphill. The creator can
// override any step's value/label.
// ============================================================
function microEnergyDelta(delta) {
  let e = 0;
  (delta.bondsFormed || []).forEach(() => { e -= 14; });
  (delta.bondsBroken || []).forEach(() => { e += 14; });
  (delta.orderChanges || []).forEach(oc => { e += (oc.from - oc.to) * 7; });
  // lone-pair shuffles that create charge separation read as mildly uphill
  (delta.lonePairChanges || []).forEach(lp => { e += (lp.to - lp.from) > 0 ? 3 : 0; });
  return e;
}
function stepEnergyDelta(step) {
  const micros = Array.isArray(step.micro) ? step.micro : [{ delta: step.delta || {} }];
  return micros.reduce((s, m) => s + microEnergyDelta(m.delta || {}), 0);
}
/** Build a [{step,energy,label}] profile; explicit step.energy overrides the heuristic. */
function buildEnergyProfile(doc) {
  const ready = doc.ready || {};
  const p0 = { step: 0, energy: (typeof ready.energy === 'number') ? ready.energy : 0, label: ready.energyLabel || 'Reactants' };
  const pts = [p0];
  let cum = p0.energy;
  // small per-step "product stabilization" drift so a roughly bond-balanced mechanism
  // ends below the reactants (most teaching reactions are exergonic). Heuristic only —
  // the bond terms still shape the barriers/valleys; the creator can override any value.
  const DRIFT = -3;
  (doc.steps || []).forEach((s, i) => {
    if (typeof s.energy === 'number') cum = s.energy;
    else cum += stepEnergyDelta(s) + DRIFT;
    pts.push({ step: i + 1, energy: cum, label: s.energyLabel || ('Step ' + (i + 1)) });
  });
  return pts;
}

/**
 * Remove TRANSIENT bond toggles from multi-gate steps: a bond identical before &
 * after a step that was broken/reformed (or order-toggled) inside it is an accidental
 * round-trip that would auto-play (e.g. "OH detaches then reattaches"). Mutates doc.
 * Safe: only drops micros whose bond actions ALL touch net-unchanged bonds.
 */
function sanitizeDoc(doc) {
  if (!doc || !doc.initial || !Array.isArray(doc.steps)) return doc;
  const key = (a, b) => a < b ? a + '|' + b : b + '|' + a;
  const bonds = new Map();
  (doc.initial.bonds || []).forEach(b => bonds.set(key(b.a, b.b), b.order || 1));
  const applyTo = (map, d) => {
    (d.bondsBroken || []).forEach(x => map.delete(key(x.a, x.b)));
    (d.orderChanges || []).forEach(x => map.set(key(x.a, x.b), x.to));
    (d.bondsFormed || []).forEach(x => map.set(key(x.a, x.b), x.order || 1));
  };
  const bondActions = d => [...(d.bondsFormed || []), ...(d.bondsBroken || []), ...(d.orderChanges || [])];
  const touchesKey = (d, k) => bondActions(d).some(x => key(x.a, x.b) === k);
  for (const s of doc.steps) {
    if (Array.isArray(s.micro) && s.micro.length > 1) {
      // Peephole: collapse a pure "break X" micro + a later pure "reform X (same order)"
      // micro when nothing in between touches X. That round-trip is an accidental detach.
      let micro = s.micro.slice();
      let changed = true;
      while (changed) {
        changed = false;
        scan:
        for (let i = 0; i < micro.length; i++) {
          const di = micro[i].delta || {};
          if (bondActions(di).length !== 1 || !(di.bondsBroken || []).length) continue;
          const br = di.bondsBroken[0], k = key(br.a, br.b);
          for (let j = i + 1; j < micro.length; j++) {
            const dj = micro[j].delta || {};
            const reform = (dj.bondsFormed || []).find(x => key(x.a, x.b) === k && (x.order || 1) === (br.order || 1));
            if (reform && bondActions(dj).length === 1) { micro.splice(j, 1); micro.splice(i, 1); changed = true; break scan; }
            if (touchesKey(dj, k)) break; // X used/changed before any clean reform → leave it
          }
        }
      }
      if (micro.length && micro.length < s.micro.length) {
        if (!micro.some(m => m.gated !== false)) {
          const g = micro.find(m => bondActions(m.delta || {}).length);
          if (g) g.gated = true;
        }
        s.micro = micro;
      }
    }
    if (Array.isArray(s.micro)) s.micro.forEach(m => applyTo(bonds, m.delta || {}));
    else applyTo(bonds, s.delta || {});
  }
  return doc;
}

// ============================================================
// MODULE 7: REACTION PLAYER — generic delta interpreter + triggers
// ============================================================
class ReactionPlayer {
  constructor() {
    this.ui = null;          // injected after UIController construction
    this.doc = null;
    this.currentStep = 0;
    this.currentSub = 0;     // index of the next unapplied micro within the current step
    this.aliasMap = new Map();  // fileId → fileId (equivalent-atom permutation)
    this.autoPlay = false;
    this.autoPlayTimer = null;
    this._stepDelay = 2200;
    this.onStepChange = null;
  }

  get totalSteps() { return this.doc ? this.doc.steps.length : 0; }
  get loaded() { return !!this.doc; }
  get complete() { return this.doc && this.currentStep >= this.totalSteps; }

  /** Build the canvas state from a reaction document (step 0) */
  loadDoc(doc) {
    this.stopAutoPlay();
    this.doc = sanitizeDoc(doc);
    this.currentStep = 0;
    this.currentSub = 0;
    this.aliasMap = new Map();

    const ui = this.ui;
    const W = ui.canvas.width || 1200, H = ui.canvas.height || 700;
    const sx = W / ((doc.canvas && doc.canvas.w) || W);
    const sy = H / ((doc.canvas && doc.canvas.h) || H);

    const byId = {};
    const atoms = doc.initial.atoms.map(d => {
      const a = new Atom(d.el, d.x * sx, d.y * sy, {
        id: d.id,
        label: d.label || '',
        lonePairs: (typeof d.lonePairs === 'number') ? d.lonePairs : elemData(d.el).lp,
        radical: !!d.radical,
        implicitH: d.implicitH || 0,
      });
      if (d.hidden) a.visible = false;
      byId[d.id] = a;
      return a;
    });
    const bonds = (doc.initial.bonds || []).map(b =>
      new Bond(byId[b.a], byId[b.b], b.order || 1, bondStyleForOrder(b.order || 1), { breakable: b.breakable !== false })
    );

    // Named molecule sets: BFS over the *initial* adjacency from each anchor
    const adj = {};
    (doc.initial.bonds || []).forEach(b => {
      (adj[b.a] = adj[b.a] || []).push(b.b);
      (adj[b.b] = adj[b.b] || []).push(b.a);
    });
    const namedSets = (doc.initial.moleculeNames || []).map(mn => {
      const seen = new Set([mn.anchor]);
      const q = [mn.anchor];
      while (q.length) {
        const cur = q.shift();
        (adj[cur] || []).forEach(n => { if (!seen.has(n)) { seen.add(n); q.push(n); } });
      }
      return { ids: seen, name: mn.name };
    });

    ui.setStructure(atoms, bonds, namedSets);
    ui.energyPoints = Array.isArray(doc.energyProfile) ? doc.energyProfile : [];
    document.getElementById('energy-panel').style.display =
      (ui.energyPoints.length > 1 && window.innerWidth > 1100) ? 'block' : 'none';
    ui.showCongrats = false;
    ui.fireworkParticles = [];
    this._settleAutos();   // apply any leading auto-micros of step 1, stop at its first gate
    ui._updateGuidance();
    if (this.onStepChange) this.onStepChange(0, this);
  }

  unload() {
    this.stopAutoPlay();
    this.doc = null;
    this.currentStep = 0;
    this.currentSub = 0;
    this.aliasMap = new Map();
    const ui = this.ui;
    ui.setStructure([], [], []);
    ui.energyPoints = [];
    document.getElementById('energy-panel').style.display = 'none';
    ui.showCongrats = false;
    ui.fireworkParticles = [];
    ui._updateGuidance();
  }

  reset() {
    if (this.doc) this.loadDoc(this.doc);
  }

  /** Resolve a file id through the equivalence permutation */
  resolveId(id) { return this.aliasMap.get(id) || id; }
  atomById(fileId) {
    const rid = this.resolveId(fileId);
    return this.ui.atoms.find(a => a.id === rid) || null;
  }
  findBondByFileIds(idA, idB) {
    const a = this.atomById(idA), b = this.atomById(idB);
    if (!a || !b) return null;
    return this.ui.bonds.find(bd => !bd.broken && bd.connects(a, b)) || null;
  }

  /** Swap two file ids in the alias permutation (equivalent-atom substitution) */
  aliasSwap(fid1, fid2) {
    if (fid1 === fid2) return;
    const m = this.aliasMap;
    const v1 = m.get(fid1) || fid1;
    const v2 = m.get(fid2) || fid2;
    m.set(fid1, v2);
    m.set(fid2, v1);
  }

  _applyDeltaForward(delta) {
    const ui = this.ui;
    (delta.bondsBroken || []).forEach(bb => {
      const bond = this.findBondByFileIds(bb.a, bb.b);
      if (bond) bond.dissolve(); else console.warn('delta: bond to break not found', bb);
    });
    (delta.orderChanges || []).forEach(oc => {
      const bond = this.findBondByFileIds(oc.a, oc.b);
      if (bond) bond.setOrder(oc.to); else console.warn('delta: bond for order change not found', oc);
    });
    (delta.bondsFormed || []).forEach(bf => {
      const a = this.atomById(bf.a), b = this.atomById(bf.b);
      if (a && b) ui.bonds.push(new Bond(a, b, bf.order || 1, bondStyleForOrder(bf.order || 1), { restLength: 60, breakable: bf.breakable !== false }));
    });
    (delta.lonePairChanges || []).forEach(lp => {
      const a = this.atomById(lp.atom);
      if (a) a.electrons = lp.to * 2 + (a.electrons % 2);
    });
    (delta.radicalChanges || []).forEach(rc => {
      const a = this.atomById(rc.atom);
      if (a) a.electrons = Math.floor(a.electrons / 2) * 2 + (rc.to ? 1 : 0);
    });
    (delta.hide || []).forEach(id => {
      const a = this.atomById(id);
      if (a) { a.visible = false; a.isDragging = false; a.vx = 0; a.vy = 0; }
    });
    (delta.show || []).forEach(id => {
      const a = this.atomById(id);
      if (a) a.visible = true;
    });
    (delta.eject || []).forEach(e => {
      (e.atoms || []).forEach(id => {
        const a = this.atomById(id);
        if (a) { a.vx = e.vx || 0; a.vy = e.vy || 0; }
      });
    });
    ui.afterStructureChange();
  }

  _applyDeltaReverse(delta) {
    const ui = this.ui;
    (delta.eject || []).forEach(e => {
      (e.atoms || []).forEach(id => {
        const a = this.atomById(id);
        if (a) { a.vx = 0; a.vy = 0; }
      });
    });
    (delta.show || []).forEach(id => {
      const a = this.atomById(id);
      if (a) a.visible = false;
    });
    (delta.hide || []).forEach(id => {
      const a = this.atomById(id);
      if (a) { a.visible = true; a.vx = 0; a.vy = 0; }
    });
    (delta.radicalChanges || []).forEach(rc => {
      const a = this.atomById(rc.atom);
      if (a) a.electrons = Math.floor(a.electrons / 2) * 2 + (rc.from ? 1 : 0);
    });
    (delta.lonePairChanges || []).forEach(lp => {
      const a = this.atomById(lp.atom);
      if (a) a.electrons = lp.from * 2 + (a.electrons % 2);
    });
    (delta.bondsFormed || []).forEach(bf => {
      const bond = this.findBondByFileIds(bf.a, bf.b);
      if (bond) bond.dissolve();
    });
    (delta.orderChanges || []).forEach(oc => {
      const bond = this.findBondByFileIds(oc.a, oc.b);
      if (bond) bond.setOrder(oc.from);
    });
    (delta.bondsBroken || []).forEach(bb => {
      const a = this.atomById(bb.a), b = this.atomById(bb.b);
      if (a && b) ui.bonds.push(new Bond(a, b, bb.order || 1, bondStyleForOrder(bb.order || 1), { restLength: 60 }));
    });
    ui.afterStructureChange();
  }

  // ---- micro-step model (#3 sequential multi-gate) ----
  // A step is a sequence of "micros": { delta, gated, trigger }.
  //   gated:true  → waits for the player's trigger (or the ▶ button / autoplay).
  //   gated:false → "auto" sub-action; applied automatically in recorded order.
  // Legacy steps (step.delta + step.trigger) normalize to a single gated micro,
  // so existing single-action reactions behave exactly as before.
  _stepMicros(idx) {
    const s = this.doc.steps[idx];
    if (!s) return [];
    if (Array.isArray(s.micro)) {
      return s.micro.map(m => ({ delta: m.delta || {}, gated: m.gated !== false, trigger: m.trigger || null, label: m.label }));
    }
    return [{ delta: s.delta || {}, gated: true, trigger: s.trigger || { type: 'none' } }];
  }

  _normTrigger(t) {
    if (!t || t.type === 'none') return null;
    if (t.type === 'approach') {
      const norm = side => (Array.isArray(side) ? side : [side])
        .map(fid => ({ fileId: fid, atom: this.atomById(fid) }))
        .filter(c => c.atom && c.atom.visible);
      const listA = norm(t.pair[0]), listB = norm(t.pair[1]);
      if (!listA.length || !listB.length) return null;
      return { type: 'approach', listA, listB };
    }
    if (t.type === 'clickBond') {
      const bond = this.findBondByFileIds(t.bond[0], t.bond[1]);
      if (!bond) return null;
      return { type: 'clickBond', bond, label: t.label };
    }
    return null;
  }

  _deltaSoundName(delta) {
    const formed = (delta.bondsFormed || []).length > 0;
    const broken = (delta.bondsBroken || []).length > 0;
    const orderUp = (delta.orderChanges || []).some(oc => oc.to > oc.from);
    const orderDown = (delta.orderChanges || []).some(oc => oc.to < oc.from);
    const hidden = (delta.hide || []).length > 0;
    const shown = (delta.show || []).length > 0;
    if ((formed || orderUp) && !(broken || orderDown)) return 'connect';
    if ((broken || orderDown) && !(formed || orderUp)) return 'disconnect';
    if (hidden && !shown) return 'disconnect';
    if (shown && !hidden) return 'connect';
    return null;
  }

  _playDeltaBundleSound(micros, fallback = 'step') {
    let hasConnect = false, hasDisconnect = false;
    for (const m of micros) {
      const s = this._deltaSoundName((m && m.delta) || {});
      if (s === 'connect') hasConnect = true;
      if (s === 'disconnect') hasDisconnect = true;
    }
    const sound = hasConnect && !hasDisconnect ? 'connect'
      : hasDisconnect && !hasConnect ? 'disconnect'
      : fallback;
    SoundFX.play(sound);
  }

  /** Apply consecutive auto (non-gated) micros; cross completed steps; stop at the next gate. */
  _settleAutos() {
    while (this.currentStep < this.totalSteps) {
      const micros = this._stepMicros(this.currentStep);
      while (this.currentSub < micros.length && !micros[this.currentSub].gated) {
        this._applyDeltaForward(micros[this.currentSub].delta);
        this.currentSub++;
      }
      if (this.currentSub < micros.length) return;   // stopped at a gate
      const step = this.doc.steps[this.currentStep];
      this.currentStep++; this.currentSub = 0;
      if (step.fireworks) this.ui._spawnFireworks();
    }
  }

  /** Player satisfied the active gate (approach bond / clickBond). Apply it + settle. */
  satisfyGate() {
    if (!this.doc || this.currentStep >= this.totalSteps) return false;
    const micros = this._stepMicros(this.currentStep);
    const m = micros[this.currentSub];
    if (!m || !m.gated) return false;
    this._applyDeltaForward(m.delta);
    this._playDeltaBundleSound([m], 'step');
    this.currentSub++;
    this._settleAutos();
    this.ui._updateGuidance();
    if (this.onStepChange) this.onStepChange(this.currentStep, this);
    return true;
  }

  /** ▶ button / autoplay: apply ALL remaining micros of the current step at once. */
  advanceStep() {
    if (!this.doc || this.currentStep >= this.totalSteps) return false;
    const micros = this._stepMicros(this.currentStep);
    const applied = micros.slice(this.currentSub);
    for (let i = this.currentSub; i < micros.length; i++) this._applyDeltaForward(micros[i].delta);
    const step = this.doc.steps[this.currentStep];
    this.currentStep++; this.currentSub = 0;
    this._playDeltaBundleSound(applied, 'step');
    if (step.fireworks) this.ui._spawnFireworks();
    this._settleAutos();
    this.ui._updateGuidance();
    if (this.onStepChange) this.onStepChange(this.currentStep, this);
    return true;
  }

  /** ◀ button: rewind one gate's worth of progress (mid-step) or one whole step. */
  reverseStep() {
    if (!this.doc) return false;
    const micros = this._stepMicros(this.currentStep) || [];
    if (this.currentSub > 0) {
      // mid-step: rewind to the start of this step (then re-settle its leading autos)
      for (let i = this.currentSub - 1; i >= 0; i--) this._applyDeltaReverse(micros[i].delta);
      this.currentSub = 0;
      this._settleAutos();
      this.ui._updateGuidance();
      if (this.onStepChange) this.onStepChange(this.currentStep, this);
      SoundFX.play('back');
      return true;
    }
    if (this.currentStep <= 0) return false;
    this.currentStep--;
    const prev = this._stepMicros(this.currentStep);
    for (let i = prev.length - 1; i >= 0; i--) this._applyDeltaReverse(prev[i].delta);
    this.currentSub = 0;
    const step = this.doc.steps[this.currentStep];
    if (step && step.fireworks) { this.ui.showCongrats = false; this.ui.fireworkParticles = []; }
    this._settleAutos();
    this.ui._updateGuidance();
    if (this.onStepChange) this.onStepChange(this.currentStep, this);
    SoundFX.play('back');
    return true;
  }

  getStepInfo() {
    if (!this.doc) {
      return { num: 0, total: 0, name: '未加载反应 / No reaction loaded', desc: '点击 <b>Import File</b> 选择包含 <code>.cme.json</code> 反应文件的文件夹，再用 <b>Choose Reaction</b> 加载；或点击 <b>Create Reaction</b> 开始创作。', progress: 0 };
    }
    const N = this.totalSteps, k = this.currentStep;
    if (k <= 0) {
      const r = this.doc.ready || {};
      return { num: 0, total: N, name: r.title || 'Step 0: Ready State', desc: r.indication || '', progress: 0 };
    }
    const s = this.doc.steps[Math.min(k, N) - 1] || {};
    if (k >= N) {
      return { num: N, total: N, name: '✅ Reaction Complete', desc: this.doc.completeIndication || s.indication || '', progress: 1 };
    }
    return { num: k, total: N, name: s.title || `Step ${k}`, desc: s.indication || '', progress: Math.min(k / N, 1) };
  }

  /** Normalized trigger for the active gate (next gated micro of the current step). */
  currentTrigger() {
    if (!this.doc || this.currentStep >= this.totalSteps) return null;
    const micros = this._stepMicros(this.currentStep);
    const m = micros[this.currentSub];
    if (!m || !m.gated) return null;
    return this._normTrigger(m.trigger);
  }

  startAutoPlay() {
    this.autoPlay = true;
    this._autoAdvance();
  }
  stopAutoPlay() {
    this.autoPlay = false;
    if (this.autoPlayTimer) clearTimeout(this.autoPlayTimer);
  }
  _autoAdvance() {
    if (!this.autoPlay) return;
    if (this.currentStep <= this.totalSteps - 1) {
      this.advanceStep();
      this.autoPlayTimer = setTimeout(() => this._autoAdvance(), this._stepDelay);
    } else {
      this.autoPlay = false;
    }
  }
}

// ============================================================
// MODULE 8: SMILES IMPORTER (openchemlib-js wrapper)
// ============================================================
const PERIODIC_FALLBACK = ['?','H','He','Li','Be','B','C','N','O','F','Ne','Na','Mg','Al','Si','P','S','Cl','Ar','K','Ca','Sc','Ti','V','Cr','Mn','Fe','Co','Ni','Cu','Zn','Ga','Ge','As','Se','Br','Kr','Rb','Sr','Y','Zr','Nb','Mo','Tc','Ru','Rh','Pd','Ag','Cd','In','Sn','Sb','Te','I','Xe'];

/**
 * Parse a SMILES string into engine atoms/bonds, centered on (0,0).
 * @param {string} smiles
 * @param {boolean} showAllH - false: only heteroatom H rendered; C–H folded into implicitH
 * @param {function} idGen - returns a fresh unique atom id
 * @returns {{atoms: Atom[], bonds: Bond[]}}
 */
function importSmiles(smiles, showAllH, idGen) {
  if (!window.OCL) {
    throw new Error('SMILES 解析库未加载：请确认 lib/openchemlib-full.js 存在于本页面同目录的 lib 文件夹中');
  }
  // Wildcard / R-group atoms: OCL can't parse [R], [R1], [*]... so pre-substitute
  // each with [U] (uranium placeholder, atomicNo 92) and remember its label in
  // SMILES order. Atom indices are preserved through parsing, so the k-th [U]
  // atom maps to the k-th queued label. [R]/[*]/* → "R"; [R1] → "R1"; etc.
  const labelQueue = [];
  const pre = smiles.trim().replace(/\[R(\d+)\]|\[R\]|\[\*\]|\*/g, (m, num) => {
    labelQueue.push(num ? 'R' + num : 'R');
    return '[U]';
  });
  let mol;
  try {
    mol = OCL.Molecule.fromSmiles(pre);
  } catch (e) {
    throw new Error('SMILES 解析失败：' + (e.message || e));
  }
  if (mol.getAllAtoms() === 0) throw new Error('SMILES 为空');
  // ⚠ Order matters: inventCoordinates() DELETES explicit hydrogens, so lay out
  // the heavy-atom skeleton first, THEN add hydrogens (they get coordinates too).
  try { mol.inventCoordinates(); } catch (e) { /* fall back to whatever coords exist */ }
  mol.addImplicitHydrogens();

  const n = mol.getAllAtoms();
  const m = mol.getAllBonds();

  // Raw atom records
  const raw = [];
  let rLabelIdx = 0;
  for (let i = 0; i < n; i++) {
    const no = mol.getAtomicNo(i);
    let el, label = '';
    if (no === 0 || no === 92) {            // 92 = [U] R-group placeholder
      el = 'R';
      label = labelQueue[rLabelIdx++] || 'R';
    } else {
      el = ATOMIC_SYMBOLS[no] || PERIODIC_FALLBACK[no] || 'R';
    }
    raw.push({
      idx: i, el, label,
      charge: mol.getAtomCharge(i),
      radical: mol.getAtomRadical(i) !== 0,
      x: mol.getAtomX(i),
      y: -mol.getAtomY(i),    // molfile y-up → canvas y-down
      neighbors: [], orders: [],
      keep: true,
    });
  }
  const rawBonds = [];
  for (let b = 0; b < m; b++) {
    const i1 = mol.getBondAtom(0, b);
    const i2 = mol.getBondAtom(1, b);
    let order = mol.getBondOrder(b);
    if (!(order >= 1 && order <= 3)) order = 1;
    rawBonds.push({ i1, i2, order });
    raw[i1].neighbors.push(i2); raw[i1].orders.push(order);
    raw[i2].neighbors.push(i1); raw[i2].orders.push(order);
  }

  // Skeletal mode: fold C–H hydrogens into implicitH on the carbon
  if (!showAllH) {
    for (const r of raw) {
      if (r.el === 'H' && r.charge === 0 && !r.radical && r.neighbors.length === 1) {
        const parent = raw[r.neighbors[0]];
        if (parent.el === 'C') {
          r.keep = false;
          parent.implicitH = (parent.implicitH || 0) + 1;
        }
      }
    }
  }

  // Geometry normalization: average bond length → 70 px
  let avg = 0, cnt = 0;
  for (const rb of rawBonds) {
    const dx = raw[rb.i1].x - raw[rb.i2].x, dy = raw[rb.i1].y - raw[rb.i2].y;
    avg += Math.sqrt(dx * dx + dy * dy); cnt++;
  }
  avg = cnt ? avg / cnt : 1.5;
  const kept = raw.filter(r => r.keep);
  let scale = 70 / (avg || 1.5);
  if (!isFinite(scale) || avg < 1e-6) {
    // degenerate coordinates — place atoms on a circle; spring physics will relax
    const rad = Math.max(40, kept.length * 14);
    kept.forEach((r, i) => {
      r.x = Math.cos((i / kept.length) * PI2) * rad;
      r.y = Math.sin((i / kept.length) * PI2) * rad;
    });
    scale = 1;
  }
  const cxm = kept.reduce((s, r) => s + r.x, 0) / kept.length;
  const cym = kept.reduce((s, r) => s + r.y, 0) / kept.length;

  // Build engine atoms
  const atomByIdx = {};
  const atoms = [];
  for (const r of kept) {
    // chemistry bond total — r.orders already includes bonds to folded hydrogens
    const bTotal = r.orders.reduce((s, o) => s + o, 0);
    const ed = elemData(r.el);
    let electrons = 0;
    if (ed.v != null) {
      electrons = ed.v - r.charge - bTotal;
      if (electrons < 0) electrons = 0;
    }
    const a = new Atom(r.el, (r.x - cxm) * scale, (r.y - cym) * scale, {
      id: idGen(),
      electrons,
      implicitH: r.implicitH || 0,
      label: r.el === 'R' ? (r.label || 'R') : '',
    });
    atomByIdx[r.idx] = a;
    atoms.push(a);
  }
  const bonds = [];
  for (const rb of rawBonds) {
    const a1 = atomByIdx[rb.i1], a2 = atomByIdx[rb.i2];
    if (!a1 || !a2) continue; // bond to a folded hydrogen
    bonds.push(new Bond(a1, a2, rb.order, bondStyleForOrder(rb.order)));
  }
  return { atoms, bonds };
}

/** Display label for a reaction: prefer a meaningful internal name, else filename. */
function displayLabel(name, fileName) {
  const generic = !name || name === 'Untitled Reaction' || name === 'My Reaction' || name === 'Untitled';
  if (!generic) return name;
  const stem = (fileName || '').replace(/\.cme\.json$/i, '').replace(/\.json$/i, '');
  return stem || name || '未命名反应';
}

/** Tiny IndexedDB key-value store for persisting the reactions FileSystem handle. */
const HandleStore = {
  _db: null,
  async _open() {
    if (this._db) return this._db;
    if (!window.indexedDB) return null;
    return new Promise((res) => {
      const req = indexedDB.open('cme-handles', 1);
      req.onupgradeneeded = () => req.result.createObjectStore('kv');
      req.onsuccess = () => { this._db = req.result; res(this._db); };
      req.onerror = () => res(null);
    });
  },
  async set(key, val) {
    const db = await this._open(); if (!db) return;
    return new Promise((res) => {
      const tx = db.transaction('kv', 'readwrite');
      tx.objectStore('kv').put(val, key);
      tx.oncomplete = () => res(); tx.onerror = () => res();
    });
  },
  async get(key) {
    const db = await this._open(); if (!db) return null;
    return new Promise((res) => {
      const tx = db.transaction('kv', 'readonly');
      const r = tx.objectStore('kv').get(key);
      r.onsuccess = () => res(r.result || null); r.onerror = () => res(null);
    });
  },
};

const FileIO = {
  available: [],         // [{ label, doc, fileName }]
  currentHandle: null,   // FileSystemFileHandle for creator Save
  lastDirHandle: null,   // FileSystemDirectoryHandle of the reactions folder (persisted)

  /** Scan an already-granted directory handle into this.available. Returns count. */
  async scanDir(dir) {
    const found = [];
    for await (const entry of dir.values()) {
      if (entry.kind === 'file' && /\.cme\.json$/i.test(entry.name)) {
        try {
          const f = await entry.getFile();
          const j = JSON.parse(await f.text());
          const v = validateDoc(j);
          if (v.ok) found.push({ label: displayLabel(j.name, entry.name), doc: j, fileName: entry.name, handle: entry });
          else console.warn('跳过无效反应文件', entry.name, v.errors);
        } catch (e) { console.warn('跳过文件', entry.name, e); }
      }
    }
    this.available = found.sort((a, b) => a.label.localeCompare(b.label, 'zh'));
    return found.length;
  },

  /** Try to silently restore + scan the last folder (only if permission already granted). */
  async tryRestore() {
    if (!window.showDirectoryPicker) return null;
    const dir = await HandleStore.get('reactionsDir');
    if (!dir) return null;
    this.lastDirHandle = dir;
    try {
      const perm = dir.queryPermission ? await dir.queryPermission({ mode: 'read' }) : 'prompt';
      if (perm !== 'granted') return null;   // need a user gesture to re-grant
      return await this.scanDir(dir);
    } catch (e) { return null; }
  },

  /** Scan a user-selected folder for *.cme.json files. Returns count, or null if cancelled.
   *  Always shows the picker (so the user can switch folders); `id`+`startIn` make it
   *  open AT the last-used reactions folder rather than Documents. */
  async pickFolder() {
    if (window.showDirectoryPicker) {
      let dir;
      try {
        // `id` persists this picker's last location across reloads; `startIn` seeds it.
        const opts = { mode: 'read', id: 'cme-reactions' };
        if (this.lastDirHandle) opts.startIn = this.lastDirHandle;
        dir = await window.showDirectoryPicker(opts);
      } catch (e) {
        if (e && e.name === 'AbortError') return null;
        throw e;
      }
      const count = await this.scanDir(dir);
      this.lastDirHandle = dir;
      HandleStore.set('reactionsDir', dir).catch(() => {});
      return count;
    }
    // Fallback: webkitdirectory input — resolved by bootstrap change handler
    return new Promise(resolve => {
      const input = document.getElementById('dir-fallback');
      const onChange = async () => {
        input.removeEventListener('change', onChange);
        const found = [];
        for (const f of input.files) {
          if (!/\.cme\.json$/i.test(f.name)) continue;
          try {
            const j = JSON.parse(await f.text());
            const v = validateDoc(j);
            if (v.ok) found.push({ label: displayLabel(j.name, f.name), doc: j, fileName: f.name });
          } catch (e) { console.warn('跳过文件', f.name, e); }
        }
        this.available = found.sort((a, b) => a.label.localeCompare(b.label, 'zh'));
        input.value = '';
        resolve(found.length);
      };
      input.addEventListener('change', onChange);
      input.click();
    });
  },

  /** Save As — returns the handle (or null when fallback download was used / cancelled) */
  async saveJsonAs(json, suggestedName) {
    const text = JSON.stringify(json, null, 2);
    if (window.showSaveFilePicker) {
      let handle;
      try {
        const opts = {
          suggestedName,
          id: 'cme-reactions',
          types: [{ description: 'CME Reaction', accept: { 'application/json': ['.json'] } }],
        };
        if (this.lastDirHandle) opts.startIn = this.lastDirHandle;  // default into the reactions folder
        handle = await window.showSaveFilePicker(opts);
      } catch (e) {
        if (e && e.name === 'AbortError') return undefined; // user cancelled
        throw e;
      }
      const w = await handle.createWritable();
      await w.write(text);
      await w.close();
      this.currentHandle = handle;
      return handle;
    }
    this.downloadJson(json, suggestedName);
    return null;
  },

  async saveToCurrentHandle(json) {
    if (!this.currentHandle) return false;
    const w = await this.currentHandle.createWritable();
    await w.write(JSON.stringify(json, null, 2));
    await w.close();
    return true;
  },

  downloadJson(json, filename) {
    const blob = new Blob([JSON.stringify(json, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 2000);
  },
};

// MODULE 10: UI CONTROLLER — canvas rendering & interaction
// ============================================================
class UIController {
  constructor(canvas, guidanceInner, player, physics) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.guidanceInner = guidanceInner;
    this.player = player;
    this.physics = physics;
    this.appMode = 'play';      // 'play' | 'create'
    this.atoms = [];
    this.bonds = [];
    this.fragments = [];
    this.namedSets = [];

    // Drag state
    this.dragTarget = null;
    this.isDragging = false;
    this.mouseX = 0;
    this.mouseY = 0;
    this._dragMoved = 0;

    // Hover state
    this.hoveredAtom = null;

    // Rendering
    this._frameCount = 0;
    this._lastFpsTime = performance.now();
    this._fps = 60;
    this.rafId = null;

    // Effects
    this.electronParticles = [];
    this.energyPoints = [];
    this.fireworkParticles = [];
    this.showCongrats = false;
    this._congratsAngle = 0;

    // Reactive pair (play-mode proximity-drag trigger indicator)
    this.reactivePair = null;
    this._prevDragX = 0;
    this._prevDragY = 0;

    // Play-mode click-to-bond mechanism (scheme B):
    this.playPick = [];          // atoms clicked toward forming a green line (0..1)
    this.stickyGreen = null;     // confirmed green line awaiting a click: {a1,a2,fidA,fidB,primA,primB}
    this.breakArmed = null;      // clickBond trigger: bond becomes red-flashing only after first click
    this._triggerEntryDist = new Map();  // "fidA|fidB" → distance at step entry (close-start gating)
    this._downAtom = null;
    this._downPos = null;

    this._bindEvents();
  }

  // ---- play-mode step-change hook (entry-distance capture + reset interaction state) ----
  _pairKey(a, b) { return a < b ? a + '|' + b : b + '|' + a; }

  _onStepChanged() {
    this.playPick = [];
    this.stickyGreen = null;
    this.breakArmed = null;
    this.reactivePair = null;
    this._triggerEntryDist = new Map();
    if (this.appMode !== 'play' || !this.player.loaded) return;
    const trig = this.player.currentTrigger();
    if (trig && trig.type === 'approach') {
      for (const ca of trig.listA) {
        for (const cb of trig.listB) {
          if (!ca.atom || !cb.atom) continue;
          this._triggerEntryDist.set(this._pairKey(ca.fileId, cb.fileId), ca.atom.distTo(cb.atom));
        }
      }
    }
  }

  /** Was this candidate pair already close when the step began? (→ click-only) */
  _isCloseStart(fidA, fidB) {
    const d = this._triggerEntryDist.get(this._pairKey(fidA, fidB));
    return d != null && d <= CLOSE_START_DIST;
  }

  /** For the current approach trigger, return the {fidA,fidB,primA,primB} for atoms x,y if they form a valid pair. */
  _approachPairFor(x, y) {
    const trig = this.player.currentTrigger();
    if (!trig || trig.type !== 'approach') return null;
    const inA = c => c.atom === x ? c : null;
    const inB = c => c.atom === y ? c : null;
    const find = (list, atom) => list.find(c => c.atom === atom) || null;
    let ca = find(trig.listA, x), cb = find(trig.listB, y);
    if (!ca || !cb) { ca = find(trig.listA, y); cb = find(trig.listB, x); }
    if (!ca || !cb) return null;
    return { fidA: ca.fileId, fidB: cb.fileId, primA: trig.listA[0].fileId, primB: trig.listB[0].fileId };
  }

  // ---- STRUCTURE MANAGEMENT ----

  setStructure(atoms, bonds, namedSets) {
    this.atoms = atoms;
    this.bonds = bonds;
    this.namedSets = namedSets || [];
    this.reactivePair = null;
    this.hoveredAtom = null;
    this.dragTarget = null;
    this.isDragging = false;
    this.playPick = [];
    this.stickyGreen = null;
    this.breakArmed = null;
    this._downAtom = null;
    this._downPos = null;
    this.afterStructureChange();
  }

  /** Single post-mutation pipeline: connectivity → fragments → δ → physics → legend → errors */
  afterStructureChange() {
    this.bonds = this.bonds.filter(b => !b.broken);
    this.fragments = rebuildFragments(this.atoms, this.namedSets);
    ChemRules.updatePartialCharges(this.atoms, this.bonds);
    this.physics.registerAll(this.atoms, this.bonds);
    this.updateLegend();
    if (this.appMode === 'create' && window.Creator) {
      // NOTE: recording snapshots are taken explicitly by discrete gateable actions
      // (formBond / breakBondOneOrder / raiseOrder / erase / paste / import / piAttack),
      // NOT here — so flip-chip electron tweaks and transient changes don't bloat the step.
      Creator.refreshErrors();
    }
  }

  updateLegend() {
    const box = document.getElementById('legend-items');
    if (!box) return;
    const seen = new Map();
    this.atoms.forEach(a => {
      if (!a.visible || seen.has(a.element)) return;
      seen.set(a.element, elemData(a.element));
    });
    const rows = [...seen.entries()].map(([el, ed]) =>
      `<div><span class="dot" style="background:${ed.color};"></span>${ed.name}</div>`
    );
    box.innerHTML = rows.join('') || '<div style="opacity:.5">—</div>';
  }

  // ---- ELECTRON EFFECTS / FIREWORKS ----

  _spawnElectronFlow(fromAtom, toAtom, count = 8) {
    for (let i = 0; i < count; i++) {
      this.electronParticles.push({
        x: fromAtom.x, y: fromAtom.y,
        tx: toAtom.x, ty: toAtom.y,
        progress: i / count,
        speed: 0.008 + Math.random() * 0.01,
        life: 1,
        decay: 0.003 + Math.random() * 0.004
      });
    }
  }

  _spawnFireworks() {
    this.fireworkParticles = [];
    this.showCongrats = true;
    SoundFX.play('success', { cooldown: 700 });
    this._spawnFireworkBurst();
  }

  _spawnFireworkBurst() {
    const cx = this.canvas.width / 2;
    const cy = this.canvas.height / 2;
    for (let i = 0; i < 150; i++) {
      const angle = Math.random() * PI2;
      const speed = 2 + Math.random() * 8;
      this.fireworkParticles.push({ x: cx, y: cy, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, color: `hsl(${Math.random()*360}, 90%, 65%)`, life: 1.0, decay: 0.004 + Math.random()*0.008 });
    }
  }

  // ---- EVENT BINDING ----

  _bindEvents() {
    this.canvas.addEventListener('mousedown', (e) => this._onMouseDown(e));
    this.canvas.addEventListener('mousemove', (e) => this._onMouseMove(e));
    this.canvas.addEventListener('mouseup', (e) => this._onMouseUp(e));
    this.canvas.addEventListener('mouseleave', (e) => this._onMouseLeave(e));
    this.canvas.addEventListener('wheel', (e) => { e.preventDefault(); });
    this.canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const t = e.touches[0];
      this._onMouseDown({ clientX: t.clientX, clientY: t.clientY });
    }, { passive: false });
    this.canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const t = e.touches[0];
      this._onMouseMove({ clientX: t.clientX, clientY: t.clientY });
    }, { passive: false });
    this.canvas.addEventListener('touchend', (e) => this._onMouseUp(e));
  }

  _canvasPos(e) {
    const rect = this.canvas.getBoundingClientRect();
    const scaleX = this.canvas.width / rect.width;
    const scaleY = this.canvas.height / rect.height;
    return {
      x: (e.clientX - rect.left) * scaleX,
      y: (e.clientY - rect.top) * scaleY
    };
  }

  _hitAtom(pos) {
    let bestAtom = null, bestDist = Infinity;
    for (const atom of this.atoms) {
      if (!atom.visible) continue;
      const d = Math.sqrt((atom.x - pos.x) ** 2 + (atom.y - pos.y) ** 2);
      if (d < atom.radius + 8 && d < bestDist) {
        bestDist = d;
        bestAtom = atom;
      }
    }
    return bestAtom;
  }

  _beginDrag(atom, pos) {
    this._prevDragX = pos.x;
    this._prevDragY = pos.y;
    this._dragMoved = 0;
    this._dragSoundStarted = false;
    this.dragTarget = {
      atom,
      molecule: atom._molecule || null,
      offsetX: atom.x - pos.x,
      offsetY: atom.y - pos.y
    };
    atom.isDragging = true;
    this.isDragging = true;
    this.canvas.parentElement.classList.add('grabbing');
  }

  _endDrag() {
    const hadDragTarget = !!this.dragTarget;
    const movedEnough = this._dragMoved > 6;
    if (this.dragTarget && this.dragTarget.atom) {
      const dragVx = this._dragVx || 0;
      const dragVy = this._dragVy || 0;
      const mol = this.dragTarget.molecule;
      if (mol) {
        const inertiaFactor = 1.05;
        mol.atoms.forEach(a => {
          if (!a.isDragging) {
            a.vx += dragVx * inertiaFactor;
            a.vy += dragVy * inertiaFactor;
          }
        });
      }
      this.dragTarget.atom.isDragging = false;
    }
    this.dragTarget = null;
    this.isDragging = false;
    this._dragVx = 0; this._dragVy = 0;
    this._dragSoundStarted = false;
    this.canvas.parentElement.classList.remove('grabbing');
    if (hadDragTarget && movedEnough) SoundFX.play('dragRelease', { cooldown: 95 });
  }

  _dragMove(pos) {
    this.dragTarget.atom.x = pos.x + this.dragTarget.offsetX;
    this.dragTarget.atom.y = pos.y + this.dragTarget.offsetY;
    this.dragTarget.atom.vx = 0;
    this.dragTarget.atom.vy = 0;
    this._dragVx = (pos.x - this._prevDragX) * 1.5;
    this._dragVy = (pos.y - this._prevDragY) * 1.5;
    const prevMoved = this._dragMoved;
    this._dragMoved += Math.abs(pos.x - this._prevDragX) + Math.abs(pos.y - this._prevDragY);
    if (!this._dragSoundStarted && prevMoved <= 6 && this._dragMoved > 6) {
      this._dragSoundStarted = true;
      SoundFX.play('dragStart', { cooldown: 95 });
    }
    this._prevDragX = pos.x;
    this._prevDragY = pos.y;
  }

  // ---- MOUSE ROUTING ----

  _onMouseDown(e) {
    const pos = this._canvasPos(e);
    this.mouseX = pos.x;
    this.mouseY = pos.y;

    if (this.showCongrats) {
      this.showCongrats = false;
      this.fireworkParticles = [];
      return;
    }

    if (this.appMode === 'create') { Creator.onMouseDown(pos); return; }

    // ===== PLAY MODE =====
    const trig = this.player.currentTrigger();

    // (1) clickBond trigger (item 8): the bond does NOT flash until the player
    //     clicks it (or one of its two atoms) once; the second click breaks it.
    if (trig && trig.type === 'clickBond') {
      const bond = trig.bond;
      const mid = bond.midpoint;
      const nearMid = Math.hypot(pos.x - mid.x, pos.y - mid.y) < 40;
      const hit = this._hitAtom(pos);
      const onAtom = (hit === bond.a1 || hit === bond.a2);
      if (this.breakArmed === bond) {
        if (nearMid || onAtom) {
          this.player.stopAutoPlay();
          this.breakArmed = null;
          this.player.satisfyGate();
          this._updateStateIndicator('⚡ 键断裂 — Bond broken');
          return;
        }
        // clicked elsewhere → stay armed, allow dragging other atoms
      } else if (nearMid || onAtom) {
        this.breakArmed = bond;
        SoundFX.play('arm');
        this._updateStateIndicator('🔴 目标键已激活 — 再次点击该键即可断裂');
        return;
      }
    }

    // (2) sticky green line (from click-two-atoms): click it to bond
    if (this.stickyGreen) {
      const { a1, a2 } = this.stickyGreen;
      const mx = (a1.x + a2.x) / 2, my = (a1.y + a2.y) / 2;
      if (Math.hypot(pos.x - mx, pos.y - my) < 30) { this._bondAndAdvance(this.stickyGreen); return; }
    }

    // (3) proximity green line (from dragging a far-start atom close): click to bond
    if (this.reactivePair && this.reactivePair.compatible) {
      const { a1, a2 } = this.reactivePair;
      const mx = (a1.x + a2.x) / 2, my = (a1.y + a2.y) / 2;
      if (Math.hypot(pos.x - mx, pos.y - my) < 30) { this._bondAndAdvance(this.reactivePair); return; }
    }

    // (4) atom: begin drag now; click-vs-drag decided on mouseup
    const bestAtom = this._hitAtom(pos);
    this._downAtom = bestAtom;
    this._downPos = pos;
    if (bestAtom) this._beginDrag(bestAtom, pos);
  }

  _onMouseMove(e) {
    const pos = this._canvasPos(e);
    this.mouseX = pos.x;
    this.mouseY = pos.y;

    if (this.appMode === 'create') { Creator.onMouseMove(pos); return; }

    if (this.isDragging && this.dragTarget) {
      this._dragMove(pos);
      this._detectReactivePairs();
      return;
    }

    this.hoveredAtom = this._hitAtom(pos);
    this._updateTooltip();
    this._detectReactivePairs();
  }

  /** Pointer left the canvas (often just hovering a floating chip/bubble overlay):
   *  end drags but DO NOT run click semantics — otherwise creator chips get wiped. */
  _onMouseLeave(e) {
    if (this.appMode === 'create') { Creator.onMouseLeave(); return; }
    this._onMouseUp(e);
  }

  _onMouseUp(e) {
    if (this.appMode === 'create') { Creator.onMouseUp(this.mouseX !== undefined ? { x: this.mouseX, y: this.mouseY } : null); return; }

    const downAtom = this._downAtom;
    const downPos = this._downPos;
    const moved = downPos ? (Math.abs(this.mouseX - downPos.x) + Math.abs(this.mouseY - downPos.y)) : 999;
    this._endDrag();
    this._downAtom = null;
    this._downPos = null;

    if (!downAtom) { this.playPick = []; return; }      // clicked empty space → cancel half-pick

    if (moved > 6) {
      // it was a drag — far-start proximity auto-bonds on release
      if (this.reactivePair && this.reactivePair.compatible && this.reactivePair.canAutoBond
          && this.reactivePair.dist < REACTION_BOND_RADIUS) {
        this._bondAndAdvance(this.reactivePair);
      }
      return;
    }
    // it was a click on an atom — click-to-bond pick mechanism (scheme B)
    this._handlePlayPick(downAtom);
  }

  /** Click-two-atoms green-line mechanism (works for every trigger pair, incl. close-start). */
  _handlePlayPick(atom) {
    const trig = this.player.currentTrigger();
    if (!trig || trig.type !== 'approach') { this.playPick = []; return; }
    const isCandidate = trig.listA.some(c => c.atom === atom) || trig.listB.some(c => c.atom === atom);
    if (!isCandidate) { this.playPick = []; return; }

    if (this.playPick.length === 0) {
      this.playPick = [atom];
      SoundFX.play('arm');
      this._updateStateIndicator('🖐 已选择第 1 个原子 — 再点击与之成键的另一个目标原子');
      return;
    }
    if (this.playPick[0] === atom) { this.playPick = []; SoundFX.play('click'); return; }   // toggle off
    const pair = this._approachPairFor(this.playPick[0], atom);
    if (pair) {
      this.stickyGreen = { a1: this.playPick[0], a2: atom, ...pair };
      this.playPick = [];
      SoundFX.play('arm');
      this._updateStateIndicator('🟢 绿线已生成 — 点击绿线即可成键');
    } else {
      this.playPick = [atom];   // not a valid partner → restart from this atom
      SoundFX.play('warn');
    }
  }

  /** Equivalent-atom substitution + advance (approach trigger fulfilled). */
  _bondAndAdvance(pair) {
    if (pair && pair.fidA && pair.primA && pair.fidA !== pair.primA) this.player.aliasSwap(pair.primA, pair.fidA);
    if (pair && pair.fidB && pair.primB && pair.fidB !== pair.primB) this.player.aliasSwap(pair.primB, pair.fidB);
    this.player.stopAutoPlay();
    this.reactivePair = null;
    this.stickyGreen = null;
    this.playPick = [];
    this.player.satisfyGate();
    this._updateStateIndicator('⚡ 反应触发 — Reaction step triggered');
  }

  /** Blue ring around the first atom picked in the click-two-atoms mechanism. */
  _drawPlayPicks(ctx) {
    for (const a of this.playPick) {
      if (!a.visible) continue;
      ctx.strokeStyle = 'rgba(110,210,255,0.95)';
      ctx.lineWidth = 2.6;
      ctx.shadowColor = 'rgba(110,210,255,0.85)';
      ctx.shadowBlur = 16;
      ctx.beginPath();
      ctx.arc(a.x, a.y, a.radius + 7, 0, PI2);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
  }

  /**
   * Detect reactive pairs for the current step trigger (play mode).
   * Compatible = matches the trigger's candidate lists. While dragging, the
   * nearest non-trigger cross-fragment pair shows as a gray hint line.
   */
  _detectReactivePairs() {
    this.reactivePair = null;
    if (this.appMode !== 'play' || !this.player.loaded || this.player.complete) return;

    const trig = this.player.currentTrigger();
    let best = null;

    if (trig && trig.type === 'approach') {
      for (const ca of trig.listA) {
        for (const cb of trig.listB) {
          const a = ca.atom, b = cb.atom;
          if (!a || !b || a === b) continue;
          if (a.bonds.some(bd => !bd.broken && bd.connects(a, b))) continue;
          // close-start pairs are click-only — never show a proximity (drag) green line
          if (this._isCloseStart(ca.fileId, cb.fileId)) continue;
          const dist = a.distTo(b);
          if (dist > REACTION_DETECT_RADIUS) continue;
          if (!best || dist < best.dist) {
            best = {
              a1: a, a2: b, dist, compatible: true, canAutoBond: true,
              fidA: ca.fileId, fidB: cb.fileId,
              primA: trig.listA[0].fileId, primB: trig.listB[0].fileId,
            };
          }
        }
      }
    }

    // Gray hint: nearest cross-fragment pair while dragging (incompatible)
    if (!best && this.isDragging && this.dragTarget) {
      const da = this.dragTarget.atom;
      let bestAny = null;
      for (const b of this.atoms) {
        if (!b.visible || b === da) continue;
        if (b._molecule === da._molecule) continue;
        if (da.bonds.some(bd => !bd.broken && bd.connects(da, b))) continue;
        const dist = da.distTo(b);
        if (dist > REACTION_DETECT_RADIUS) continue;
        if (!bestAny || dist < bestAny.dist) bestAny = { a1: da, a2: b, dist, compatible: false };
      }
      best = bestAny;
    }

    if (best) {
      this.reactivePair = best;
      if (best.compatible && best.dist < REACTION_BOND_RADIUS) {
        const { a1, a2 } = best;
        const dx = a2.x - a1.x, dy = a2.y - a1.y;
        const d = Math.sqrt(dx*dx+dy*dy) || 1;
        const magForce = 0.08;
        a1.vx += (dx/d) * magForce;
        a1.vy += (dy/d) * magForce;
        a2.vx -= (dx/d) * magForce;
        a2.vy -= (dy/d) * magForce;
        this._updateStateIndicator('🧲 Reactive atoms attracting — release or click the dashed line to bond');
      } else if (best.compatible) {
        this._updateStateIndicator('🎯 Compatible reactive pair detected — drag closer & click to bond');
      }
    }
  }

  // ---- INDICATOR DRAWING ----

  _drawReactiveIndicator(ctx) {
    if (this.appMode === 'play') {
      const trig = this.player.currentTrigger();
      // clickBond: red flash ONLY after the player has armed the bond (item 8)
      if (trig && trig.type === 'clickBond' && this.breakArmed === trig.bond && !trig.bond.broken) {
        const mid = trig.bond.midpoint;
        this._drawFlashClick(ctx, mid.x, mid.y, trig.bond.a1, trig.bond.a2, trig.label || 'CLICK TO BREAK');
      }
      // sticky green line from click-two-atoms
      if (this.stickyGreen) this._drawDashedPair(ctx, this.stickyGreen.a1, this.stickyGreen.a2, true);
      // proximity green line from dragging
      if (this.reactivePair) this._drawDashedPair(ctx, this.reactivePair.a1, this.reactivePair.a2, this.reactivePair.compatible);
      // highlight the first-picked atom
      this._drawPlayPicks(ctx);
    } else {
      // creator candidates
      if (Creator.bondCandidate) {
        this._drawDashedPair(ctx, Creator.bondCandidate.a, Creator.bondCandidate.b, true);
      }
      if (Creator.breakCandidate && !Creator.breakCandidate.bond.broken) {
        const bond = Creator.breakCandidate.bond;
        const mid = bond.midpoint;
        this._drawFlashClick(ctx, mid.x, mid.y, bond.a1, bond.a2, bond.order > 1 ? 'CLICK: −1 BOND' : 'CLICK TO BREAK');
      }
      // armed π-bond nucleophile
      if (Creator.piSource && !Creator.piSource.broken) {
        const b = Creator.piSource;
        ctx.save();
        ctx.strokeStyle = 'rgba(130,210,255,0.9)';
        ctx.lineWidth = 6;
        ctx.lineCap = 'round';
        ctx.shadowColor = 'rgba(130,210,255,0.8)';
        ctx.shadowBlur = 14;
        ctx.beginPath(); ctx.moveTo(b.a1.x, b.a1.y); ctx.lineTo(b.a2.x, b.a2.y); ctx.stroke();
        ctx.restore();
        const mid = b.midpoint;
        ctx.fillStyle = 'rgba(150,220,255,0.95)';
        ctx.font = 'bold 11px Arial, sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('π · 点击目标原子', mid.x, mid.y - 16);
      }
    }
  }

  _drawDashedPair(ctx, a1, a2, compatible) {
    const dashColor = compatible ? 'rgba(80, 220, 120, 0.7)' : 'rgba(160, 160, 170, 0.45)';
    const glowColor = compatible ? 'rgba(80, 220, 120, 0.25)' : 'rgba(160, 160, 170, 0.1)';

    ctx.strokeStyle = glowColor;
    ctx.lineWidth = 6;
    ctx.setLineDash([6, 4]);
    ctx.lineCap = 'round';
    ctx.shadowColor = glowColor;
    ctx.shadowBlur = compatible ? 12 : 4;
    ctx.beginPath();
    ctx.moveTo(a1.x, a1.y);
    ctx.lineTo(a2.x, a2.y);
    ctx.stroke();
    ctx.shadowBlur = 0;

    ctx.strokeStyle = dashColor;
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 5]);
    ctx.beginPath();
    ctx.moveTo(a1.x, a1.y);
    ctx.lineTo(a2.x, a2.y);
    ctx.stroke();
    ctx.setLineDash([]);

    if (compatible) {
      const mx = (a1.x + a2.x) / 2, my = (a1.y + a2.y) / 2;
      ctx.fillStyle = 'rgba(80, 220, 120, 0.9)';
      ctx.font = 'bold 11px Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('CLICK', mx, my - 14);
      ctx.strokeStyle = 'rgba(80, 220, 120, 0.6)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(mx, my, 8, 0, PI2);
      ctx.stroke();
    }
  }

  _drawFlashClick(ctx, mx, my, a1, a2, label = 'CLICK TO BREAK') {
    const time = performance.now() / 250;
    const alpha = 0.3 + Math.abs(Math.sin(time)) * 0.5;

    ctx.strokeStyle = `rgba(255, 80, 80, ${alpha})`;
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.shadowColor = `rgba(255, 80, 80, ${alpha})`;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.moveTo(a1.x, a1.y);
    ctx.lineTo(a2.x, a2.y);
    ctx.stroke();
    ctx.shadowBlur = 0;

    ctx.fillStyle = `rgba(255, 80, 80, ${0.7 + alpha * 0.3})`;
    ctx.font = 'bold 11px Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, mx, my - 14);
  }

  // ---- TOOLTIP / INDICATOR / GUIDANCE ----

  _updateTooltip() {
    const tip = document.getElementById('atom-tooltip');
    if (!this.hoveredAtom) {
      tip.classList.add('hidden');
      tip.classList.remove('visible');
      return;
    }
    tip.classList.remove('hidden');
    tip.classList.add('visible');
    const a = this.hoveredAtom;
